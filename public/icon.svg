<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" shape-rendering="geometricPrecision">
  <!-- Solid navy background, full bleed, square corners -->
  <rect width="512" height="512" fill="#0B1D34"/>

  <!-- White V (two thick bars meeting at the bottom apex) -->
  <path fill="#FFFFFF" d="M 100 110 L 185 110 L 256 265 L 327 110 L 412 110 L 256 440 Z"/>

  <!-- Dog head profile (navy) embedded inside the right bar of the V.
       Parts that extend outside the bar fall on the navy background
       and become invisible, leaving a clean cutout shape inside the bar. -->
  <path fill="#0B1D34" d="M 305 220
                          L 305 180
                          Q 305 170 310 165
                          L 315 135
                          L 325 150
                          Q 333 158 340 160
                          L 355 165
                          Q 370 168 375 175
                          L 378 185
                          L 378 195
                          L 370 200
                          L 355 200
                          L 348 215
                          L 335 220
                          Z"/>

  <!-- Gold + superscript at the top-right of the V -->
  <g fill="#C8A45C">
    <rect x="443" y="54" width="14" height="52"/>
    <rect x="424" y="73" width="52" height="14"/>
  </g>
</svg>
