<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="description" content="VetCopilot — Assistant intelligent du vétérinaire : planning, dossiers patients, aide au diagnostic et comptes rendus SOAP."/>
<meta name="theme-color" content="#0B1D34"/>
<meta name="color-scheme" content="light dark"/>
<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<link rel="icon" href="/favicon.ico" type="image/x-icon"/>
<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon"/>
<link rel="icon" type="image/png" sizes="16x16" href="/icon-192.png"/>
<link rel="icon" type="image/png" sizes="32x32" href="/icon-192.png"/>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png"/>
<!-- iOS PWA -->
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="VetCopilot"/>
<meta name="mobile-web-app-capable" content="yes"/>
<title>VetCopilot — L'Assistant Intelligent du Vétérinaire</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
--p:#0B1D34;--s:#122A44;--t:#2BA08F;--t2:#249582;--g:#C8A45C;--g2:#d4b06a;
--bg:#F5F7FA;--lg:#E9ECF1;--mg:#8C98A6;--dd:#1A1F27;
--tg:rgba(43,160,143,.12);--gg:rgba(200,164,92,.1);
--card:#fff;--card-b:rgba(0,0,0,.04);--txt:#0B1D34;--txt2:#8C98A6;
--gl:rgba(18,42,68,.6);--gb:rgba(43,160,143,.18);
--r:12px;--rl:20px;--rxl:28px;--sw:260px;
--ff:'Inter',-apple-system,system-ui,sans-serif;--fh:'Playfair Display',Georgia,serif;
--sh:0 8px 32px rgba(11,29,52,.12);--shl:0 20px 60px rgba(11,29,52,.18);
}
[data-theme="dark"]{
--p:#E8ECF1;--s:#1A2332;--bg:#0D1117;--lg:#1E2733;--mg:#6B7B8D;--dd:#0A0E14;
--card:#161B22;--card-b:rgba(255,255,255,.06);--txt:#E8ECF1;--txt2:#6B7B8D;
--tg:rgba(43,160,143,.18);--gg:rgba(200,164,92,.15);
--sh:0 8px 32px rgba(0,0,0,.4);--shl:0 20px 60px rgba(0,0,0,.6);
}
html{font-size:16px;scroll-behavior:smooth}
body{font-family:var(--ff);background:var(--bg);color:var(--txt);-webkit-font-smoothing:antialiased;overflow-x:hidden;transition:background .35s,color .35s}
h1,h2,h3,h4{font-family:var(--fh);font-weight:700;letter-spacing:-.02em}
button{cursor:pointer;border:none;font-family:var(--ff);background:none}
input,textarea,select{font-family:var(--ff);outline:none;color:var(--txt)}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--mg);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--t)}

.noise{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.02;
background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:var(--sw);background:linear-gradient(195deg,#152D47 0%,#0B1D34 40%,#0A0E14 100%);
color:#fff;position:fixed;top:0;left:0;bottom:0;z-index:100;display:flex;flex-direction:column;transition:transform .35s cubic-bezier(.4,0,.2,1);overflow:hidden}
.sidebar::before{content:'';position:absolute;inset:0;opacity:.03;
background:repeating-conic-gradient(var(--t) 0% 25%,transparent 0% 50%) 0 0/40px 40px;pointer-events:none}
.sidebar::after{content:'';position:absolute;bottom:0;left:0;right:0;height:200px;
background:radial-gradient(ellipse at 30% 100%,rgba(43,160,143,.06),transparent 70%);pointer-events:none}
.sb-logo{padding:22px 20px 18px;display:flex;align-items:center;gap:11px;position:relative}
.sb-logo-mark{width:42px;height:42px;border-radius:11px;background:linear-gradient(135deg,var(--t),var(--t2));display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;flex-shrink:0;padding:5px}
.sb-logo-mark::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent 40%,rgba(255,255,255,.12));pointer-events:none}
.sb-logo-mark img{width:100%;height:100%;object-fit:contain;position:relative;z-index:1}
.sb-logo-text{font-family:var(--fh);font-size:1.25rem;color:#fff}
.sb-logo-sub{font-size:.6rem;color:var(--t);text-transform:uppercase;letter-spacing:.13em;font-weight:600;margin-top:1px}
.sb-div{height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.06),transparent);margin:0 16px}
.sb-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:1px;overflow-y:auto}
.sb-sec{font-size:.58rem;text-transform:uppercase;letter-spacing:.12em;color:rgba(255,255,255,.25);padding:16px 12px 5px;font-weight:700}
.sb-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:11px;color:rgba(255,255,255,.45);
font-size:.82rem;font-weight:500;transition:all .2s;position:relative;overflow:hidden}
.sb-item:hover{color:rgba(255,255,255,.85);background:rgba(255,255,255,.04)}
.sb-item.on{color:#fff;background:rgba(43,160,143,.12)}
.sb-item.on::before{content:'';position:absolute;left:0;top:20%;height:60%;width:3px;background:var(--t);border-radius:0 3px 3px 0}
.sb-item svg{width:19px;height:19px;flex-shrink:0;opacity:.55;transition:opacity .2s}
.sb-item.on svg,.sb-item:hover svg{opacity:1}
.sb-badge{margin-left:auto;font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:8px;min-width:20px;text-align:center}
.sb-badge.tl{background:rgba(43,160,143,.2);color:var(--t)}
.sb-badge.rd{background:rgba(231,76,60,.2);color:#e74c3c}
.sb-user{padding:14px 16px;border-top:1px solid rgba(255,255,255,.05);display:flex;align-items:center;gap:11px}
.sb-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--t),var(--g));display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.78rem;color:#fff;flex-shrink:0;position:relative}
.sb-avatar::after{content:'';position:absolute;bottom:1px;right:1px;width:9px;height:9px;background:#2ecc71;border:2px solid #0B1D34;border-radius:50%}
.sb-uname{font-size:.82rem;font-weight:600;color:#fff}
.sb-urole{font-size:.65rem;color:var(--mg)}

/* MAIN */
.main{flex:1;margin-left:var(--sw);min-height:100vh;position:relative}
.hdr{height:64px;padding:0 28px;display:flex;align-items:center;justify-content:space-between;
background:rgba(255,255,255,.75);backdrop-filter:blur(24px) saturate(180%);border-bottom:1px solid var(--card-b);position:sticky;top:0;z-index:50;transition:background .35s}
[data-theme="dark"] .hdr{background:rgba(22,27,34,.82)}
.hdr-left{display:flex;align-items:center;gap:14px}
.hdr-title{font-family:var(--fh);font-size:1.25rem;color:var(--txt)}
.hdr-sub{font-size:.72rem;color:var(--txt2);font-weight:400;margin-top:1px}
.hdr-right{display:flex;align-items:center;gap:8px}
.hdr-search{display:flex;align-items:center;gap:8px;background:var(--bg);border:1.5px solid var(--lg);
border-radius:var(--r);padding:0 12px;height:38px;width:220px;transition:all .25s}
.hdr-search:focus-within{border-color:var(--t);box-shadow:0 0 0 3px var(--tg);width:300px}
.hdr-search input{flex:1;border:none;background:transparent;font-size:.82rem;color:var(--txt);min-width:0}
.hdr-search input::placeholder{color:var(--mg)}
.hdr-search svg{color:var(--mg);flex-shrink:0;width:16px;height:16px}
.hdr-search .kbd{font-size:.6rem;color:var(--mg);background:var(--lg);padding:2px 6px;border-radius:4px;font-weight:600;margin-left:auto;flex-shrink:0}
.hdr-btn{width:38px;height:38px;border-radius:50%;background:var(--bg);border:1.5px solid var(--lg);display:flex;align-items:center;justify-content:center;transition:all .2s;color:var(--mg);position:relative}
.hdr-btn:hover{background:var(--card);border-color:var(--t);color:var(--t);box-shadow:0 0 0 3px var(--tg)}
.notif-dot{position:absolute;top:7px;right:7px;width:7px;height:7px;background:#e74c3c;border-radius:50%;border:2px solid var(--bg)}
.page{padding:24px 28px 40px}

/* CARDS */
.c{background:var(--card);border-radius:var(--rl);border:1px solid var(--card-b);padding:22px;transition:all .3s;position:relative;overflow:hidden}
.c:hover{box-shadow:var(--sh);border-color:rgba(43,160,143,.08)}
.c-dark{background:linear-gradient(140deg,#0B1D34 0%,#122A44 55%,rgba(43,160,143,.08) 100%);border:1px solid rgba(43,160,143,.1);color:#fff}
.c-dark::before{content:'';position:absolute;top:-60%;right:-30%;width:80%;height:160%;background:radial-gradient(ellipse,rgba(43,160,143,.07),transparent 65%);pointer-events:none}
.c-glass{background:rgba(255,255,255,.6);backdrop-filter:blur(16px) saturate(160%);border:1px solid rgba(255,255,255,.5)}
[data-theme="dark"] .c-glass{background:rgba(22,27,34,.6);border-color:rgba(255,255,255,.06)}
.c-teal{background:linear-gradient(135deg,var(--t),var(--t2));color:#fff;border:none}
.c-gold{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff;border:none}
.c-title{font-family:var(--fh);font-size:1.05rem;margin-bottom:2px;color:var(--txt)}
.c-dark .c-title{color:#fff}
.c-label{font-size:.68rem;text-transform:uppercase;letter-spacing:.09em;font-weight:700;margin-bottom:10px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:var(--r);font-size:.84rem;font-weight:600;transition:all .25s cubic-bezier(.4,0,.2,1)}
.btn-t{background:var(--t);color:#fff}
.btn-t:hover{background:var(--t2);box-shadow:0 0 0 4px var(--tg),0 4px 14px rgba(43,160,143,.25);transform:translateY(-1px)}
.btn-o{background:transparent;color:var(--t);border:1.5px solid var(--t)}
.btn-o:hover{background:rgba(43,160,143,.04)}
.btn-g{background:linear-gradient(135deg,var(--g),var(--g2));color:#fff}
.btn-g:hover{box-shadow:0 0 0 4px var(--gg),0 4px 14px rgba(200,164,92,.25);transform:translateY(-1px)}
.btn-d{background:#0B1D34;color:#fff}
.btn-d:hover{background:#122A44}
.btn-ghost{color:var(--mg)}
.btn-ghost:hover{color:var(--txt);background:var(--bg)}
.btn-danger{background:rgba(231,76,60,.1);color:#e74c3c}
.btn-danger:hover{background:rgba(231,76,60,.18)}
.btn-sm{padding:6px 13px;font-size:.78rem}
.btn-lg{padding:12px 26px;font-size:.92rem}
.btn-icon{width:34px;height:34px;padding:0;justify-content:center;border-radius:10px}

/* TAGS */
.tag{display:inline-flex;align-items:center;gap:3px;padding:3px 9px;border-radius:20px;font-size:.68rem;font-weight:600}
.tag-t{background:rgba(43,160,143,.1);color:var(--t)}
.tag-g{background:rgba(200,164,92,.1);color:var(--g)}
.tag-r{background:rgba(231,76,60,.1);color:#e74c3c}
.tag-b{background:rgba(11,29,52,.06);color:var(--txt)}
[data-theme="dark"] .tag-b{background:rgba(255,255,255,.06)}
.tag-purple{background:rgba(155,89,182,.1);color:#9b59b6}
.tag-blue{background:rgba(52,152,219,.1);color:#3498db}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:22px}
.stat{display:flex;align-items:center;gap:14px;padding:18px}
.stat-ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stat-v{font-size:1.7rem;font-weight:800;line-height:1;color:var(--txt)}
.stat-l{font-size:.73rem;color:var(--txt2);margin-top:2px}
.stat-ch{font-size:.65rem;font-weight:700;margin-top:3px;display:flex;align-items:center;gap:3px}

/* APPOINTMENTS */
.apt{display:flex;align-items:center;gap:12px;padding:12px 14px;border-radius:var(--r);transition:all .2s;cursor:pointer}
.apt:hover{background:var(--card);box-shadow:0 2px 12px rgba(0,0,0,.05)}
.apt-bg{background:var(--bg)}
.apt-time{font-size:.76rem;font-weight:700;color:var(--t);min-width:44px;flex-shrink:0}
.apt-av{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:1.05rem;flex-shrink:0}
.apt-av.dog{background:rgba(43,160,143,.08)}.apt-av.cat{background:rgba(200,164,92,.08)}
.apt-av.bird{background:rgba(231,76,60,.08)}.apt-av.rabbit{background:rgba(11,29,52,.05)}
[data-theme="dark"] .apt-av.rabbit{background:rgba(255,255,255,.06)}
.apt-nm{font-weight:600;font-size:.86rem;color:var(--txt)}.apt-dt{font-size:.74rem;color:var(--txt2)}
.apt-st{padding:3px 9px;border-radius:20px;font-size:.66rem;font-weight:600;flex-shrink:0}
.apt-st.ok{background:rgba(43,160,143,.08);color:var(--t)}
.apt-st.wait{background:rgba(200,164,92,.08);color:var(--g)}
.apt-st.urg{background:rgba(231,76,60,.08);color:#e74c3c}
.apt-st.done{background:rgba(46,204,113,.08);color:#27ae60}

/* WELCOME */
.welcome{border-radius:var(--rxl);padding:30px 32px;color:#fff;position:relative;overflow:hidden;margin-bottom:22px;
background:linear-gradient(135deg,#0B1D34 0%,#122A44 50%,rgba(43,160,143,.15) 100%)}
.welcome::before{content:'';position:absolute;top:-50%;right:-15%;width:55%;height:180%;
background:radial-gradient(ellipse,rgba(43,160,143,.1),transparent 65%);pointer-events:none;animation:float 8s ease-in-out infinite}
.welcome::after{content:'';position:absolute;bottom:-40%;left:10%;width:40%;height:140%;
background:radial-gradient(ellipse,rgba(200,164,92,.06),transparent 65%);pointer-events:none;animation:float 10s ease-in-out infinite reverse}
@keyframes float{0%,100%{transform:translate(0,0)}50%{transform:translate(15px,-10px)}}
.welcome h2{font-family:var(--fh);font-size:1.6rem;margin-bottom:3px;position:relative;z-index:1}
.welcome p{font-size:.88rem;opacity:.65;position:relative;z-index:1;margin-bottom:18px}
.welcome-actions{display:flex;gap:10px;position:relative;z-index:1;flex-wrap:wrap}

/* GRID */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.gm{display:grid;grid-template-columns:1fr 360px;gap:22px}

/* FORM */
.fg{margin-bottom:16px}
.fl{display:block;font-size:.76rem;font-weight:600;color:var(--txt);margin-bottom:5px}
.fi{width:100%;border:1.5px solid var(--lg);border-radius:var(--r);padding:9px 13px;font-size:.86rem;transition:all .2s;background:var(--card)}
.fi:focus{border-color:var(--t);box-shadow:0 0 0 3px var(--tg)}
.fi-sel{appearance:none;background-image:url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%238C98A6' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");background-repeat:no-repeat;background-position:right 12px center;padding-right:32px}

/* TABS */
.tabs{display:flex;gap:2px;background:var(--bg);border-radius:var(--r);padding:3px;margin-bottom:18px}
.tab{padding:7px 16px;border-radius:9px;font-size:.82rem;font-weight:500;color:var(--mg);transition:all .2s;flex:1;text-align:center}
.tab.on{background:var(--card);color:var(--txt);box-shadow:0 1px 4px rgba(0,0,0,.05);font-weight:600}
.tab:hover:not(.on){color:var(--txt)}

/* DIAGNOSTIC */
.diag-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin:6px 0 10px}
.diag-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.diag-fill.hi{background:linear-gradient(90deg,#e67e22,#f39c12)}
.diag-fill.md{background:linear-gradient(90deg,var(--t),#3dcfb6)}
.diag-fill.lo{background:linear-gradient(90deg,var(--t),#58d4c1)}
.diag-result-hdr{display:flex;align-items:center;gap:10px;margin-bottom:18px;padding-bottom:14px;border-bottom:1px solid var(--lg)}
.diag-result-hdr h3{font-family:var(--fh);font-size:1.15rem;color:var(--txt)}
.diag-urgency{display:inline-flex;align-items:center;gap:5px;padding:6px 14px;border-radius:10px;font-size:.74rem;font-weight:700;letter-spacing:.03em}
.diag-urgency.critique{background:rgba(231,76,60,.1);color:#e74c3c;border:1px solid rgba(231,76,60,.15)}
.diag-urgency.moderee{background:rgba(230,126,34,.1);color:#e67e22;border:1px solid rgba(230,126,34,.15)}
.diag-urgency.faible{background:rgba(43,160,143,.1);color:var(--t);border:1px solid rgba(43,160,143,.15)}
.diag-hypo{padding:18px 20px;border-radius:var(--r);margin-bottom:12px;background:var(--card);border:1px solid var(--card-b);transition:all .3s}
.diag-hypo:hover{box-shadow:var(--sh)}
.diag-hypo-title{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.diag-hypo-title h4{font-family:var(--fh);font-size:1rem;font-weight:700;color:var(--txt);line-height:1.35}
.diag-hypo-pct{font-size:1.1rem;font-weight:800;flex-shrink:0}
.diag-hypo-pct.hi{color:#e67e22}.diag-hypo-pct.md{color:var(--t)}.diag-hypo-pct.lo{color:var(--t)}
.diag-hypo-desc{font-size:.84rem;line-height:1.65;color:var(--txt2);font-style:italic;margin-bottom:14px}
.diag-exams{background:rgba(43,160,143,.04);border-radius:10px;padding:14px 18px;border:1px solid rgba(43,160,143,.08)}
.diag-exams-title{display:flex;align-items:center;gap:6px;font-size:.8rem;font-weight:700;color:var(--t);margin-bottom:10px}
.diag-exams ul{list-style:none;padding:0;margin:0}
.diag-exams li{font-size:.82rem;color:var(--txt);padding:4px 0;padding-left:14px;position:relative;line-height:1.55}
.diag-exams li::before{content:'·';position:absolute;left:2px;font-weight:900;color:var(--t);font-size:1.1rem}

/* CHATBOT */
.chat-fab{position:fixed;bottom:22px;right:22px;width:54px;height:54px;border-radius:50%;
background:linear-gradient(135deg,var(--t),var(--g));color:#fff;display:flex;align-items:center;justify-content:center;
box-shadow:0 6px 24px rgba(43,160,143,.35);z-index:200;transition:all .3s}
.chat-fab:hover{transform:scale(1.07);box-shadow:0 10px 30px rgba(43,160,143,.45)}
.chat-panel{position:fixed;bottom:86px;right:22px;width:380px;max-height:540px;background:var(--card);border-radius:var(--rxl);
box-shadow:var(--shl);z-index:200;display:flex;flex-direction:column;overflow:hidden;
transform:scale(.92) translateY(16px);opacity:0;pointer-events:none;transition:all .3s cubic-bezier(.4,0,.2,1)}
.chat-panel.open{transform:scale(1) translateY(0);opacity:1;pointer-events:auto}
.chat-hdr{background:linear-gradient(135deg,#0B1D34,#122A44);color:#fff;padding:16px 18px;display:flex;align-items:center;gap:11px}
.chat-msgs{flex:1;overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:10px;min-height:280px}
.chat-m{max-width:82%;padding:10px 14px;border-radius:16px;font-size:.82rem;line-height:1.5;animation:msgIn .3s ease}
@keyframes msgIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.chat-m.bot{background:var(--bg);color:var(--txt);align-self:flex-start;border-bottom-left-radius:4px}
.chat-m.usr{background:var(--t);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-typing{display:flex;gap:4px;padding:10px 14px;align-self:flex-start}
.chat-typing span{width:7px;height:7px;background:var(--mg);border-radius:50%;animation:typing 1.2s infinite}
.chat-typing span:nth-child(2){animation-delay:.2s}
.chat-typing span:nth-child(3){animation-delay:.4s}
@keyframes typing{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}
.chat-in{padding:10px 14px;border-top:1px solid var(--lg);display:flex;gap:7px}
.chat-in input{flex:1;border:1.5px solid var(--lg);border-radius:24px;padding:8px 14px;font-size:.82rem;transition:border .2s;background:var(--bg)}
.chat-in input:focus{border-color:var(--t)}
.chat-send{width:36px;height:36px;border-radius:50%;background:var(--t);color:#fff;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.chat-send:hover{background:var(--t2);box-shadow:0 0 0 3px var(--tg)}
.chat-quick{display:flex;gap:5px;padding:6px 14px;flex-wrap:wrap}
.chat-quick button{font-size:.7rem;padding:4px 10px;border-radius:16px;background:var(--tg);color:var(--t);font-weight:600;transition:all .2s}
.chat-quick button:hover{background:var(--t);color:#fff}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(11,29,52,.45);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .2s}
.modal{background:var(--card);border-radius:var(--rxl);width:90%;max-width:580px;max-height:85vh;overflow-y:auto;box-shadow:var(--shl);animation:scaleIn .3s cubic-bezier(.4,0,.2,1)}
.modal-hdr{padding:22px 24px 0;display:flex;justify-content:space-between;align-items:center}
.modal-hdr h3{font-family:var(--fh);font-size:1.2rem;color:var(--txt)}
.modal-body{padding:18px 24px 24px}
.modal-close{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--mg);transition:all .2s}
.modal-close:hover{background:var(--bg);color:var(--txt)}

/* NOTIFICATION PANEL */
.notif-panel{position:fixed;top:64px;right:20px;width:370px;max-height:500px;background:var(--card);border-radius:var(--rl);
box-shadow:var(--shl);z-index:250;overflow:hidden;transform:translateY(-8px);opacity:0;pointer-events:none;transition:all .25s}
.notif-panel.open{transform:translateY(0);opacity:1;pointer-events:auto}
.notif-hdr{padding:16px 18px;border-bottom:1px solid var(--lg);display:flex;justify-content:space-between;align-items:center}
.notif-list{max-height:420px;overflow-y:auto}
.notif-item{padding:14px 18px;border-bottom:1px solid var(--bg);display:flex;gap:11px;transition:background .15s;cursor:pointer}
.notif-item:hover{background:var(--bg)}
.notif-item.unread{background:rgba(43,160,143,.03)}
.notif-dot-l{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px}

/* ORDONNANCE */
.ord-section-hdr{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:10px;margin:18px 0 10px;font-weight:700;font-size:.86rem;color:#fff;letter-spacing:.03em}
.ord-section-hdr.clinic{background:linear-gradient(135deg,#2BA08F,#1f8a76)}
.ord-section-hdr.pharma{background:linear-gradient(135deg,#0B1D34,#122A44)}
.ord-med{background:var(--card);border:1px solid var(--card-b);border-radius:10px;padding:14px;margin-bottom:10px}
.ord-med-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.ord-med-row-full{margin-bottom:8px}
.ord-med input,.ord-med textarea{width:100%;border:1px solid var(--lg);border-radius:6px;padding:7px 10px;font-family:inherit;font-size:.82rem;color:var(--txt);background:var(--bg);outline:none;transition:border-color .15s}
.ord-med input:focus,.ord-med textarea:focus{border-color:var(--t);background:var(--card)}
.ord-med input.nm{font-weight:700;color:var(--txt)}
.ord-med-label{font-size:.66rem;font-weight:700;text-transform:uppercase;color:var(--mg);margin-bottom:3px;letter-spacing:.04em}
.ord-med-actions{display:flex;justify-content:space-between;align-items:center;margin-top:6px;padding-top:8px;border-top:1px dashed var(--lg)}
.ord-add{background:transparent;border:1px dashed var(--t);color:var(--t);padding:8px 14px;border-radius:8px;font-weight:600;font-size:.78rem;cursor:pointer;width:100%;transition:all .15s}
.ord-add:hover{background:rgba(43,160,143,.06);border-style:solid}
.ord-alert{background:rgba(231,76,60,.06);border:1px solid rgba(231,76,60,.25);border-radius:10px;padding:12px 14px;margin-bottom:16px}
.ord-alert-title{font-size:.72rem;font-weight:700;color:#e74c3c;text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;display:flex;align-items:center;gap:5px}
.ord-alert ul{margin:0;padding-left:18px;font-size:.82rem;color:var(--txt);line-height:1.5}
.ord-disclaimer{background:rgba(200,164,92,.08);border:1px solid rgba(200,164,92,.2);border-radius:10px;padding:12px 14px;margin-top:16px;font-size:.78rem;color:var(--txt2);line-height:1.5}
.ord-disclaimer strong{color:var(--g)}

/* CHAT WIDGET */
.chat-fab{position:fixed;bottom:24px;right:24px;width:58px;height:58px;border-radius:50%;background:var(--t);color:#fff;border:none;font-size:26px;cursor:pointer;box-shadow:0 8px 24px rgba(11,29,52,.25),0 2px 6px rgba(11,29,52,.15);z-index:380;display:flex;align-items:center;justify-content:center;transition:transform .18s,box-shadow .18s}
.chat-fab:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 12px 30px rgba(11,29,52,.3)}
.chat-fab.hidden{display:none}
.chat-panel{position:fixed;bottom:24px;right:24px;width:380px;max-width:calc(100vw - 32px);height:580px;max-height:calc(100vh - 48px);background:#fff;border-radius:18px;box-shadow:0 16px 48px rgba(11,29,52,.22),0 4px 12px rgba(11,29,52,.08);z-index:390;display:flex;flex-direction:column;overflow:hidden;transform:translateY(20px) scale(.96);opacity:0;pointer-events:none;transition:transform .22s ease,opacity .22s ease}
.chat-panel.open{transform:translateY(0) scale(1);opacity:1;pointer-events:auto}
.chat-hdr{background:linear-gradient(135deg,#0B1D34 0%,#122A44 100%);color:#fff;padding:14px 18px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-hdr-av{width:34px;height:34px;border-radius:10px;background:rgba(43,160,143,.25);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.chat-hdr-title{font-weight:700;font-size:.92rem;line-height:1.2}
.chat-hdr-sub{font-size:.72rem;opacity:.7;margin-top:1px}
.chat-hdr-close{background:rgba(255,255,255,.08);border:none;color:#fff;width:28px;height:28px;border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;line-height:1;margin-left:auto;transition:background .15s}
.chat-hdr-close:hover{background:rgba(255,255,255,.16)}
.chat-msgs{flex:1;overflow-y:auto;padding:18px 16px;background:#fafbfc;display:flex;flex-direction:column;gap:10px;scroll-behavior:smooth}
.chat-bubble{max-width:80%;padding:10px 14px;border-radius:16px;font-size:.86rem;line-height:1.5;word-wrap:break-word;white-space:pre-wrap;animation:chatBubbleIn .25s ease-out}
.chat-bubble.assistant{background:var(--t);color:#fff;align-self:flex-start;border-bottom-left-radius:4px}
.chat-bubble.user{background:#0B1D34;color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.chat-bubble.error{background:rgba(231,76,60,.12);color:#c0392b;align-self:flex-start;border:1px solid rgba(231,76,60,.25);border-bottom-left-radius:4px}
@keyframes chatBubbleIn{from{transform:translateY(6px);opacity:0}to{transform:translateY(0);opacity:1}}
.chat-typing{align-self:flex-start;background:var(--t);padding:12px 16px;border-radius:16px;border-bottom-left-radius:4px;display:flex;gap:4px}
.chat-typing span{width:6px;height:6px;border-radius:50%;background:#fff;opacity:.6;animation:chatTyping 1.2s infinite}
.chat-typing span:nth-child(2){animation-delay:.2s}
.chat-typing span:nth-child(3){animation-delay:.4s}
@keyframes chatTyping{0%,80%,100%{transform:scale(.7);opacity:.4}40%{transform:scale(1);opacity:1}}
.chat-suggestions{padding:0 16px 12px;display:flex;flex-wrap:wrap;gap:6px;background:#fafbfc;flex-shrink:0}
.chat-suggestion{background:#fff;border:1px solid rgba(43,160,143,.25);color:var(--t);padding:6px 12px;border-radius:18px;font-size:.76rem;font-weight:500;cursor:pointer;transition:all .15s}
.chat-suggestion:hover{background:rgba(43,160,143,.08);border-color:var(--t)}
.chat-input-row{padding:12px 14px;border-top:1px solid #eef0f3;background:#fff;display:flex;align-items:flex-end;gap:8px;flex-shrink:0}
.chat-input-row textarea{flex:1;border:1px solid #e3e6ea;border-radius:18px;padding:10px 14px;font-family:inherit;font-size:.86rem;line-height:1.4;resize:none;outline:none;max-height:96px;color:var(--txt);background:#fafbfc;transition:border-color .15s}
.chat-input-row textarea:focus{border-color:var(--t);background:#fff}
.chat-btn-mic,.chat-btn-send{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.chat-btn-mic{background:#f0f2f5;color:var(--t)}
.chat-btn-mic.rec{background:#e74c3c;color:#fff;animation:pulse 1.5s infinite}
.chat-btn-send{background:var(--t);color:#fff}
.chat-btn-send:disabled{background:#cfd4da;cursor:not-allowed}
.chat-btn-send:not(:disabled):hover{background:#239583}
@media(max-width:480px){.chat-panel{right:8px;left:8px;width:auto;bottom:8px;height:calc(100vh - 16px)}.chat-fab{bottom:16px;right:16px}}

/* TOAST */
.toast-container{position:fixed;top:80px;right:24px;z-index:400;display:flex;flex-direction:column;gap:8px}
.toast{padding:12px 18px;border-radius:var(--r);color:#fff;font-size:.84rem;font-weight:500;display:flex;align-items:center;gap:8px;animation:toastIn .4s ease,toastOut .4s ease 3.6s forwards;box-shadow:var(--sh);min-width:280px}
@keyframes toastIn{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{from{transform:translateX(0);opacity:1}to{transform:translateX(120%);opacity:0}}
.toast-tl{background:var(--t)}.toast-g{background:var(--g)}.toast-r{background:#e74c3c}.toast-info{background:#0B1D34}

/* VACCINATION */
.vacc{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid var(--bg)}
.vacc:last-child{border:none}
.vacc-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.vacc-dot.ok{background:var(--t)}.vacc-dot.soon{background:var(--g)}.vacc-dot.late{background:#e74c3c}

/* TABLE */
.tbl{width:100%;border-collapse:separate;border-spacing:0}
.tbl th{text-align:left;padding:10px 14px;font-size:.7rem;text-transform:uppercase;letter-spacing:.06em;color:var(--txt2);font-weight:700;border-bottom:1px solid var(--lg)}
.tbl td{padding:12px 14px;border-bottom:1px solid var(--bg);font-size:.84rem;vertical-align:middle;color:var(--txt)}
.tbl tr:hover td{background:rgba(43,160,143,.015)}

/* PROGRESS RING */
.ring{position:relative;display:inline-flex;align-items:center;justify-content:center}
.ring svg{transform:rotate(-90deg)}
.ring-txt{position:absolute;font-size:.78rem;font-weight:700;color:var(--txt)}

/* LOGIN */
.login-page{min-height:100vh;display:flex;background:linear-gradient(135deg,#0B1D34 0%,#122A44 40%,#0A0E14 100%);position:relative;overflow:hidden}
.login-page::before{content:'';position:absolute;top:-20%;right:-10%;width:50%;height:140%;background:radial-gradient(ellipse,rgba(43,160,143,.06),transparent 60%);animation:float 12s ease-in-out infinite}
.login-left{flex:1;display:flex;flex-direction:column;justify-content:center;padding:60px;color:#fff;position:relative;z-index:1}
.login-right{width:480px;display:flex;align-items:center;justify-content:center;padding:40px}
.login-card{background:rgba(255,255,255,.95);backdrop-filter:blur(20px);border-radius:var(--rxl);padding:40px;width:100%;box-shadow:var(--shl)}

/* CONSULTATION FLOW */
.consult-flow{display:flex;align-items:center;gap:12px;margin-bottom:22px;flex-wrap:wrap}
.consult-step{display:flex;align-items:center;gap:8px;font-size:.82rem;color:var(--mg)}
.consult-step.active{color:var(--t);font-weight:600}
.consult-step.done{color:var(--txt)}
.consult-num{width:28px;height:28px;border-radius:50%;border:2px solid var(--lg);display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:700}
.consult-step.active .consult-num{background:var(--t);color:#fff;border-color:var(--t)}
.consult-step.done .consult-num{background:#0B1D34;color:#fff;border-color:#0B1D34}
.consult-line{width:32px;height:2px;background:var(--lg);flex-shrink:0}
.consult-line.done{background:var(--t)}

/* SEARCH OVERLAY */
.search-overlay{position:fixed;inset:0;background:rgba(11,29,52,.55);backdrop-filter:blur(8px);z-index:350;display:flex;align-items:flex-start;justify-content:center;padding-top:12vh;animation:fadeIn .2s}
.search-box{width:90%;max-width:560px;background:var(--card);border-radius:var(--rl);box-shadow:var(--shl);overflow:hidden;animation:scaleIn .25s}
.search-box input{width:100%;border:none;padding:18px 22px;font-size:1.05rem;background:transparent;color:var(--txt)}
.search-results{max-height:400px;overflow-y:auto;border-top:1px solid var(--lg)}
.search-item{padding:12px 22px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:background .15s}
.search-item:hover,.search-item.sel{background:var(--tg)}
.search-item .si-type{font-size:.6rem;text-transform:uppercase;letter-spacing:.08em;color:var(--mg);font-weight:700}

/* CALENDAR WEEK */
.cal-week{display:grid;grid-template-columns:60px repeat(6,1fr);gap:1px;background:var(--lg);border-radius:var(--rl);overflow:hidden}
.cal-hdr{background:var(--card);padding:10px;text-align:center;font-size:.72rem;font-weight:700;color:var(--txt2)}
.cal-hdr.today{background:rgba(43,160,143,.06);color:var(--t)}
.cal-time{background:var(--card);padding:6px 8px;font-size:.66rem;color:var(--mg);text-align:right;display:flex;align-items:flex-start;justify-content:flex-end}
.cal-cell{background:var(--card);min-height:56px;padding:3px;position:relative;transition:background .15s}
.cal-cell:hover{background:rgba(43,160,143,.02)}
.cal-evt{padding:3px 6px;border-radius:6px;font-size:.64rem;font-weight:600;margin-bottom:2px;cursor:pointer;line-height:1.3;transition:transform .15s}
.cal-evt:hover{transform:scale(1.03)}
.cal-evt.teal{background:rgba(43,160,143,.12);color:var(--t);border-left:2px solid var(--t)}
.cal-evt.gold{background:rgba(200,164,92,.12);color:var(--g);border-left:2px solid var(--g)}
.cal-evt.red{background:rgba(231,76,60,.1);color:#e74c3c;border-left:2px solid #e74c3c}

/* BARS */
.stock-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.stock-fill{height:100%;border-radius:3px;transition:width .8s}

/* IMAGE ANALYSIS */
.img-drop{border:2px dashed var(--lg);border-radius:var(--rl);padding:32px 20px;text-align:center;transition:all .3s;cursor:pointer;position:relative;overflow:hidden}
.img-drop:hover,.img-drop.drag-over{border-color:var(--t);background:rgba(43,160,143,.04)}
.img-drop.drag-over{box-shadow:0 0 0 4px var(--tg)}
.img-drop.has-images{padding:16px;border-style:solid;border-color:rgba(43,160,143,.15);background:rgba(43,160,143,.02)}
.img-previews{display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:10px;margin-top:12px}
.img-thumb{position:relative;border-radius:12px;overflow:hidden;aspect-ratio:1;background:var(--bg);border:2px solid transparent;transition:all .2s}
.img-thumb:hover{border-color:var(--t);box-shadow:var(--sh)}
.img-thumb img{width:100%;height:100%;object-fit:cover}
.img-thumb-rm{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(231,76,60,.9);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transition:opacity .2s;font-size:.65rem}
.img-thumb:hover .img-thumb-rm{opacity:1}
.img-thumb-cat{position:absolute;bottom:0;left:0;right:0;padding:3px 6px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:.62rem;font-weight:600;text-align:center}
.img-result{border-radius:var(--rl);overflow:hidden;border:1px solid var(--card-b);background:var(--card)}
.img-result-hdr{padding:18px 22px;background:linear-gradient(135deg,rgba(11,29,52,.03),rgba(43,160,143,.04));border-bottom:1px solid var(--lg);display:flex;align-items:center;gap:10px}
.img-result-body{padding:20px 22px}
.img-quality{display:inline-flex;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;font-size:.76rem;font-weight:700}
.img-quality.good{background:rgba(43,160,143,.1);color:var(--t)}
.img-quality.medium{background:rgba(230,126,34,.1);color:#e67e22}
.img-quality.poor{background:rgba(231,76,60,.1);color:#e74c3c}
.img-obs{padding:12px 16px;border-radius:10px;margin-bottom:8px;font-size:.84rem;line-height:1.6}
@media(max-width:768px){.img-previews{grid-template-columns:repeat(auto-fill,minmax(80px,1fr))}}

/* DRAG DROP */
.drop-zone{border:2px dashed var(--lg);border-radius:var(--rl);padding:40px 20px;text-align:center;transition:all .25s;cursor:pointer}
.drop-zone:hover,.drop-zone.active{border-color:var(--t);background:rgba(43,160,143,.03)}

/* INVOICE */
.inv-line{display:grid;grid-template-columns:1fr 60px 80px 80px 40px;gap:10px;align-items:center;padding:8px 0;border-bottom:1px solid var(--bg)}
.inv-line input{text-align:right}

/* MOBILE */
.mob-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:rgba(255,255,255,.92);backdrop-filter:blur(20px);
border-top:1px solid rgba(0,0,0,.04);z-index:150;padding:6px 8px;padding-bottom:env(safe-area-inset-bottom)}
[data-theme="dark"] .mob-nav{background:rgba(22,27,34,.92);border-color:rgba(255,255,255,.05)}
.mob-nav-items{display:flex;justify-content:space-around;align-items:center}
.mob-item{display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 10px;border-radius:10px;color:var(--mg);font-size:.6rem;font-weight:500;transition:all .2s}
.mob-item.on{color:var(--t)}
.mob-item svg{width:21px;height:21px}
.menu-btn{display:none;width:38px;height:38px;border-radius:10px;background:var(--bg);border:1.5px solid var(--lg);align-items:center;justify-content:center;color:var(--txt)}

@media(max-width:1100px){.gm{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
@media(max-width:768px){
.sidebar{transform:translateX(-100%)}.sidebar.open{transform:translateX(0)}
.main{margin-left:0}.page{padding:16px 14px 100px}.hdr{padding:0 14px;height:58px}
.mob-nav{display:block}.menu-btn{display:flex}
.g2,.g3{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}
.chat-panel{right:6px;left:6px;width:auto;bottom:76px}.chat-fab{bottom:76px}
.login-page{flex-direction:column}.login-left{padding:30px;min-height:auto}
.login-right{width:100%;padding:20px}.hdr-search{display:none}
.cal-week{grid-template-columns:40px repeat(6,1fr)}.consult-flow{gap:6px}
.consult-step span{display:none}
}

/* ANIMATIONS */
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.94)}to{opacity:1;transform:scale(1)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(43,160,143,.3)}50%{box-shadow:0 0 0 10px rgba(43,160,143,0)}}
@keyframes shimmer{0%{background-position:-200px 0}100%{background-position:200px 0}}
.af{animation:fadeIn .45s ease both}
.af1{animation:fadeIn .45s ease .08s both}
.af2{animation:fadeIn .45s ease .16s both}
.af3{animation:fadeIn .45s ease .24s both}
.af4{animation:fadeIn .45s ease .32s both}
.af5{animation:fadeIn .45s ease .4s both}

/* Dark mode toggle */
.theme-toggle{width:42px;height:24px;border-radius:12px;position:relative;cursor:pointer;transition:background .3s;border:none}
.theme-toggle .knob{width:18px;height:18px;background:#fff;border-radius:50%;position:absolute;top:3px;transition:all .3s;box-shadow:0 1px 3px rgba(0,0,0,.15)}

/* EMBED MODE — for iframe integration */
body.embed-mode .sidebar,
body.embed-mode .mob-nav,
body.embed-mode .chatbot-btn,
body.embed-mode .chatbot-panel,
body.embed-mode .header,
body.embed-mode .notif-overlay,
body.embed-mode .toast-container{display:none!important}
body.embed-mode .main{margin-left:0!important}
body.embed-mode .page{padding-top:10px!important}
body.embed-mode{background:transparent!important;overflow:hidden!important}
body.embed-mode .app{background:transparent!important}
</style>

<div class="noise"></div>
<div id="root"></div>
<script type="text/babel">
const{useState,useEffect,useRef,useCallback,createContext,useContext,useMemo}=React;

// Vaccine reminder helpers — `dt` field on a.vacc is the NEXT due date
// (DD/MM/YYYY), not the last dose. Used by dashboard + animal banner + notifs.
function parseDDMMYYYY(s){const m=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(s||'');return m?new Date(Number(m[3]),Number(m[2])-1,Number(m[1])):null;}
function daysUntilDate(d){if(!d) return null;return Math.round((d.getTime()-Date.now())/86400000);}
function vaccDaysLeft(v){return daysUntilDate(parseDDMMYYYY(v.dt));}
function vaccUrgency(v){const d=vaccDaysLeft(v);if(d===null) return null;if(d<0) return 'expired';if(d<=30) return 'soon';return 'ok';}
function describeVaccDays(v){const d=vaccDaysLeft(v);if(d===null) return '';if(d<0) return `Expiré depuis ${Math.abs(d)} j`;if(d===0) return "Expire aujourd'hui";return `Expire dans ${d} j`;}

// ===== PDF EXPORT HELPER =====
// POSTs a JSON body to `url`, expects a PDF blob back, triggers a download.
// Throws on HTTP error so the caller can toast.
async function downloadPdf({url, body, filename}){
  const res = await fetch(url, {
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body: JSON.stringify(body)
  });
  if(!res.ok){
    let detail = `HTTP ${res.status}`;
    try{ const j = await res.json(); if(j && j.error) detail = j.error; }catch(_){}
    throw new Error(detail);
  }
  const blob = await res.blob();
  const objUrl = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = objUrl;
  a.download = filename || 'document.pdf';
  document.body.appendChild(a);
  a.click();
  setTimeout(()=>{URL.revokeObjectURL(objUrl); a.remove();}, 1000);
}

// Returns a Date today at HH:MM (24h). APTS data has only the time string, so
// we assume "today" — sufficient for the demo, easy to extend with a date column.
function aptDateToday(timeStr){
  const m = /^(\d{1,2}):(\d{2})$/.exec(String(timeStr||''));
  if(!m) return null;
  const d = new Date();
  d.setHours(Number(m[1]), Number(m[2]), 0, 0);
  return d;
}

// Short A5 beep via Web Audio API — no external asset needed. Silently no-ops
// if AudioContext is unavailable or blocked by autoplay policy.
function playNotifBeep(){
  try{
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    const ctx = new AC();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.type = 'sine'; osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.18, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.28);
    osc.start(); osc.stop(ctx.currentTime + 0.28);
    setTimeout(()=>{try{ctx.close();}catch(_){}}, 500);
  }catch(_){}
}

// ===== IMAGE RESIZE (for animal photos) =====
// Resize the uploaded file via canvas to keep localStorage usage modest.
// 400 px on the long edge + JPEG 85% gives ~30–60 KB per photo, so the 8
// patients comfortably stay under the ~5 MB localStorage budget.
function resizeImageFile(file, maxDim = 400, quality = 0.85) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type || !file.type.startsWith('image/')) {
      return reject(new Error('Le fichier doit être une image'));
    }
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(maxDim / img.width, maxDim / img.height, 1);
      const w = Math.max(1, Math.round(img.width * scale));
      const h = Math.max(1, Math.round(img.height * scale));
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0, w, h);
      URL.revokeObjectURL(url);
      try { resolve(canvas.toDataURL('image/jpeg', quality)); }
      catch (err) { reject(err); }
    };
    img.onerror = () => { URL.revokeObjectURL(url); reject(new Error("Impossible de lire l'image")); };
    img.src = url;
  });
}

// ===== VOICE DICTATION (Web Speech API) =====
// Thin wrapper around webkitSpeechRecognition / SpeechRecognition. The result
// callback receives the full updated text (base + finalized + interim) so the
// caller can drop it straight into setState.
function useDictation(){
  const[recording,setRecording]=useState(false);
  const recRef=useRef(null);
  const baseRef=useRef('');
  const finalRef=useRef('');
  const RecognitionClass=(typeof window!=='undefined')&&(window.SpeechRecognition||window.webkitSpeechRecognition);
  const supported=!!RecognitionClass;
  useEffect(()=>()=>{if(recRef.current){try{recRef.current.abort();}catch(_){ }}},[]);
  const stop=useCallback(()=>{if(recRef.current){try{recRef.current.stop();}catch(_){ }}},[]);
  const start=useCallback(({baseText='',onUpdate,onError,lang='fr-FR'}={})=>{
    if(!supported){onError&&onError('Reconnaissance vocale non supportée par ce navigateur. Utilisez Chrome, Edge ou Safari récents.');return;}
    if(recRef.current) return; // already running
    baseRef.current=baseText;
    finalRef.current='';
    const r=new RecognitionClass();
    r.lang=lang; r.continuous=true; r.interimResults=true;
    r.onresult=(ev)=>{
      let interim='';
      for(let i=ev.resultIndex;i<ev.results.length;i++){
        const t=ev.results[i][0].transcript;
        if(ev.results[i].isFinal) finalRef.current+=t; else interim+=t;
      }
      const base=baseRef.current;
      const sep=base&&!/\s$/.test(base)?' ':'';
      onUpdate&&onUpdate(base+sep+finalRef.current+interim);
    };
    r.onerror=(ev)=>{
      const msgs={'not-allowed':'Accès au micro refusé. Autorisez le micro dans les paramètres du navigateur.','service-not-allowed':'Service de reconnaissance vocale indisponible.','no-speech':'Aucune parole détectée — réessayez en parlant plus fort.','audio-capture':'Aucun micro détecté sur cet appareil.','network':'Erreur réseau pendant la reconnaissance.','aborted':null};
      const m=Object.prototype.hasOwnProperty.call(msgs,ev.error)?msgs[ev.error]:'Erreur reconnaissance vocale : '+ev.error;
      if(m) onError&&onError(m);
    };
    r.onend=()=>{recRef.current=null;setRecording(false);};
    try{r.start();recRef.current=r;setRecording(true);}
    catch(err){onError&&onError('Impossible de démarrer la reconnaissance : '+(err.message||err));}
  },[supported]);
  return{recording,supported,start,stop};
}

// ===== EMBED MODE =====
const EMBED_PARAMS=new URLSearchParams(window.location.search);
const EMBED_PAGE=EMBED_PARAMS.get('embed');
const IS_EMBED=!!EMBED_PAGE;

// Lookup helper for places that hold an appointment-style record (with `nm`
// and `av` but no canonical animal id). Returns the matching ANIMALS entry so
// the avatar can find the photo, or a stub with no id that just shows the emoji.
function animalByName(name, fallbackAv){
  return ANIMALS.find(a=>a.nm===name)||{av:fallbackAv};
}

// ===== ANIMAL AVATAR =====
// Drop-in replacement for the `{Em[a.av]}` pattern. Returns the inner content
// (img or emoji span) — the caller keeps its existing wrapper styles (size,
// background, rounded corners). When a photo exists in the Ctx photo map, the
// img fills the wrapper with a teal circular border; otherwise the species
// emoji is rendered.
function AnimalAvatar({animal}){
  const{animalPhotos}=useContext(Ctx);
  if(!animal) return null;
  const photo=animal.id!=null?animalPhotos[animal.id]:null;
  if(photo){
    return <img src={photo} alt={animal.nm||''} style={{width:'100%',height:'100%',objectFit:'cover',borderRadius:'50%',border:'2px solid var(--t)',boxSizing:'border-box',display:'block'}}/>;
  }
  return <>{Em[animal.av]||'🐾'}</>;
}

// ===== APP =====
function App(){
  const[page,setPage]=useState(IS_EMBED?EMBED_PAGE:'login');
  const[sbOpen,setSbOpen]=useState(false);
  const[chatOpen,setChatOpen]=useState(false);
  const[selAnimal,setSelAnimal]=useState(null);
  const[notifOpen,setNotifOpen]=useState(false);
  const[toasts,setToasts]=useState([]);
  const[modal,setModal]=useState(null);
  const[dark,setDark]=useState(()=>{
    if(IS_EMBED) return true;
    try{return localStorage.getItem('vet.dark')==='1';}catch(_){return false;}
  });
  const[searchOpen,setSearchOpen]=useState(false);
  // Notifications live in state so they can be added at runtime (RDV reminders)
  // and marked-as-read without mutating the NOTIFS constant.
  const[notifs,setNotifs]=useState(()=>NOTIFS.map(n=>({...n})));
  // Chat lives in App() so the conversation persists across page navigation.
  const[chatMessages,setChatMessages]=useState([]);
  const[chatSending,setChatSending]=useState(false);
  // Invoices live in App() so the Billing page state survives navigation and
  // SOAP validation can push a draft invoice into the same array. Initial
  // load fetches from /api/invoices, with the static `INVOICES` const as a
  // tiny fallback while the request is in flight.
  const[invoices,setInvoices]=useState([]);
  const[invoicesLoading,setInvoicesLoading]=useState(true);
  useEffect(()=>{
    let cancelled=false;
    fetch('/api/invoices').then(r=>r.json()).then(d=>{
      if(cancelled) return;
      if(d&&d.ok&&Array.isArray(d.invoices)) setInvoices(d.invoices);
      setInvoicesLoading(false);
    }).catch(()=>{ if(!cancelled) setInvoicesLoading(false); });
    return()=>{cancelled=true;};
  },[]);
  const addInvoice=useCallback((inv)=>{
    setInvoices(prev=>prev.some(p=>p.id===inv.id)?prev:[inv,...prev]);
  },[]);
  const updateInvoiceStatus=useCallback((id,nextStatus)=>{
    setInvoices(prev=>prev.map(i=>i.id===id?{...i,status:nextStatus}:i));
    // Fire-and-forget server sync — keeps INVOICES_STATE in sync for future GET requests.
    fetch(`/api/invoices/${encodeURIComponent(id)}/status`,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({status:nextStatus})
    }).catch(()=>{});
  },[]);

  // Animal photos: { [animalId]: dataUrl }. Persisted in localStorage so a
  // refresh doesn't wipe the photos. Mocked data layer for now — easy to swap
  // for a real backend endpoint later.
  const PHOTOS_KEY='vetcopilot:animal-photos';
  const[animalPhotos,setAnimalPhotos]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(PHOTOS_KEY)||'{}');}catch(_){return{};}
  });
  const setAnimalPhoto=useCallback((id,dataUrl)=>{
    setAnimalPhotos(prev=>{
      const next={...prev,[id]:dataUrl};
      try{localStorage.setItem(PHOTOS_KEY,JSON.stringify(next));}catch(_){/* quota — silently skip */}
      return next;
    });
  },[]);
  const removeAnimalPhoto=useCallback((id)=>{
    setAnimalPhotos(prev=>{
      const next={...prev};delete next[id];
      try{localStorage.setItem(PHOTOS_KEY,JSON.stringify(next));}catch(_){}
      return next;
    });
  },[]);

  // Voice-capture panel toggle. Owned by App so the fab + panel + future
  // global shortcuts can all read it from Ctx.
  const[voiceOpen,setVoiceOpen]=useState(false);

  // User-created appointments. The static APTS const stays untouched (mock
  // "today's" schedule); customApts piles new RDVs created via the modal and
  // persists them in localStorage so the planning survives refreshes.
  const APTS_KEY='vet.apts.v1';
  const[customApts,setCustomApts]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(APTS_KEY)||'[]');}catch(_){return[];}
  });
  const persistApts=(next)=>{try{localStorage.setItem(APTS_KEY,JSON.stringify(next));}catch(_){}};
  const addAppointment=useCallback((apt)=>{
    setCustomApts(prev=>{
      const next=[{...apt,_custom:true,id:apt.id||'apt-'+Date.now()},...prev];
      persistApts(next);return next;
    });
  },[]);
  const removeAppointment=useCallback((id)=>{
    setCustomApts(prev=>{
      const next=prev.filter(a=>a.id!==id);
      persistApts(next);return next;
    });
  },[]);

  // Manual acts overlay: { [animalId]: [act, ...] }. Vet records quick acts
  // (vaccination, weighing, etc.) without going through the full SOAP/IA flow.
  // Persisted in localStorage so refreshes don't lose them.
  const MANUAL_ACTS_KEY='vet.manualActs.v1';
  const[manualActs,setManualActs]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(MANUAL_ACTS_KEY)||'{}');}catch(_){return{};}
  });
  const addManualAct=useCallback((animalId,act)=>{
    setManualActs(prev=>{
      const list=prev[animalId]||[];
      const next={...prev,[animalId]:[{...act,id:act.id||Date.now()},...list]};
      try{localStorage.setItem(MANUAL_ACTS_KEY,JSON.stringify(next));}catch(_){}
      return next;
    });
  },[]);

  // Animal archive overlay: { [animalId]: { reason, archiveDate, deceasedDate? } }
  // Sits next to the static ANIMALS data — that way archiving an animal
  // doesn't mutate its medical record (history/CRs stay intact), it just flips
  // its visibility in active lists.
  const ARCHIVE_KEY='vet.archive.v1';
  const[archive,setArchive]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(ARCHIVE_KEY)||'{}');}catch(_){return{};}
  });
  const archiveAnimal=useCallback((id,reason,deceasedDate)=>{
    setArchive(prev=>{
      const next={...prev,[id]:{reason,archiveDate:new Date().toISOString(),...(deceasedDate?{deceasedDate}:{})}};
      try{localStorage.setItem(ARCHIVE_KEY,JSON.stringify(next));}catch(_){}
      return next;
    });
  },[]);
  const reactivateAnimal=useCallback((id)=>{
    setArchive(prev=>{
      const next={...prev};delete next[id];
      try{localStorage.setItem(ARCHIVE_KEY,JSON.stringify(next));}catch(_){}
      return next;
    });
  },[]);

  // Team-member photos: { [memberId]: dataUrl }. Same persistence pattern as
  // animal photos. `currentUserId` is the active member shown in the sidebar
  // and persists across reloads so refreshing doesn't bump back to Dr Martin.
  const USER_PHOTOS_KEY='vetcopilot:user-photos';
  const[userPhotos,setUserPhotos]=useState(()=>{
    try{return JSON.parse(localStorage.getItem(USER_PHOTOS_KEY)||'{}');}catch(_){return{};}
  });
  const setUserPhoto=useCallback((id,dataUrl)=>{
    setUserPhotos(prev=>{
      const next={...prev,[id]:dataUrl};
      try{localStorage.setItem(USER_PHOTOS_KEY,JSON.stringify(next));}catch(_){}
      return next;
    });
  },[]);
  const[currentUserId,setCurrentUserId]=useState(()=>{
    try{const v=parseInt(localStorage.getItem('vet.currentUserId')||'1',10);return Number.isFinite(v)?v:1;}catch(_){return 1;}
  });
  const switchUser=useCallback((id)=>{
    setCurrentUserId(id);
    try{localStorage.setItem('vet.currentUserId',String(id));}catch(_){}
  },[]);
  // Team roster lives in state so the Team page can append new members and
  // have them appear immediately in the sidebar + login quick-profiles. The
  // TEAM constant is just the seed; reset on hard refresh (acceptable for
  // a prototype).
  const[teamMembers,setTeamMembers]=useState(()=>TEAM.map(m=>({...m})));
  const addTeamMember=useCallback((draft)=>{
    setTeamMembers(prev=>{
      const id=Math.max(0,...prev.map(p=>p.id))+1;
      return[...prev,{id,status:'active',color:'#3498db',...draft}];
    });
  },[]);
  const notifiedAptsRef=useRef(new Set()); // dedup: ids of APTS we've already alerted on

  const addNotif=useCallback((n)=>{
    setNotifs(prev=>prev.some(p=>p.id===n.id)?prev:[n,...prev]);
  },[]);
  const markAllRead=useCallback(()=>{
    setNotifs(prev=>prev.map(n=>n.unread?{...n,unread:false}:n));
  },[]);

  useEffect(()=>{
    document.documentElement.setAttribute('data-theme',dark?'dark':'light');
    if(!IS_EMBED){try{localStorage.setItem('vet.dark',dark?'1':'0');}catch(_){}}
  },[dark]);

  // User preferences persisted in localStorage. Each toggle either gates a
  // real behavior (pushNotifs → notification poll) or is reserved for future
  // wiring (autoDiagnostic, vaccReminders, ownerSummary).
  const PREFS_KEY='vet.prefs.v1';
  const DEFAULT_PREFS={pushNotifs:true,autoDiagnostic:true,vaccReminders:true,ownerSummary:true};
  const[prefs,setPrefs]=useState(()=>{
    try{const raw=localStorage.getItem(PREFS_KEY);if(raw)return{...DEFAULT_PREFS,...JSON.parse(raw)};}catch(_){}
    return{...DEFAULT_PREFS};
  });
  const setPref=useCallback((key,value)=>{
    setPrefs(prev=>{
      const next={...prev,[key]:value};
      try{localStorage.setItem(PREFS_KEY,JSON.stringify(next));}catch(_){}
      return next;
    });
  },[]);
  useEffect(()=>{
    const h=(e)=>{if((e.metaKey||e.ctrlKey)&&e.key==='k'){e.preventDefault();setSearchOpen(true);}if(e.key==='Escape'){setSearchOpen(false);setNotifOpen(false);}};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[]);
  useEffect(()=>{if(IS_EMBED)document.body.classList.add('embed-mode');},[]);

  // Ask for Web Notification permission once on mount (only once per browser/session;
  // the browser will silently no-op the prompt after the user's choice). Skip
  // entirely if the user has disabled push notifications in Préférences.
  useEffect(()=>{
    if(!prefs.pushNotifs) return;
    if(typeof Notification!=='undefined' && Notification.permission==='default'){
      // Defer so we don't prompt mid-render — better UX.
      const t=setTimeout(()=>{try{Notification.requestPermission();}catch(_){}}, 1200);
      return()=>clearTimeout(t);
    }
  },[prefs.pushNotifs]);

  // Poll every 60s: for each appointment within 4.5–5.5 min of "now", fire one
  // browser notification + beep + in-app notif. The 1-min window covers polling
  // jitter so we don't miss the 5-min mark. Toggled off → effect tears down
  // its interval and stops firing entirely.
  useEffect(()=>{
    if(!prefs.pushNotifs) return;
    const check=()=>{
      const now=new Date();
      for(const apt of APTS){
        const at=aptDateToday(apt.t);
        if(!at) continue;
        const diffMin=(at.getTime()-now.getTime())/60000;
        if(diffMin<4.5||diffMin>5.5) continue;
        const key=`apt-${apt.id}-${at.toDateString()}`;
        if(notifiedAptsRef.current.has(key)) continue;
        notifiedAptsRef.current.add(key);

        const title='RDV dans 5 min';
        const body=`Consultation avec ${apt.nm} — ${apt.rsn}`;
        try{
          if(typeof Notification!=='undefined' && Notification.permission==='granted'){
            new Notification(title,{body,icon:'/icon-192.png',tag:key});
          }
        }catch(_){}
        playNotifBeep();
        addNotif({id:'rem-'+apt.id+'-'+at.getTime(),type:'apt',title,text:body,time:"À l'instant",unread:true});
      }
    };
    check(); // initial check on mount so a freshly-opened app catches a near RDV
    const iv=setInterval(check,60_000);
    return()=>clearInterval(iv);
  },[addNotif,prefs.pushNotifs]);

  // Vaccine expiry notifications — fire once per (animal, vaccine) tuple when
  // expiry is ≤ 7 days. Skips archived animals. Gated by the same push pref.
  const notifiedVaccsRef=useRef(new Set());
  useEffect(()=>{
    if(!prefs.vaccReminders) return;
    ANIMALS.forEach(a=>{
      if((archive||{})[a.id]) return;
      (a.vacc||[]).forEach(v=>{
        const d=vaccDaysLeft(v);
        if(d===null||d>7) return;
        const key=`vacc-${a.id}-${v.nm}`;
        if(notifiedVaccsRef.current.has(key)) return;
        notifiedVaccsRef.current.add(key);
        const expired=d<0;
        addNotif({id:key,type:'vacc',title:expired?`Vaccin expiré — ${a.nm}`:`Rappel vaccin imminent — ${a.nm}`,text:`${v.nm} · ${describeVaccDays(v)} (${v.dt})`,time:"À l'instant",unread:true});
      });
    });
  },[addNotif,archive,prefs.vaccReminders]);

  const nav=useCallback((p,d)=>{setPage(p);if(d)setSelAnimal(d);setSbOpen(false);setNotifOpen(false);setSearchOpen(false);window.scrollTo({top:0,behavior:'smooth'});},[]);
  const toast=useCallback((msg,type='tl')=>{const id=Date.now();setToasts(p=>[...p,{id,msg,type}]);setTimeout(()=>setToasts(p=>p.filter(t=>t.id!==id)),4200);},[]);

  const showLogin = !IS_EMBED && page === 'login';

  return(
    <Ctx.Provider value={{page,nav,selAnimal,setSelAnimal,chatOpen,setChatOpen,notifOpen,setNotifOpen,toast,modal,setModal,dark,setDark,searchOpen,setSearchOpen,notifs,addNotif,markAllRead,chatMessages,setChatMessages,chatSending,setChatSending,animalPhotos,setAnimalPhoto,removeAnimalPhoto,invoices,invoicesLoading,addInvoice,updateInvoiceStatus,prefs,setPref,userPhotos,setUserPhoto,currentUserId,switchUser,teamMembers,addTeamMember,archive,archiveAnimal,reactivateAnimal,manualActs,addManualAct,voiceOpen,setVoiceOpen,customApts,addAppointment,removeAppointment}}>
      {showLogin ? (
        <LoginPage onLogin={()=>{nav('dashboard');toast('Bienvenue, Dr. Martin !','tl');}} />
      ) : (
        <div className={`app${IS_EMBED?' embed':''}`}>
          {!IS_EMBED&&<Sidebar open={sbOpen} onClose={()=>setSbOpen(false)}/>}
          <main className="main">
            {!IS_EMBED&&<Header onMenu={()=>setSbOpen(!sbOpen)}/>}
            <div className="page">
              {page==='dashboard'&&<Dashboard/>}
              {page==='schedule'&&<Schedule/>}
              {page==='animals'&&<Animals/>}
              {page==='animal-detail'&&<AnimalDetail/>}
              {page==='diagnostic'&&<Diagnostic/>}
              {page==='reports'&&<Reports/>}
              {page==='emergencies'&&<Emergencies/>}
              {page==='consultation'&&<ConsultationFlow/>}
              {/* pharmacy removed */}
              {page==='billing'&&<Billing/>}
              {page==='team'&&<Team/>}
              {page==='subscription'&&<Subscription/>}
              {page==='stats'&&<Stats/>}
              {page==='settings'&&<Settings/>}
            </div>
          </main>
          {!IS_EMBED&&<MobileNav/>}
          {!IS_EMBED&&<Chatbot/>}
          {!IS_EMBED&&<VoiceCapture/>}
          {!IS_EMBED&&<NotifPanel/>}
          {!IS_EMBED&&<ChatWidget/>}
          {modal&&<Modal/>}
          {searchOpen&&<SearchOverlay/>}
        </div>
      )}
      <div className="toast-container">{toasts.map(t=><div key={t.id} className={`toast toast-${t.type}`}>{t.type==='tl'?<I.Check/>:t.type==='r'?<I.Warn/>:<I.Bell/>}{t.msg}</div>)}</div>
    </Ctx.Provider>
  );
}

// Avatar for a team member — photo if uploaded, else a colored circle with
// initials. `editable` adds a camera badge + opens a file picker on click.
// `online` shows the green status dot used in the sidebar bottom strip.
function UserAvatar({member,size=36,editable=false,online=false,onChange}){
  const{userPhotos,setUserPhoto,toast}=useContext(Ctx);
  const inputRef=useRef(null);
  if(!member) return null;
  const photo=userPhotos[member.id];
  const initials=teamMemberInitials(member);
  const color1=member.color||'var(--t)';
  const color2='var(--g)';
  const handlePick=async(e)=>{
    const f=e.target.files&&e.target.files[0];
    e.target.value='';
    if(!f) return;
    if(!f.type.startsWith('image/')){toast('Sélectionnez une image (JPEG ou PNG)','r');return;}
    if(f.size>10*1024*1024){toast('Image trop volumineuse (max 10 MB)','r');return;}
    try{
      const dataUrl=await resizeImageFile(f,400,0.85);
      setUserPhoto(member.id,dataUrl);
      onChange&&onChange(dataUrl);
      toast(`Photo de ${teamMemberFullName(member)} mise à jour`,'tl');
    }catch(err){toast(`Erreur : ${err.message||err}`,'r');}
  };
  const ring=editable?'box-shadow:0 0 0 0 rgba(43,160,143,.0);':'';
  const inner=photo
    ? <img src={photo} alt={initials} style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
    : <span style={{fontWeight:700,fontSize:Math.max(10,size*0.36)+'px',color:'#fff',letterSpacing:'.02em'}}>{initials}</span>;
  return(<div style={{position:'relative',width:size,height:size,flexShrink:0}}>
    <div onClick={editable?()=>inputRef.current&&inputRef.current.click():undefined}
      role={editable?'button':undefined} tabIndex={editable?0:undefined}
      onKeyDown={editable?(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();inputRef.current&&inputRef.current.click();}}:undefined}
      style={{width:size,height:size,borderRadius:'50%',background:photo?'transparent':`linear-gradient(135deg,${color1},${color2})`,display:'flex',alignItems:'center',justifyContent:'center',overflow:'hidden',cursor:editable?'pointer':'default',transition:'transform .15s'}}
      onMouseEnter={editable?(e)=>e.currentTarget.style.transform='scale(1.05)':undefined}
      onMouseLeave={editable?(e)=>e.currentTarget.style.transform='scale(1)':undefined}
      title={editable?`Changer la photo de ${teamMemberFullName(member)}`:teamMemberFullName(member)}
      aria-label={editable?`Changer la photo de ${teamMemberFullName(member)}`:teamMemberFullName(member)}>
      {inner}
    </div>
    {online&&<div aria-hidden="true" style={{position:'absolute',bottom:Math.max(0,size*0.02),right:Math.max(0,size*0.02),width:Math.max(8,size*0.22),height:Math.max(8,size*0.22),background:'#2ecc71',border:'2px solid #0B1D34',borderRadius:'50%'}}/>}
    {editable&&<div aria-hidden="true" style={{position:'absolute',bottom:-2,right:-2,width:Math.max(16,size*0.32),height:Math.max(16,size*0.32),borderRadius:'50%',background:'var(--t)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:Math.max(8,size*0.18)+'px',boxShadow:'0 2px 6px rgba(0,0,0,.2)',border:'2px solid #fff',pointerEvents:'none'}}>📷</div>}
    {editable&&<input ref={inputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={handlePick}/>}
  </div>);
}

// ===== SEARCH OVERLAY =====
function SearchOverlay(){
  const{setSearchOpen,nav,archive,teamMembers,manualActs,toast}=useContext(Ctx);
  const[q,setQ]=useState('');
  const[sel,setSel]=useState(0);

  // Build a single flat list of indexable items across all categories.
  const allItems=useMemo(()=>{
    const items=[];
    const archivedIds=new Set(Object.keys(archive||{}).map(Number));
    const archivedNames=new Set(ANIMALS.filter(a=>archivedIds.has(a.id)).map(a=>a.nm));

    // PATIENTS
    ANIMALS.filter(a=>!archivedIds.has(a.id)).forEach(a=>items.push({
      cat:'patients',type:'Patient',
      nm:`${a.nm} — ${a.sp} (${a.breed})`,sub:`Propriétaire : ${a.owner}`,em:Em[a.av]||'🐾',
      action:()=>nav('animal-detail',a),
      search:`${a.nm} ${a.sp} ${a.breed} ${a.owner}`.toLowerCase(),
    }));

    // ÉQUIPE
    (teamMembers||[]).forEach(m=>items.push({
      cat:'team',type:'Équipe',
      nm:teamMemberFullName(m),sub:`${m.role} · ${m.email}`,em:'👤',
      action:()=>nav('team'),
      search:`${m.firstName} ${m.lastName} ${m.role} ${m.email}`.toLowerCase(),
    }));

    // MÉDICAMENTS
    MEDS.forEach(med=>items.push({
      cat:'meds',type:'Médicament',
      nm:`${med.nm}${med.dci&&med.dci!==med.nm?` (${med.dci})`:''}`,
      sub:`${med.cls} · ${med.note}`,em:'💊',
      action:()=>toast(`${med.nm} — ${med.note}`,'info'),
      search:`${med.nm} ${med.dci} ${med.cls}`.toLowerCase(),
    }));

    // HISTORIQUE — manual acts across all animals
    Object.entries(manualActs||{}).forEach(([animalId,acts])=>{
      const animal=ANIMALS.find(a=>a.id===Number(animalId));
      if(!animal||archivedIds.has(animal.id)) return;
      acts.forEach(act=>items.push({
        cat:'history',type:'Historique',
        nm:`${act.type}${act.vaccineName?` — ${act.vaccineName}`:''} · ${animal.nm}`,
        sub:`${act.dateDisplay} · ${act.vet}${act.notes?` · ${act.notes.slice(0,60)}`:''}`,
        em:'📋',action:()=>nav('animal-detail',animal),
        search:`${act.type} ${act.vaccineName||''} ${animal.nm} ${act.notes||''}`.toLowerCase(),
      }));
    });

    // RDV
    APTS.filter(a=>!archivedNames.has(a.nm)).forEach(a=>items.push({
      cat:'rdv',type:'Rendez-vous',
      nm:`${a.t} — ${a.nm}`,sub:`${a.rsn} · ${a.own}`,em:Em[a.av]||'📅',
      action:()=>{const an=ANIMALS.find(x=>x.nm===a.nm);if(an)nav('animal-detail',an);else nav('schedule');},
      search:`${a.t} ${a.nm} ${a.rsn} ${a.own}`.toLowerCase(),
    }));

    // PAGES
    [
      {nm:'Tableau de bord',em:'📊',k:'dashboard'},
      {nm:'Agenda',em:'📅',k:'schedule'},
      {nm:'Dossiers patients',em:'🐾',k:'animals'},
      {nm:'Assistant diagnostic IA',em:'🧠',k:'diagnostic'},
      {nm:'Comptes rendus',em:'📄',k:'reports'},
      {nm:'Urgences',em:'🚨',k:'emergencies'},
      {nm:'Équipe',em:'👥',k:'team'},
      {nm:'Facturation',em:'💶',k:'billing'},
      {nm:'Mon abonnement',em:'⚡',k:'subscription'},
      {nm:'Statistiques',em:'📈',k:'stats'},
      {nm:'Paramètres',em:'⚙️',k:'settings'},
    ].forEach(p=>items.push({cat:'pages',type:'Page',nm:p.nm,sub:'',em:p.em,action:()=>nav(p.k),search:p.nm.toLowerCase()}));

    return items;
  },[archive,teamMembers,manualActs,nav,toast]);

  // Filter + group by category for rendering
  const qLc=q.trim().toLowerCase();
  const filtered=qLc
    ? allItems.filter(i=>i.search.includes(qLc))
    : allItems.filter(i=>i.cat==='patients'||i.cat==='pages').slice(0,8);
  const CAT_ORDER=['patients','team','meds','history','rdv','pages'];
  const CAT_LABEL={patients:'Patients',team:'Équipe',meds:'Médicaments',history:'Historique',rdv:'Rendez-vous',pages:'Pages'};
  const groups=CAT_ORDER.map(c=>({cat:c,label:CAT_LABEL[c],items:filtered.filter(i=>i.cat===c)})).filter(g=>g.items.length>0);
  // Build a flat ordered list mirroring the rendered order — needed for ↑/↓ + Enter
  const orderedFlat=groups.flatMap(g=>g.items);
  const handleKey=(e)=>{
    if(e.key==='ArrowDown'){e.preventDefault();setSel(s=>Math.min(s+1,orderedFlat.length-1));}
    else if(e.key==='ArrowUp'){e.preventDefault();setSel(s=>Math.max(s-1,0));}
    else if(e.key==='Enter'&&orderedFlat[sel]){orderedFlat[sel].action();setSearchOpen(false);}
    else if(e.key==='Escape')setSearchOpen(false);
  };

  let flatIdx=-1;
  return(
    <div className="search-overlay" onClick={()=>setSearchOpen(false)}>
      <div className="search-box" onClick={e=>e.stopPropagation()}>
        <div style={{display:'flex',alignItems:'center',gap:10,padding:'0 18px'}}>
          <I.Search/>
          <input autoFocus placeholder="Rechercher patients, équipe, médicaments, historique..." value={q} onChange={e=>{setQ(e.target.value);setSel(0);}} onKeyDown={handleKey}/>
          <button style={{fontSize:'.7rem',color:'var(--mg)',background:'var(--lg)',padding:'3px 8px',borderRadius:5,fontWeight:600,flexShrink:0}} onClick={()=>setSearchOpen(false)}>ESC</button>
        </div>
        <div className="search-results">
          {groups.length===0&&<div style={{padding:'30px 22px',textAlign:'center',color:'var(--mg)',fontSize:'.86rem'}}>Aucun résultat pour "{q}"</div>}
          {groups.map(g=>(<div key={g.cat}>
            <div style={{padding:'10px 22px 4px',fontSize:'.66rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.08em',background:'var(--bg)'}}>{g.label} <span style={{color:'var(--mg)',opacity:.7,marginLeft:4}}>({g.items.length})</span></div>
            {g.items.map(item=>{flatIdx++;const myIdx=flatIdx;return(
              <div key={`${g.cat}-${myIdx}`} className={`search-item ${myIdx===sel?'sel':''}`} onClick={()=>{item.action();setSearchOpen(false);}} onMouseEnter={()=>setSel(myIdx)}>
                <span style={{fontSize:'1.2rem',width:24,textAlign:'center',flexShrink:0}}>{item.em}</span>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:'.86rem',fontWeight:500,color:'var(--txt)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{item.nm}</div>
                  {item.sub&&<div style={{fontSize:'.72rem',color:'var(--txt2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',marginTop:1}}>{item.sub}</div>}
                </div>
                <I.ChevR/>
              </div>
            );})}
          </div>))}
        </div>
      </div>
    </div>
  );
}

// ===== NOTIFICATION PANEL =====
function NotifPanel(){
  const{notifOpen,setNotifOpen,notifs,markAllRead}=useContext(Ctx);
  const panelRef=useRef(null);
  const colors={urg:'#e74c3c',apt:'var(--t)',cr:'var(--g)',vacc:'#9b59b6',sys:'#0B1D34',stock:'#e67e22',pay:'#27ae60'};
  const icons={urg:'🚨',apt:'📅',cr:'✅',vacc:'💉',sys:'⚙️',stock:'📦',pay:'💳'};
  // Close on outside click. Attach AFTER the click event that opened the panel
  // has finished propagating (setTimeout 0) — otherwise the very click that
  // opened the panel would also close it.
  useEffect(()=>{
    if(!notifOpen) return;
    const h=(e)=>{
      const inPanel=panelRef.current&&panelRef.current.contains(e.target);
      // Also ignore clicks on the bell button itself so it can toggle freely.
      const onBell=e.target.closest&&e.target.closest('.hdr-btn');
      if(!inPanel&&!onBell) setNotifOpen(false);
    };
    const t=setTimeout(()=>document.addEventListener('mousedown',h),0);
    return()=>{clearTimeout(t);document.removeEventListener('mousedown',h);};
  },[notifOpen,setNotifOpen]);
  const unread=(notifs||[]).filter(n=>n.unread).length;
  return(
    <div ref={panelRef} className={`notif-panel ${notifOpen?'open':''}`}>
      <div className="notif-hdr">
        <span style={{fontWeight:700,fontSize:'.92rem'}}>Notifications {unread>0&&<span style={{color:'#e74c3c'}}>({unread})</span>}</span>
        <button className="btn btn-sm btn-ghost" onClick={markAllRead} disabled={unread===0}>Tout marquer lu</button>
      </div>
      <div className="notif-list">
        {(notifs||[]).length===0&&<div style={{padding:'30px 18px',textAlign:'center',color:'var(--txt2)',fontSize:'.84rem'}}>Aucune notification</div>}
        {(notifs||[]).map(n=>(
          <div key={n.id} className={`notif-item ${n.unread?'unread':''}`}>
            <div style={{fontSize:'1.1rem',flexShrink:0,marginTop:2}}>{icons[n.type]||'🔔'}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,fontSize:'.84rem',color:'var(--txt)'}}>{n.title}</div>
              <div style={{fontSize:'.76rem',color:'var(--txt2)',marginTop:2}}>{n.text}</div>
              <div style={{fontSize:'.66rem',color:'var(--txt2)',marginTop:4}}>{n.time}</div>
            </div>
            {n.unread&&<div style={{width:8,height:8,borderRadius:'50%',background:colors[n.type]||'#e74c3c',flexShrink:0}}/>}
          </div>
        ))}
      </div>
    </div>
  );
}

// ===== CHAT WIDGET (Claude-powered) =====
function ChatWidget(){
  const{chatOpen,setChatOpen,chatMessages,setChatMessages,chatSending,setChatSending,selAnimal,toast,nav}=useContext(Ctx);
  const[input,setInput]=useState('');
  const dict=useDictation();
  const msgsRef=useRef(null);
  const inputRef=useRef(null);
  const quickSuggestions=[
    {label:'Posologie médicament',send:'Quelle est la posologie de référence pour ce patient ?'},
    {label:'Prochain RDV',send:'Quel est mon prochain rendez-vous ?'},
    {label:'Question sur un patient',send:'J\'ai une question sur un patient.'},
    {label:'Générer ordonnance',action:()=>{setChatOpen(false);nav('diagnostic');toast("Ouvre l'assistant diagnostic — l'ordonnance se génère après l'analyse",'tl');}}
  ];
  const hasUserMsg=chatMessages.some(m=>m.role==='user');

  // Auto-scroll to bottom on new messages or typing indicator
  useEffect(()=>{
    if(msgsRef.current) msgsRef.current.scrollTop=msgsRef.current.scrollHeight;
  },[chatMessages,chatSending,chatOpen]);

  // Focus input when panel opens
  useEffect(()=>{
    if(chatOpen) setTimeout(()=>inputRef.current&&inputRef.current.focus(),150);
  },[chatOpen]);

  const send=async(rawText)=>{
    const text=(rawText||input).trim();
    if(!text||chatSending) return;
    if(dict.recording) dict.stop();
    const next=[...chatMessages,{role:'user',content:text}];
    setChatMessages(next);
    setInput('');
    setChatSending(true);
    try{
      const res=await fetch('/api/chat',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        // Last 19 turns (Claude API gets 20 max with the current msg added on the server)
        body:JSON.stringify({message:text,history:chatMessages.slice(-19),animalId:selAnimal?.id||null})
      });
      const data=await res.json();
      if(!res.ok||!data.ok) throw new Error(data.error||`HTTP ${res.status}`);
      setChatMessages(m=>[...m,{role:'assistant',content:data.reply}]);
    }catch(err){
      setChatMessages(m=>[...m,{role:'assistant',content:`⚠ ${err.message||err}`,error:true}]);
      toast(`Chat IA en erreur : ${err.message||err}`,'r');
    }finally{
      setChatSending(false);
    }
  };

  const toggleMic=()=>{
    if(dict.recording){dict.stop();return;}
    if(!dict.supported){toast('Dictée non supportée — utilisez Chrome, Edge ou Safari récents.','r');return;}
    dict.start({baseText:input,onUpdate:setInput,onError:(msg)=>toast(msg,'r')});
  };

  const onKey=(e)=>{
    if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();send();}
  };

  return(<>
    <button className={`chat-fab ${chatOpen?'hidden':''}`} onClick={()=>setChatOpen(true)} aria-label="Ouvrir l'assistant VetCopilot" title="Assistant VetCopilot">💬</button>
    <div className={`chat-panel ${chatOpen?'open':''}`} role="dialog" aria-label="Assistant VetCopilot">
      <div className="chat-hdr">
        <div className="chat-hdr-av">🩺</div>
        <div>
          <div className="chat-hdr-title">VetCopilot Assistant</div>
          <div className="chat-hdr-sub">{chatSending?'Réfléchit...':'IA prête à vous aider'}</div>
        </div>
        <button className="chat-hdr-close" onClick={()=>setChatOpen(false)} aria-label="Fermer le chat">×</button>
      </div>
      <div className="chat-msgs" ref={msgsRef}>
        {!hasUserMsg&&<div className="chat-bubble assistant">Bonjour Dr. Martin, comment puis-je vous aider ?</div>}
        {chatMessages.map((m,i)=>(
          <div key={i} className={`chat-bubble ${m.error?'error':m.role}`}>{m.content}</div>
        ))}
        {chatSending&&<div className="chat-typing"><span/><span/><span/></div>}
      </div>
      {!hasUserMsg&&<div className="chat-suggestions">
        {quickSuggestions.map(s=>(
          <button key={s.label} className="chat-suggestion" onClick={()=>s.action?s.action():send(s.send||s.label)}>{s.label}</button>
        ))}
      </div>}
      <div className="chat-input-row">
        <textarea
          ref={inputRef}
          rows={1}
          placeholder="Pose une question à VetCopilot..."
          value={input}
          onChange={e=>setInput(e.target.value)}
          onKeyDown={onKey}
          disabled={chatSending}
        />
        <button className={`chat-btn-mic ${dict.recording?'rec':''}`} onClick={toggleMic} title={dict.recording?"Arrêter la dictée":"Démarrer la dictée vocale"} aria-label="Dictée vocale"><I.Mic/></button>
        <button className="chat-btn-send" onClick={()=>send()} disabled={chatSending||!input.trim()} title="Envoyer" aria-label="Envoyer"><I.Send/></button>
      </div>
    </div>
  </>);
}
