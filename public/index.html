function Emergencies(){
  const{archive}=useContext(Ctx);
  const[active,setActive]=useState(null); // protocol id
  const[stepIdx,setStepIdx]=useState(0);
  const[elapsed,setElapsed]=useState(0);
  const[selectedAnimalId,setSelectedAnimalId]=useState(null);
  const[unknownMode,setUnknownMode]=useState(false); // user clicked "Pas le temps"
  const[manualWeight,setManualWeight]=useState('');
  const startRef=useRef(null);
  const timerRef=useRef(null);

  const activeAnimals=useMemo(()=>ANIMALS.filter(a=>!(archive||{})[a.id]),[archive]);
  const animal=selectedAnimalId?activeAnimals.find(a=>a.id===selectedAnimalId):null;
  const animalWeight=animal?parseWeight(animal.wt):null;
  // Effective weight: animal's parsed weight wins; otherwise the manual input
  // (the vet can still override per-protocol if needed).
  const effectiveWeight=animalWeight||Number(manualWeight)||0;
  const patientReady=animal!==null||unknownMode;

  // Tick the elapsed timer once a protocol is opened.
  useEffect(()=>{
    if(!active) return;
    startRef.current=Date.now();
    setElapsed(0);
    timerRef.current=setInterval(()=>{setElapsed(Math.floor((Date.now()-startRef.current)/1000));},1000);
    return()=>{clearInterval(timerRef.current);timerRef.current=null;};
  },[active]);

  const fmtElapsed=(s)=>{const m=Math.floor(s/60);const r=s%60;return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`;};
  const protocol=active?EMERGENCIES.find(p=>p.id===active):null;
  const step=protocol?protocol.steps[stepIdx]:null;

  const PatientPickerCard=()=>(
    <div className="c af1" style={{marginBottom:14,padding:'16px 18px',border:`1px solid ${patientReady?'var(--lg)':'rgba(231,76,60,.3)'}`}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12,flexWrap:'wrap',gap:8}}>
        <div className="c-title">Patient concerné</div>
        {!animal&&!unknownMode&&<button className="btn btn-sm btn-ghost" onClick={()=>setUnknownMode(true)} title="Lancer un protocole sans sélectionner d'animal">⏱ Pas le temps</button>}
        {(animal||unknownMode)&&<button className="btn btn-sm btn-ghost" onClick={()=>{setSelectedAnimalId(null);setUnknownMode(false);setManualWeight('');}}>Changer</button>}
      </div>
      {!animal&&!unknownMode&&<>
        <select className="fi fi-sel" value={selectedAnimalId||''} onChange={e=>setSelectedAnimalId(e.target.value?Number(e.target.value):null)}>
          <option value="">— Sélectionner un patient —</option>
          {activeAnimals.map(a=><option key={a.id} value={a.id}>{a.nm} — {a.sp} ({a.breed}) · {a.wt}</option>)}
        </select>
        <div style={{fontSize:'.74rem',color:'var(--txt2)',marginTop:10,lineHeight:1.45}}>Sélectionnez un patient pour pré-remplir le poids et activer les alertes allergies / espèce. Si l'animal est inconnu ou s'il y a urgence absolue, cliquez "Pas le temps".</div>
      </>}
      {animal&&<div style={{display:'flex',gap:14,alignItems:'flex-start'}}>
        <div className={`apt-av ${animal.av}`} style={{width:54,height:54,borderRadius:12,fontSize:'1.4rem',flexShrink:0}}>{Em[animal.av]||'🐾'}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:4}}>
            <div style={{fontWeight:700,color:'var(--txt)',fontSize:'1.05rem',fontFamily:'var(--fh)'}}>{animal.nm}</div>
            <span className="tag tag-b" style={{fontSize:'.66rem'}}>{animal.sp} · {animal.breed}</span>
            <span className="tag tag-b" style={{fontSize:'.66rem'}}>{animal.age}</span>
            <span className="tag tag-b" style={{fontSize:'.66rem'}}>{animal.sex==='M'?'♂':'♀'}</span>
            <span style={{padding:'2px 9px',borderRadius:8,fontSize:'.7rem',fontWeight:700,background:'rgba(43,160,143,.12)',color:'var(--t)'}}>⚖ {animal.wt}</span>
          </div>
          {animal.allergy&&animal.allergy.length>0
            ? <div style={{fontSize:'.78rem',color:'#dc2626',fontWeight:600,marginTop:4}}>⚠️ Allergies : {animal.allergy.join(', ')}</div>
            : <div style={{fontSize:'.78rem',color:'var(--txt2)',marginTop:4}}>Aucune allergie connue</div>}
          {(SPECIES_CONTRA[animal.sp]||[]).length>0&&<div style={{fontSize:'.74rem',color:'var(--txt2)',marginTop:4,fontStyle:'italic'}}>Contre-indications spécifiques à l'espèce activées</div>}
        </div>
      </div>}
      {unknownMode&&!animal&&<div style={{padding:'10px 12px',background:'rgba(231,76,60,.08)',border:'1px solid rgba(231,76,60,.3)',borderRadius:10,display:'flex',gap:10,alignItems:'center'}}>
        <span style={{fontSize:'1.4rem'}}>🚨</span>
        <div style={{flex:1,fontSize:'.84rem',color:'var(--txt)',lineHeight:1.4}}>
          <strong style={{color:'#c0392b'}}>Animal inconnu</strong> — saisissez le poids manuellement dans le protocole. Aucune alerte allergie ne sera affichée.
        </div>
      </div>}
    </div>
  );

  // LIST VIEW
  if(!active) return(<div>
    <div style={{padding:'14px 18px',background:'linear-gradient(135deg,rgba(231,76,60,.1),rgba(231,76,60,.04))',border:'1px solid rgba(231,76,60,.3)',borderRadius:14,marginBottom:14,display:'flex',gap:14,alignItems:'center'}}>
      <span style={{fontSize:'2rem'}}>🚨</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,color:'#c0392b',fontFamily:'var(--fh)',fontSize:'1.05rem'}}>Module Urgences</div>
        <div style={{fontSize:'.84rem',color:'var(--txt2)',marginTop:2}}>Sélectionnez d'abord le patient, puis le protocole. Chronomètre intégré, posologies calculées, alertes allergies/espèce.</div>
      </div>
    </div>

    <PatientPickerCard/>

    <div style={{fontSize:'.7rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:10}}>Protocoles disponibles</div>
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:12,opacity:patientReady?1:.5,pointerEvents:patientReady?'auto':'none',transition:'opacity .2s'}}>
      {EMERGENCIES.map(p=>(<button key={p.id} type="button" disabled={!patientReady} onClick={()=>{setActive(p.id);setStepIdx(0);}}
        style={{display:'flex',gap:14,alignItems:'center',padding:'16px 18px',background:'var(--card)',border:'1px solid var(--lg)',borderRadius:14,cursor:patientReady?'pointer':'not-allowed',textAlign:'left',transition:'all .15s',fontFamily:'inherit'}}
        onMouseEnter={e=>{if(!patientReady) return;e.currentTarget.style.borderColor='#e74c3c';e.currentTarget.style.transform='translateY(-1px)';e.currentTarget.style.boxShadow='0 6px 18px rgba(231,76,60,.12)';}}
        onMouseLeave={e=>{e.currentTarget.style.borderColor='var(--lg)';e.currentTarget.style.transform='translateY(0)';e.currentTarget.style.boxShadow='none';}}>
        <div style={{width:46,height:46,borderRadius:12,background:'rgba(231,76,60,.1)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.6rem',flexShrink:0}}>{p.icon}</div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,color:'var(--txt)',fontSize:'.95rem'}}>🔴 {p.label}</div>
          <div style={{fontSize:'.74rem',color:'var(--txt2)',marginTop:3}}>{p.steps.length} étapes · {p.meds.length} médicaments · {p.severity}</div>
        </div>
        <I.ChevR/>
      </button>))}
    </div>
    {!patientReady&&<div style={{textAlign:'center',marginTop:10,fontSize:'.78rem',color:'var(--txt2)',fontStyle:'italic'}}>Sélectionnez un patient ou cliquez "Pas le temps" pour activer les protocoles.</div>}
  </div>);

  // PROTOCOL VIEW
  return(<div>
    {/* Top bar: back + URGENCE badge + timer */}
    <div style={{padding:'14px 18px',background:'linear-gradient(135deg,#e74c3c,#c0392b)',color:'#fff',borderRadius:14,marginBottom:14,display:'flex',gap:14,alignItems:'center',flexWrap:'wrap'}}>
      <button onClick={()=>{setActive(null);setStepIdx(0);clearInterval(timerRef.current);}} style={{background:'rgba(255,255,255,.18)',border:'none',color:'#fff',padding:'6px 12px',borderRadius:8,cursor:'pointer',fontSize:'.78rem',fontFamily:'inherit'}}>← Liste</button>
      <span style={{background:'rgba(255,255,255,.95)',color:'#c0392b',padding:'4px 12px',borderRadius:8,fontSize:'.7rem',fontWeight:800,letterSpacing:'.1em'}}>🚨 URGENCE</span>
      <div style={{flex:1,minWidth:0}}>
        <div style={{fontWeight:700,fontSize:'1.05rem',fontFamily:'var(--fh)'}}>{protocol.icon} {protocol.label}</div>
        <div style={{fontSize:'.76rem',opacity:.85}}>Étape {stepIdx+1} sur {protocol.steps.length}{animal?` · ${animal.nm} (${animal.wt})`:unknownMode?' · Animal inconnu':''}</div>
      </div>
      <div style={{padding:'8px 14px',background:'rgba(0,0,0,.3)',borderRadius:10,fontFamily:'monospace',fontSize:'1.3rem',fontWeight:700,letterSpacing:'.05em'}}>⏱ {fmtElapsed(elapsed)}</div>
    </div>

    {/* Aggregated allergy / species alerts (top of protocol) */}
    {animal&&(()=>{
      const flagged=protocol.meds.map(m=>({m,warns:medContraindications(m.nm,animal)})).filter(x=>x.warns.length>0);
      if(flagged.length===0) return null;
      return(<div style={{padding:'14px 16px',background:'rgba(220,38,38,.08)',border:'1px solid rgba(220,38,38,.35)',borderRadius:12,marginBottom:14}}>
        <div style={{display:'flex',gap:10,alignItems:'flex-start',marginBottom:8}}>
          <span style={{fontSize:'1.4rem'}}>⚠️</span>
          <div style={{flex:1}}>
            <div style={{fontWeight:800,color:'#c0392b',fontSize:'.96rem'}}>ALERTES contre-indications — {animal.nm}</div>
            <div style={{fontSize:'.78rem',color:'var(--txt2)',marginTop:2}}>Vérifiez avant administration. Doses adaptées proposées ci-dessous.</div>
          </div>
        </div>
        {flagged.map((x,i)=>x.warns.map((w,j)=>(
          <div key={`${i}-${j}`} style={{padding:'10px 12px',background:'rgba(220,38,38,.06)',borderLeft:'3px solid #dc2626',borderRadius:6,marginTop:8,fontSize:'.84rem',color:'var(--txt)',lineHeight:1.45}}>
            <div style={{fontWeight:700,color:'#dc2626'}}>{w.kind==='allergy'?'⚠️ ALLERGIE':'🚫 INTERDIT'} · {x.m.nm}</div>
            <div style={{marginTop:3}}>{w.detail}</div>
            <div style={{marginTop:4,fontSize:'.8rem',color:'var(--t)',fontWeight:600}}>Alternative : {w.alt}</div>
          </div>
        )))}
      </div>);
    })()}

    {/* Step progress */}
    <div style={{display:'flex',gap:4,marginBottom:14}}>
      {protocol.steps.map((_,i)=>(
        <div key={i} onClick={()=>setStepIdx(i)} style={{flex:1,height:6,borderRadius:3,background:i<=stepIdx?'#e74c3c':'var(--lg)',cursor:'pointer',transition:'background .2s'}}/>
      ))}
    </div>

    {/* Current step card */}
    <div className="c af" style={{marginBottom:14,padding:'22px 24px'}}>
      <div style={{display:'flex',gap:14,alignItems:'flex-start',marginBottom:14}}>
        <div style={{width:42,height:42,borderRadius:'50%',background:'#e74c3c',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'var(--fh)',fontWeight:800,fontSize:'1.1rem',flexShrink:0}}>{stepIdx+1}</div>
        <div style={{flex:1}}>
          <h3 style={{fontFamily:'var(--fh)',fontSize:'1.15rem',color:'var(--txt)',marginBottom:6}}>{step.t}</h3>
          <p style={{fontSize:'.92rem',lineHeight:1.55,color:'var(--txt)',margin:0}}>{step.d}</p>
        </div>
      </div>
      <div style={{display:'flex',gap:8,justifyContent:'space-between',marginTop:18}}>
        <button className="btn btn-o btn-sm" disabled={stepIdx===0} onClick={()=>setStepIdx(i=>Math.max(0,i-1))}>← Étape précédente</button>
        {stepIdx<protocol.steps.length-1
          ? <button className="btn" style={{background:'#e74c3c',color:'#fff'}} onClick={()=>setStepIdx(i=>i+1)}>Étape suivante →</button>
          : <button className="btn btn-t" onClick={()=>{setActive(null);setStepIdx(0);}}>✓ Protocole terminé</button>}
      </div>
    </div>

    {/* Meds card with weight-based dosing */}
    <div className="c af1" style={{padding:'18px 20px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}}>
        <div className="c-title">Médicaments d'urgence · doses calculées</div>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <label style={{fontSize:'.78rem',color:'var(--txt2)'}}>Poids :</label>
          {animal
            ? <span style={{padding:'6px 12px',background:'rgba(43,160,143,.1)',color:'var(--t)',borderRadius:8,fontSize:'.84rem',fontWeight:700}}>{animalWeight} kg <span style={{fontWeight:400,fontSize:'.72rem',color:'var(--txt2)'}}>· {animal.nm}</span></span>
            : <div style={{position:'relative'}}>
                <input className="fi" type="number" step="0.1" min="0" value={manualWeight} onChange={e=>setManualWeight(e.target.value)} placeholder="kg" style={{width:90,padding:'6px 28px 6px 10px',fontSize:'.84rem'}}/>
                <span style={{position:'absolute',right:10,top:'50%',transform:'translateY(-50%)',fontSize:'.74rem',color:'var(--txt2)',pointerEvents:'none'}}>kg</span>
              </div>}
        </div>
      </div>
      <table className="tbl">
        <thead><tr><th>Médicament</th><th>Posologie</th><th style={{textAlign:'right'}}>Dose calculée</th><th>Note</th></tr></thead>
        <tbody>{protocol.meds.map((m,i)=>{
          const w=effectiveWeight;
          const dose=w&&w>0?(m.formula*w):null;
          const baseUnit=m.unit.split(' ')[0];
          const warns=medContraindications(m.nm,animal);
          const blocked=warns.length>0;
          return(<tr key={i} style={blocked?{background:'rgba(220,38,38,.05)'}:undefined}>
            <td><strong style={{color:'var(--txt)',textDecoration:blocked?'line-through':'none',opacity:blocked?.7:1}}>{m.nm}</strong>{blocked&&<div style={{fontSize:'.7rem',fontWeight:700,color:'#dc2626',marginTop:3}}>⚠️ {warns[0].label}</div>}</td>
            <td style={{fontSize:'.84rem',color:'var(--txt2)'}}>{m.formula} {m.unit}</td>
            <td style={{textAlign:'right',fontFamily:'var(--fh)',fontWeight:700,color:blocked?'#dc2626':(dose?'#c0392b':'var(--mg)'),textDecoration:blocked?'line-through':'none'}}>{dose?`${dose.toFixed(2)} ${baseUnit}`:'— saisir poids'}</td>
            <td style={{fontSize:'.78rem',color:blocked?'#dc2626':'var(--txt2)'}}>{blocked?warns[0].alt:m.note}</td>
          </tr>);
        })}</tbody>
      </table>
    </div>
  </div>);
}

function Stats(){
  const lineRef=useRef(null);const donutRef=useRef(null);const barRef=useRef(null);
  const lineInst=useRef(null);const donutInst=useRef(null);const barInst=useRef(null);
  const[period,setPeriod]=useState('month');
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';
  const data=STATS_PERIODS[period];

  useEffect(()=>{
    const txtC=isDark?'#6B7B8D':'#8C98A6';
    const gridC=isDark?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';
    const pointBorder=isDark?'#161B22':'#fff';

    // Line: consultations + opérations sur 28 jours
    if(lineRef.current){
      lineInst.current?.destroy();
      lineInst.current=new Chart(lineRef.current,{
        type:'line',
        data:{labels:WEEKLY_ACTIVITY_LABELS,datasets:[
          {label:'Consultations',data:WEEKLY_CONSULTATIONS,borderColor:'#2BA08F',backgroundColor:'rgba(43,160,143,.1)',fill:true,tension:.35,pointRadius:3,pointBackgroundColor:'#2BA08F',pointBorderColor:pointBorder,pointBorderWidth:1.5,borderWidth:2.2},
          {label:'Opérations',  data:WEEKLY_OPERATIONS,  borderColor:'#C8A45C',backgroundColor:'rgba(200,164,92,.08)',fill:true,tension:.35,pointRadius:3,pointBackgroundColor:'#C8A45C',pointBorderColor:pointBorder,pointBorderWidth:1.5,borderWidth:2.2},
        ]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:11},color:txtC,usePointStyle:true,padding:14}}},scales:{y:{grid:{color:gridC},beginAtZero:true,ticks:{color:txtC,precision:0}},x:{grid:{display:false},ticks:{color:txtC,maxRotation:0,autoSkip:true,maxTicksLimit:8}}}}
      });
    }

    // Donut: répartition par type d'acte
    if(donutRef.current){
      donutInst.current?.destroy();
      donutInst.current=new Chart(donutRef.current,{
        type:'doughnut',
        data:{labels:ACT_TYPES.map(a=>a.l),datasets:[{data:ACT_TYPES.map(a=>a.v),backgroundColor:ACT_TYPES.map(a=>a.c),borderWidth:0,spacing:3}]},
        options:{responsive:true,maintainAspectRatio:false,cutout:'66%',plugins:{legend:{position:'bottom',labels:{font:{family:'Inter',size:11},color:txtC,usePointStyle:true,pointStyle:'circle',padding:12,boxWidth:8}},tooltip:{callbacks:{label:c=>`${c.label}: ${c.parsed}%`}}}}
      });
    }

    // Bar: CA par semaine
    if(barRef.current){
      barInst.current?.destroy();
      const max=Math.max(...REVENUE_WEEKS.map(w=>w.v));
      barInst.current=new Chart(barRef.current,{
        type:'bar',
        data:{labels:REVENUE_WEEKS.map(w=>w.l),datasets:[{label:'CA (€)',data:REVENUE_WEEKS.map(w=>w.v),backgroundColor:'rgba(43,160,143,.7)',borderRadius:8,maxBarThickness:54}]},
        options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:24}},plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y.toLocaleString('fr-FR')} €`}}},scales:{y:{grid:{color:gridC},beginAtZero:true,suggestedMax:max*1.18,ticks:{color:txtC,callback:v=>(v/1000).toFixed(1)+' k€'}},x:{grid:{display:false},ticks:{color:txtC}}}},
        plugins:[{
          id:'valueLabels',
          afterDatasetsDraw(chart){
            const{ctx,scales:{x,y}}=chart;
            const ds=chart.data.datasets[0].data;
            ctx.save();ctx.font='600 11px Inter';ctx.fillStyle=txtC;ctx.textAlign='center';
            ds.forEach((v,i)=>{ctx.fillText(v.toLocaleString('fr-FR')+' €',x.getPixelForValue(i),y.getPixelForValue(v)-8);});
            ctx.restore();
          }
        }]
      });
    }

    return()=>{lineInst.current?.destroy();donutInst.current?.destroy();barInst.current?.destroy();};
  },[isDark]);

  const fmtEur=(n)=>n.toLocaleString('fr-FR')+' €';

  return(<div>
    {/* PERIOD FILTER */}
    <div className="tabs af" style={{marginBottom:14,maxWidth:420}}>
      {Object.entries(STATS_PERIODS).map(([k,v])=>(
        <button key={k} className={`tab ${period===k?'on':''}`} onClick={()=>setPeriod(k)}>{v.label}</button>
      ))}
    </div>

    {/* STAT CARDS */}
    <div className="stats af1" style={{gridTemplateColumns:'repeat(auto-fit,minmax(220px,1fr))'}}>
      <StatCard ic="🩺" color="#2BA08F" label={`Consultations · ${data.label.toLowerCase()}`} value={data.consultations.toLocaleString('fr-FR')} trend={data.tConsult}/>
      <StatCard ic="📅" color="#C8A45C" label="Taux de remplissage agenda"                   value={`${data.fillRate}%`}                                 trend={data.tFill}/>
      <StatCard ic="💶" color="#9b59b6" label={`CA · ${data.label.toLowerCase()}`}            value={fmtEur(data.revenue)}                                trend={data.tRev}/>
      <StatCard ic="🐾" color="#3498db" label="Nouveaux patients"                             value={data.newPatients.toLocaleString('fr-FR')}            trend={data.tNew}/>
    </div>

    {/* WEEKLY ACTIVITY (line) */}
    <div className="c af2" style={{marginTop:16}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10,flexWrap:'wrap',gap:8}}>
        <div className="c-title">Activité hebdomadaire — 4 dernières semaines</div>
        <div style={{fontSize:'.74rem',color:'var(--txt2)'}}>Consultations + opérations · jour par jour</div>
      </div>
      <div style={{position:'relative',height:240}}><canvas ref={lineRef}/></div>
    </div>

    {/* DONUT + BAR (side by side) */}
    <div className="g2 af1" style={{marginTop:16}}>
      <div className="c">
        <div className="c-title" style={{marginBottom:10}}>Répartition par type d'acte</div>

    {/* TOP PATIENTS + VETS */}

            <div className={`apt-av ${p.av}`} style={{width:36,height:36,borderRadius:10,fontSize:'1rem'}}>{Em[p.av]||'🐾'}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontWeight:600,color:'var(--txt)',fontSize:'.88rem'}}>{p.nm} <span style={{color:'var(--txt2)',fontWeight:400,fontSize:'.78rem'}}>· {p.sp}</span></div>
              <div style={{fontSize:'.74rem',color:'var(--txt2)',marginTop:1,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>Dernier motif : {p.reason}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontFamily:'var(--fh)',fontWeight:700,color:'var(--t)',fontSize:'1.05rem'}}>{p.visits}</div>
              <div style={{fontSize:'.68rem',color:'var(--txt2)'}}>visite{p.visits>1?'s':''}</div>
            </div>
          </div>
        ))}
      </div>
      <div className="c">
        <div className="c-title" style={{marginBottom:14}}>Répartition par vétérinaire</div>
        {(()=>{
          const total=VET_BREAKDOWN.reduce((s,v)=>s+v.visits,0);
          const max=Math.max(...VET_BREAKDOWN.map(v=>v.visits));
          return VET_BREAKDOWN.map((v,i)=>{
            const pct=Math.round((v.visits/total)*100);
            const barW=Math.round((v.visits/max)*100);
            return(<div key={i} style={{marginBottom:i<VET_BREAKDOWN.length-1?14:0}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',marginBottom:6}}>
                <div style={{fontSize:'.88rem',fontWeight:600,color:'var(--txt)'}}>{v.nm}</div>
                <div style={{fontSize:'.82rem',color:'var(--txt2)'}}><strong style={{color:'var(--txt)'}}>{v.visits}</strong> consultations <span style={{color:'var(--mg)'}}>· {pct}%</span></div>
              </div>
              <div style={{height:10,background:'var(--bg)',borderRadius:5,overflow:'hidden'}}>
                <div style={{height:'100%',width:`${barW}%`,background:`linear-gradient(90deg,${v.color},${v.color}cc)`,borderRadius:5,transition:'width .35s'}}/>
              </div>
            </div>);
          });
        })()}
        <div style={{marginTop:20,padding:'12px 14px',background:'var(--bg)',borderRadius:10,fontSize:'.78rem',color:'var(--txt2)'}}>
          <strong style={{color:'var(--txt)'}}>{VET_BREAKDOWN.reduce((s,v)=>s+v.visits,0)}</strong> consultations au total · {VET_BREAKDOWN.length} vétérinaires actifs
        </div>
      </div>
    </div>
  </div>);
}

// Compact pill switch + label + sub-line. Used by the Settings preferences

function PrefToggle({label,sub,on,onChange,disabled,last}){
  return(<div onClick={()=>!disabled&&onChange(!on)}
    role="switch" aria-checked={!!on} tabIndex={disabled?-1:0}
    onKeyDown={e=>{if(!disabled&&(e.key==='Enter'||e.key===' ')){e.preventDefault();onChange(!on);}}}

    <div style={{width:42,height:24,background:on?'var(--t)':'var(--lg)',borderRadius:12,position:'relative',transition:'background .2s',flexShrink:0}}>
      <div style={{width:18,height:18,background:'#fff',borderRadius:'50%',position:'absolute',top:3,left:on?21:3,transition:'left .2s',boxShadow:'0 1px 3px rgba(0,0,0,.15)'}}/>

    <div style={{flex:1,minWidth:0}}>
      <div style={{fontSize:'.9rem',color:'var(--txt)',fontWeight:500}}>{label}</div>
      {sub&&<div style={{fontSize:'.74rem',color:'var(--txt2)',marginTop:3,lineHeight:1.4}}>{sub}</div>}

  </div>);
}

// ===== CHATBOT =====
// Normalize a name for fuzzy comparison (lowercase + strip diacritics).
function normNm(s){return String(s||'').toLowerCase().normalize('NFD').replace(/[̀-ͯ]/g,'').trim();}

// ===== VOICE CAPTURE (saisie vocale intelligente) =====
const VOICE_ACT_LABEL={vaccination:'Vaccination',consultation:'Consultation',vermifuge:'Vermifuge',detartrage:'Détartrage',controle:'Contrôle',chirurgie:'Chirurgie',urgence:'Urgence',autre:'Autre'};

function VoiceCapture(){
  const{voiceOpen,setVoiceOpen,toast,addManualAct,archive}=useContext(Ctx);
  const[transcript,setTranscript]=useState('');
  const[parsed,setParsed]=useState(null);
  const[selectedAnimalId,setSelectedAnimalId]=useState(null);
  const[step,setStep]=useState('idle'); // idle | recording | sending | parsed
  const[editing,setEditing]=useState(false);
  const dict=useDictation();

  const activeAnimals=useMemo(()=>ANIMALS.filter(a=>!(archive||{})[a.id]),[archive]);

  const findAnimal=useCallback((name)=>{
    if(!name) return null;
    const n=normNm(name);
    return activeAnimals.find(a=>normNm(a.nm)===n)||null;
  },[activeAnimals]);

  // When no exact match, surface up to 3 candidates ranked by name overlap.
  const candidates=useMemo(()=>{
    if(!parsed||!parsed.animalName||selectedAnimalId) return [];
    const n=normNm(parsed.animalName);
    return activeAnimals
      .map(a=>{const an=normNm(a.nm);let score=0;if(an===n)score=100;else if(an.startsWith(n.slice(0,3)))score=50;else if(an.includes(n)||n.includes(an))score=30;else if(an[0]===n[0])score=10;return{a,score};})
      .filter(x=>x.score>0)
      .sort((x,y)=>y.score-x.score)
      .slice(0,3)
      .map(x=>x.a);
  },[parsed,selectedAnimalId,activeAnimals]);

  const reset=useCallback(()=>{
    setTranscript('');setParsed(null);setSelectedAnimalId(null);setStep('idle');setEditing(false);
    if(dict.recording) dict.stop();
  },[dict]);

  const startMic=()=>{
    if(step==='sending') return;
    if(!dict.supported){toast("Reconnaissance vocale non supportée — utilisez Chrome, Edge ou Safari récents.",'r');return;}
    setTranscript('');setParsed(null);setSelectedAnimalId(null);setStep('recording');
    dict.start({onUpdate:setTranscript,onError:(m)=>{toast(m,'r');setStep('idle');}});
  };

  const parseTranscript=async(text)=>{
    if(!text||!text.trim()){toast('Aucun texte à analyser','r');return;}
    setStep('sending');
    try{
      const r=await fetch('/api/voice-entry',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
      const d=await r.json();
      if(!d.ok) throw new Error(d.error||'Erreur IA');
      setParsed(d.parsed||{});
      const matched=findAnimal((d.parsed||{}).animalName);
      setSelectedAnimalId(matched?matched.id:null);
      setStep('parsed');
    }catch(e){toast('Erreur IA : '+(e.message||e),'r');setStep('idle');}
  };

  const stopMic=()=>{
    dict.stop();
    setTimeout(()=>{parseTranscript(transcript);},120); // let final transcript flush
  };

  const validate=()=>{
    if(!parsed||!selectedAnimalId){toast('Sélectionnez un patient avant de valider','r');return;}
    const animal=activeAnimals.find(a=>a.id===selectedAnimalId);
    if(!animal) return;
    const dateISO=parsed.date||new Date().toISOString().slice(0,10);
    const act={
      date:dateISO,
      dateDisplay:formatDateFR(dateISO),
      type:VOICE_ACT_LABEL[parsed.actType]||'Autre',
      vet:parsed.vetName||'Dr. Jean Martin',
      notes:parsed.notes||'',
      ...(parsed.weight?{weight:Number(parsed.weight)}:{}),
      ...(parsed.vaccineName?{vaccineName:parsed.vaccineName}:{}),
      ...(parsed.nextVisit?{nextDate:formatDateFR(parsed.nextVisit),nextDateISO:parsed.nextVisit}:{}),
    };
    addManualAct(animal.id,act);
    toast(`Acte ajouté à la fiche de ${animal.nm}`,'tl');
    reset();
    setVoiceOpen(false);
  };

  const setField=(k,v)=>setParsed(p=>({...(p||{}),[k]:v}));

  if(!voiceOpen){
    return <button onClick={()=>setVoiceOpen(true)} aria-label="Saisie vocale rapide" title="Saisie vocale rapide"
      style={{position:'fixed',bottom:90,right:24,width:54,height:54,borderRadius:'50%',background:'linear-gradient(135deg,#C8A45C,#a88947)',color:'#fff',border:'none',fontSize:22,cursor:'pointer',boxShadow:'0 8px 24px rgba(200,164,92,.4),0 2px 6px rgba(11,29,52,.15)',zIndex:379,display:'flex',alignItems:'center',justifyContent:'center',transition:'transform .15s'}}
      onMouseEnter={e=>e.currentTarget.style.transform='translateY(-2px) scale(1.04)'}
      onMouseLeave={e=>e.currentTarget.style.transform='translateY(0) scale(1)'}>🎙️</button>;
  }

  const isRecording=step==='recording';
  const isSending=step==='sending';
  const isParsed=step==='parsed'&&parsed;

  return(<div style={{position:'fixed',bottom:24,right:24,width:380,maxWidth:'calc(100vw - 24px)',maxHeight:'calc(100vh - 48px)',background:'var(--card)',borderRadius:18,boxShadow:'0 16px 50px rgba(11,29,52,.25)',border:'1px solid var(--lg)',zIndex:381,display:'flex',flexDirection:'column',overflow:'hidden'}}>
    {/* HEADER */}
    <div style={{padding:'14px 16px',background:'linear-gradient(135deg,#C8A45C,#a88947)',color:'#fff',display:'flex',alignItems:'center',gap:10}}>
      <div style={{width:34,height:34,borderRadius:'50%',background:'rgba(255,255,255,.18)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.05rem'}}>🎙️</div>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,fontSize:'.96rem'}}>Saisie vocale</div>
        <div style={{fontSize:'.72rem',opacity:.85}}>Dictez un acte, l'IA structure</div>
      </div>
      <button onClick={()=>{reset();setVoiceOpen(false);}} aria-label="Fermer" style={{background:'rgba(255,255,255,.15)',border:'none',color:'#fff',width:28,height:28,borderRadius:'50%',cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}><I.X/></button>
    </div>

    {/* BODY */}
    <div style={{flex:1,overflow:'auto',padding:'16px'}}>
      {/* Idle / recording state */}
      {(step==='idle'||isRecording||isSending)&&<>
        <div style={{textAlign:'center',marginBottom:14}}>
          <button onClick={isRecording?stopMic:startMic} disabled={isSending}
            style={{width:96,height:96,borderRadius:'50%',border:'none',cursor:isSending?'wait':'pointer',background:isRecording?'linear-gradient(135deg,#e74c3c,#c0392b)':'linear-gradient(135deg,#C8A45C,#a88947)',color:'#fff',fontSize:36,boxShadow:isRecording?'0 0 0 8px rgba(231,76,60,.18)':'0 6px 20px rgba(200,164,92,.35)',transition:'all .2s',position:'relative'}}>
            {isSending?<div style={{width:24,height:24,border:'3px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .6s linear infinite'}}/>:isRecording?'⏹':'🎙️'}
          </button>
          <div style={{fontSize:'.84rem',color:'var(--txt)',marginTop:12,fontWeight:600}}>
            {isSending?'Analyse en cours...':isRecording?'À l\'écoute — cliquez pour arrêter':'Cliquez pour parler'}
          </div>
          {!isRecording&&!isSending&&<div style={{fontSize:'.74rem',color:'var(--txt2)',marginTop:6,lineHeight:1.45,padding:'0 8px'}}>Ex : "Rex est venu pour son rappel CHPL, 32 kilos, tout va bien, prochaine visite dans un an"</div>}
        </div>
        {transcript&&<div style={{padding:'10px 12px',background:'var(--bg)',borderRadius:10,border:'1px solid var(--lg)',fontSize:'.84rem',color:'var(--txt)',lineHeight:1.45,fontStyle:'italic',minHeight:40}}>{transcript}</div>}
      </>}

      {/* Parsed result */}
      {isParsed&&<>
        <div style={{padding:'10px 12px',background:'rgba(200,164,92,.08)',borderRadius:10,border:'1px solid rgba(200,164,92,.25)',marginBottom:14,fontSize:'.8rem',color:'var(--txt2)',lineHeight:1.45,fontStyle:'italic'}}>"{transcript}"</div>

        {/* Animal picker */}
        <div style={{marginBottom:14}}>
          <label style={{display:'block',fontSize:'.7rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:6}}>Patient</label>
          {selectedAnimalId
            ? (()=>{const an=activeAnimals.find(a=>a.id===selectedAnimalId);return an?<div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',background:'rgba(43,160,143,.08)',border:'1px solid rgba(43,160,143,.3)',borderRadius:10}}>
                <span style={{fontSize:'1.4rem'}}>{Em[an.av]||'🐾'}</span>
                <div style={{flex:1,minWidth:0}}><div style={{fontWeight:700,color:'var(--txt)'}}>{an.nm}</div><div style={{fontSize:'.74rem',color:'var(--txt2)'}}>{an.sp} · {an.owner}</div></div>
                <button onClick={()=>setSelectedAnimalId(null)} style={{background:'none',border:'none',color:'var(--t)',cursor:'pointer',fontSize:'.78rem',padding:4}}>Changer</button>
              </div>:null;})()
            : <div>
                <div style={{padding:'10px 12px',background:'rgba(231,76,60,.06)',border:'1px solid rgba(231,76,60,.25)',borderRadius:10,fontSize:'.82rem',color:'var(--txt)',marginBottom:8}}>
                  {parsed.animalName?<>Aucune correspondance pour <strong>{parsed.animalName}</strong>. Sélectionnez le patient :</>:<>Aucun patient mentionné — choisissez :</>}
                </div>
                {(candidates.length>0?candidates:activeAnimals.slice(0,6)).map(a=>(
                  <button key={a.id} type="button" onClick={()=>setSelectedAnimalId(a.id)} style={{display:'flex',width:'100%',alignItems:'center',gap:10,padding:'8px 10px',background:'var(--card)',border:'1px solid var(--lg)',borderRadius:8,cursor:'pointer',marginBottom:4,textAlign:'left',fontFamily:'inherit'}}
                    onMouseEnter={e=>e.currentTarget.style.borderColor='var(--t)'}
                    onMouseLeave={e=>e.currentTarget.style.borderColor='var(--lg)'}>
                    <span style={{fontSize:'1.2rem'}}>{Em[a.av]||'🐾'}</span>
                    <div style={{flex:1,minWidth:0}}><div style={{fontWeight:600,fontSize:'.86rem',color:'var(--txt)'}}>{a.nm}</div><div style={{fontSize:'.7rem',color:'var(--txt2)'}}>{a.sp} · {a.owner}</div></div>
                  </button>
                ))}
              </div>
          }
        </div>

        {/* Parsed fields preview / editor */}
        <div style={{padding:'12px 14px',background:'var(--bg)',borderRadius:10,marginBottom:14}}>
          {editing?<>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <div><label style={{fontSize:'.66rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.06em',display:'block',marginBottom:3}}>Date</label><input className="fi" style={{padding:'6px 10px',fontSize:'.82rem'}} type="date" value={parsed.date||''} onChange={e=>setField('date',e.target.value)}/></div>
              <div><label style={{fontSize:'.66rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.06em',display:'block',marginBottom:3}}>Type</label>
                <select className="fi fi-sel" style={{padding:'6px 10px',fontSize:'.82rem'}} value={parsed.actType||'autre'} onChange={e=>setField('actType',e.target.value)}>
                  {Object.entries(VOICE_ACT_LABEL).map(([k,v])=><option key={k} value={k}>{v}</option>)}
                </select>
              </div>
            </div>
            {parsed.actType==='vaccination'&&<div style={{marginBottom:8}}><label style={{fontSize:'.66rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.06em',display:'block',marginBottom:3}}>Vaccin</label><input className="fi" style={{padding:'6px 10px',fontSize:'.82rem'}} value={parsed.vaccineName||''} onChange={e=>setField('vaccineName',e.target.value)} placeholder="Nom du vaccin"/></div>}
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:8}}>
              <div><label style={{fontSize:'.66rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.06em',display:'block',marginBottom:3}}>Poids (kg)</label><input className="fi" style={{padding:'6px 10px',fontSize:'.82rem'}} type="number" step="0.1" value={parsed.weight||''} onChange={e=>setField('weight',e.target.value?Number(e.target.value):null)}/></div>
              <div><label style={{fontSize:'.66rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.06em',display:'block',marginBottom:3}}>Prochain RDV</label><input className="fi" style={{padding:'6px 10px',fontSize:'.82rem'}} type="date" value={parsed.nextVisit||''} onChange={e=>setField('nextVisit',e.target.value)}/></div>
            </div>
            <div><label style={{fontSize:'.66rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.06em',display:'block',marginBottom:3}}>Notes</label><textarea className="fi" style={{padding:'6px 10px',fontSize:'.82rem'}} rows={2} value={parsed.notes||''} onChange={e=>setField('notes',e.target.value)}/></div>
          </>:<>
            <div style={{display:'grid',gridTemplateColumns:'80px 1fr',rowGap:6,columnGap:10,fontSize:'.82rem'}}>
              <div style={{color:'var(--txt2)'}}>Type</div><div style={{color:'var(--txt)',fontWeight:600}}>{VOICE_ACT_LABEL[parsed.actType]||'Non précisé'}</div>
              <div style={{color:'var(--txt2)'}}>Date</div><div style={{color:'var(--txt)'}}>{parsed.date?formatDateFR(parsed.date):"Aujourd'hui (par défaut)"}</div>
              {parsed.vaccineName&&<><div style={{color:'var(--txt2)'}}>Vaccin</div><div style={{color:'var(--txt)',fontWeight:600}}>{parsed.vaccineName}</div></>}
              {parsed.weight!=null&&<><div style={{color:'var(--txt2)'}}>Poids</div><div style={{color:'var(--txt)'}}>{parsed.weight} kg</div></>}
              {parsed.nextVisit&&<><div style={{color:'var(--txt2)'}}>Rappel</div><div style={{color:'var(--txt)'}}>{formatDateFR(parsed.nextVisit)}</div></>}
              {parsed.vetName&&<><div style={{color:'var(--txt2)'}}>Vétérinaire</div><div style={{color:'var(--txt)'}}>{parsed.vetName}</div></>}
              {parsed.notes&&<><div style={{color:'var(--txt2)'}}>Notes</div><div style={{color:'var(--txt)',lineHeight:1.45}}>{parsed.notes}</div></>}
            </div>
          </>}
        </div>
      </>}
    </div>

    {/* FOOTER ACTIONS */}
    {isParsed&&<div style={{padding:'12px 16px',borderTop:'1px solid var(--lg)',display:'flex',gap:8,flexWrap:'wrap',justifyContent:'flex-end'}}>
      <button className="btn btn-ghost btn-sm" onClick={reset}>Recommencer</button>
      <button className="btn btn-o btn-sm" onClick={()=>setEditing(e=>!e)}>{editing?'Aperçu':'✏️ Corriger'}</button>
      <button className="btn btn-t btn-sm" onClick={validate} disabled={!selectedAnimalId}><I.Check/> Ajouter à la fiche</button>
    </div>}
    {(step==='idle'||isRecording)&&transcript&&!isParsed&&<div style={{padding:'12px 16px',borderTop:'1px solid var(--lg)',display:'flex',gap:8,justifyContent:'flex-end'}}>
      <button className="btn btn-ghost btn-sm" onClick={()=>{setTranscript('');if(dict.recording)dict.stop();}}>Effacer</button>
      {!isRecording&&<button className="btn btn-t btn-sm" onClick={()=>parseTranscript(transcript)}><I.Spark/> Analyser</button>}
    </div>}
  </div>);
}

function Chatbot(){
  const{chatOpen,setChatOpen,nav}=useContext(Ctx);
  const[msgs,setMsgs]=useState(CHAT_INIT);const[inp,setInp]=useState('');const[typing,setTyping]=useState(false);const endRef=useRef(null);
  useEffect(()=>{endRef.current?.scrollIntoView({behavior:'smooth'});},[msgs,typing]);
  const responses={
    rex:"Rex est un Labrador mâle de 5 ans (32 kg), propriétaire M. Dupont. Suivi pour diabète, historique de gastro-entérite. ⚠ Allergique à la Pénicilline. Prochain RDV : 08:30 aujourd'hui (contrôle diabète).",
    luna:"Luna est un Siamois femelle de 7 ans (3.8 kg), propriétaire M. Garcia. Suivie pour hyperthyroïdie (contrôle mensuel). ⚠ Intolérante au lactose. RDV urgent aujourd'hui à 11:30.",
    mina:"Mina est un Persan femelle de 3 ans (4.2 kg), propriétaire Mme Bernard. Aucune allergie. Prochaine vaccination leucose prévue le 15/08. RDV 09:15 aujourd'hui.",
    bella:"Bella est un Golden Retriever femelle de 8 ans (29 kg), propriétaire M. Petit. Suivie pour arthrose. ⚠ Allergique à l'ibuprofène. Mammectomie mars 2025.",
    protocole:"Protocole chirurgie standard : bilan pré-anesthésique (NFS, biochimie, coagulation), jeûne 12h, prémédication adaptée au patient, monitoring per-opératoire continu (SpO2, ECG, capno), réveil surveillé en box chauffé.",
    résumé:"📋 Résumé du jour : 9 consultations, 2 opérations, 1 urgence (Luna — thyroïde). 3 CR en attente de validation. Prochain RDV : Rex à 08:30. CA estimé : 1 245 €.",
    facture:"💶 5 factures ce mois : 3 payées (336,50 €), 1 en attente (320 €, Mme Laurent), 1 impayée (65 €, Mme Moreau). Total CA mai : 721,50 €.",
    urgence:"🚨 Protocole urgence : 1) Évaluer ABC (Airway, Breathing, Circulation). 2) Stabiliser le patient. 3) Anamnèse rapide. 4) Examens complémentaires ciblés. 5) Traitement symptomatique immédiat.",
    bonjour:"Bonjour Dr. Martin ! 👋 Comment puis-je vous aider ? Résumé du jour, dossier patient, protocole, stock, ou facturation — je suis là.",
    merci:"Avec plaisir ! N'hésitez pas si vous avez d'autres questions. 🩺",
    image:"📷 L'analyse d'images IA est disponible dans l'Assistant diagnostic. Vous pouvez importer des photos cliniques, radios, échographies ou photos de plaies. L'IA analysera les structures visibles et proposera des hypothèses diagnostiques. Allez dans Diagnostic IA > onglet Analyse d'images.",
    default:"Je peux vous aider avec : les dossiers patients, protocoles vétérinaires, facturation, analyse d'images, résumés de cas ou diagnostics. Que souhaitez-vous savoir ?"
  };
  const send=(text)=>{const msg=text||inp;if(!msg.trim())return;setMsgs(p=>[...p,{r:'usr',t:msg}]);const q=msg.toLowerCase();setInp('');setTyping(true);
    setTimeout(()=>{let r=responses.default;for(const[k,v]of Object.entries(responses)){if(k!=='default'&&q.includes(k)){r=v;break;}}setTyping(false);setMsgs(p=>[...p,{r:'bot',t:r}]);},800+Math.random()*800);};
  const quickQ=['Résumé du jour','Protocole urgence','Dossier Rex'];
  return(<>
    <button className="chat-fab" onClick={()=>setChatOpen(!chatOpen)}>{chatOpen?<I.X/>:<I.Spark/>}</button>
    <div className={`chat-panel ${chatOpen?'open':''}`}>
      <div className="chat-hdr">
        <div style={{width:34,height:34,borderRadius:'50%',background:'rgba(43,160,143,.2)',display:'flex',alignItems:'center',justifyContent:'center'}}><I.Spark/></div>
        <div style={{flex:1}}><div style={{fontWeight:600,fontSize:'.88rem'}}>VetCopilot AI</div><div style={{fontSize:'.7rem',opacity:.6}}>Assistant intelligent · En ligne</div></div>
        <button style={{color:'rgba(255,255,255,.4)',background:'none',border:'none'}} onClick={()=>setChatOpen(false)}><I.X/></button>
      </div>
      <div className="chat-msgs">
        {msgs.map((m,i)=><div key={i} className={`chat-m ${m.r==='bot'?'bot':'usr'}`}>{m.t}</div>)}
        {typing&&<div className="chat-typing"><span/><span/><span/></div>}
        <div ref={endRef}/>
      </div>
      <div className="chat-quick">{quickQ.map((q,i)=><button key={i} onClick={()=>send(q)}>{q}</button>)}</div>
      <div className="chat-in"><input placeholder="Posez votre question..." value={inp} onChange={e=>setInp(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/><button className="chat-send" onClick={()=>send()}><I.Send/></button></div>
    </div>
  </>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
