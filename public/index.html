// 15-min slots 08:00 → 19:00 inclusive
const APT_TIME_SLOTS=(()=>{const s=[];for(let h=8;h<=19;h++){for(let m=0;m<60;m+=15){if(h===19&&m>0)break;s.push(`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`);}}return s;})();
const APT_DURATIONS=[{v:15,l:'15 min'},{v:30,l:'30 min'},{v:45,l:'45 min'},{v:60,l:'1 h'}];
const APT_TYPES=[
  {v:'Consultation',color:'#2BA08F',st:'ok'},
  {v:'Vaccination', color:'#C8A45C',st:'ok'},
  {v:'Chirurgie',   color:'#9b59b6',st:'wait'},
  {v:'Urgence',     color:'#e74c3c',st:'urg'},
  {v:'Contrôle',    color:'#2BA08F',st:'ok'},
  {v:'Détartrage',  color:'#C8A45C',st:'wait'},
  {v:'Autre',       color:'#5a6470',st:'ok'},
];
// Convert HH:MM → minutes since 00:00 for overlap math
function timeToMin(t){const[h,m]=String(t||'').split(':').map(Number);return(h||0)*60+(m||0);}
// Two apts overlap if [start, start+dur) intervals intersect for the same vet+date.
function aptsConflict(a,b){
  if(!a||!b) return false;
  if(a.vet!==b.vet) return false;
  if((a.date||'')!==(b.date||'')) return false;
  const aS=timeToMin(a.t),aE=aS+(a.dur||30);
  const bS=timeToMin(b.t),bE=bS+(b.dur||30);
  return aS<bE&&bS<aE;
}
// Next available slot for the same vet+date+duration after the requested one.
function nextFreeSlot({date,vet,dur,fromTime},existing){
  const candidates=APT_TIME_SLOTS.filter(s=>timeToMin(s)>=timeToMin(fromTime||'08:00'));
  for(const t of candidates){
    const trial={date,vet,dur,t};
    if(!existing.some(e=>aptsConflict(trial,e))) return t;
  }
  return null;
}

const ACT_TYPES_LIST=['Vaccination','Rappel vaccin','Vermifuge','Détartrage','Contrôle annuel','Pesée','Coupe de griffes','Prise de sang','Pose de puce','Stérilisation','Autre'];
function isVaccinationType(t){return t==='Vaccination'||t==='Rappel vaccin';}
function formatDateFR(iso){const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(iso||'');return m?`${m[3]}/${m[2]}/${m[1]}`:iso||'';}
function addOneYearISO(iso){const d=new Date(iso);if(isNaN(d.getTime())) return '';d.setFullYear(d.getFullYear()+1);return d.toISOString().slice(0,10);}

function NewAptForm({prefill}){
  const{addAppointment,addNotif,customApts,archive,teamMembers,setModal,toast}=useContext(Ctx);
  const todayISO=new Date().toISOString().slice(0,10);
  const activeAnimals=ANIMALS.filter(a=>!(archive||{})[a.id]);
  const vets=(teamMembers||[]).filter(m=>m.role&&m.role.startsWith('Vétérinaire'));
  const[animalId,setAnimalId]=useState(prefill?.animalId||activeAnimals[0]?.id||1);
  const[date,setDate]=useState(prefill?.date||todayISO);
  const[time,setTime]=useState(prefill?.time||'09:00');
  const[dur,setDur]=useState(30);
  const[type,setType]=useState('Consultation');
  const[vetId,setVetId]=useState(vets[0]?.id||1);
  const[notes,setNotes]=useState('');

  const animal=activeAnimals.find(a=>a.id===Number(animalId))||activeAnimals[0];
  const vet=vets.find(v=>v.id===Number(vetId))||vets[0];
  const vetName=vet?teamMemberFullName(vet):'Dr. Jean Martin';

  // Conflict detection: only against persisted customApts (static APTS use a
  // different shape with no `date` — treated as a separate, mock day).
  const trial={date,t:time,dur,vet:vetName};
  const conflict=customApts.find(a=>aptsConflict(trial,a));
  const proposedSlot=conflict?nextFreeSlot({date,vet:vetName,dur,fromTime:time},customApts):null;

  const submit=(e)=>{
    e&&e.preventDefault&&e.preventDefault();
    if(conflict){toast('Créneau déjà pris — choisissez un autre horaire','r');return;}
    if(!animal){toast('Sélectionnez un patient','r');return;}
    const meta=APT_TYPES.find(t=>t.v===type)||APT_TYPES[0];
    const apt={
      id:'apt-'+Date.now(),
      t:time,date,dur:Number(dur),
      nm:animal.nm,own:animal.owner,av:animal.av,
      rsn:type,type,
      vet:vetName,vetId:vet?.id,
      st:meta.st,color:meta.color,
      notes:notes.trim(),
    };
    addAppointment(apt);
    addNotif&&addNotif({id:apt.id+'-created',type:'apt',title:'Nouveau RDV planifié',text:`${animal.nm} · ${type} · ${date} à ${time} · ${vetName}`,time:"À l'instant",unread:true});
    setModal(null);
    toast(`RDV créé : ${animal.nm} le ${date} à ${time}`,'tl');
  };

  return(<form onSubmit={submit}>
    <div className="fg"><label className="fl">Patient</label>
      <select className="fi fi-sel" value={animalId} onChange={e=>setAnimalId(Number(e.target.value))}>
        {activeAnimals.map(a=><option key={a.id} value={a.id}>{Em[a.av]||'🐾'} {a.nm} — {a.owner}</option>)}
      </select>
    </div>
    <div className="g2">
      <div className="fg"><label className="fl">Date</label><input className="fi" type="date" value={date} onChange={e=>setDate(e.target.value)} required/></div>
      <div className="fg"><label className="fl">Heure</label>
        <select className="fi fi-sel" value={time} onChange={e=>setTime(e.target.value)}>
          {APT_TIME_SLOTS.map(s=><option key={s}>{s}</option>)}
        </select>
      </div>
    </div>
    <div className="g2">
      <div className="fg"><label className="fl">Durée</label>
        <select className="fi fi-sel" value={dur} onChange={e=>setDur(Number(e.target.value))}>
          {APT_DURATIONS.map(d=><option key={d.v} value={d.v}>{d.l}</option>)}
        </select>
      </div>
      <div className="fg"><label className="fl">Type</label>
        <select className="fi fi-sel" value={type} onChange={e=>setType(e.target.value)}>
          {APT_TYPES.map(t=><option key={t.v}>{t.v}</option>)}
        </select>
      </div>
    </div>
    <div className="fg"><label className="fl">Vétérinaire</label>
      <select className="fi fi-sel" value={vetId} onChange={e=>setVetId(Number(e.target.value))}>
        {vets.length===0?<option value={0}>Aucun vétérinaire</option>:vets.map(v=><option key={v.id} value={v.id}>{teamMemberFullName(v)}</option>)}
      </select>
    </div>

      <textarea className="fi" rows={2} value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Motif détaillé, contexte..."/>
    </div>
    {conflict&&<div style={{padding:'10px 12px',background:'rgba(220,38,38,.08)',border:'1px solid rgba(220,38,38,.3)',borderRadius:10,marginBottom:10,fontSize:'.84rem',lineHeight:1.4}}>

      <div style={{color:'var(--txt2)',marginTop:3}}>{conflict.nm} ({conflict.rsn}) avec {conflict.vet} à {conflict.t}.</div>
      {proposedSlot&&<button type="button" className="btn btn-sm btn-t" style={{marginTop:8}} onClick={()=>setTime(proposedSlot)}>Choisir {proposedSlot} (libre)</button>}
    </div>}
    <div style={{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}}>
      <button type="button" className="btn btn-o btn-sm" onClick={()=>setModal(null)}>Annuler</button>
      <button type="submit" className="btn btn-t" disabled={!!conflict}><I.Cal/> Créer le RDV</button>
    </div>
  </form>);
}

function PhotoLinkModal({url,animalNm}){
  const{toast,setModal}=useContext(Ctx);
  const[copied,setCopied]=useState(false);
  const msg=`Bonjour, la clinique VetCopilot vous demande une photo de ${animalNm}. Merci de cliquer sur ce lien pour l'envoyer : ${url}`;
  const copy=async()=>{
    try{
      if(navigator.clipboard&&window.isSecureContext){await navigator.clipboard.writeText(url);}
      else{
        // Legacy fallback for non-HTTPS / older browsers
        const ta=document.createElement('textarea');ta.value=url;ta.style.position='fixed';ta.style.opacity='0';
        document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      }
      setCopied(true);toast('Lien copié dans le presse-papier','tl');
      setTimeout(()=>setCopied(false),2000);
    }catch(err){toast(`Copie impossible : ${err.message||err}`,'r');}
  };

  const waHref=`https://wa.me/?text=${encodeURIComponent(msg)}`;

}

function VaccineRemindersCard(){
  const{nav,toast,archive}=useContext(Ctx);
  const[showAll,setShowAll]=useState(false);
  const reminders=useMemo(()=>{
    const list=[];
    ANIMALS.forEach(a=>{
      if((archive||{})[a.id]) return;
      (a.vacc||[]).forEach(v=>{
        const u=vaccUrgency(v);
        if(u==='soon'||u==='expired') list.push({animal:a,vacc:v,urgency:u,days:vaccDaysLeft(v)});
      });
    });
    return list.sort((x,y)=>(x.days??99999)-(y.days??99999));
  },[archive]);

  if(reminders.length===0){
    return(<div className="c af1" style={{marginBottom:18,padding:'14px 18px',display:'flex',alignItems:'center',gap:12,background:'rgba(22,163,74,.06)',border:'1px solid rgba(22,163,74,.2)'}}>
      <span style={{fontSize:'1.6rem'}}>✅</span>
      <div><div style={{fontWeight:700,color:'#16a34a',fontSize:'.92rem'}}>Tous les vaccins sont à jour</div><div style={{fontSize:'.78rem',color:'var(--txt2)',marginTop:2}}>Aucun rappel à venir dans les 30 prochains jours.</div></div>
    </div>);
  }

  const expiredCount=reminders.filter(r=>r.urgency==='expired').length;
  const soonCount=reminders.length-expiredCount;
  const hasExpired=expiredCount>0;
  const accent=hasExpired?'#dc2626':'#e67e22';
  const accentBg=hasExpired?'rgba(220,38,38,.06)':'rgba(230,126,34,.06)';
  const visible=showAll?reminders:reminders.slice(0,6);

  return(<div className="c af1" style={{marginBottom:18,padding:0,border:`1px solid ${accent}40`,overflow:'hidden'}}>
    {/* Header band */}
    <div style={{padding:'14px 18px',background:`linear-gradient(135deg,${accentBg},rgba(255,255,255,0))`,borderBottom:'1px solid var(--bg)',display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
      <div style={{width:44,height:44,borderRadius:12,background:accent,color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.3rem',flexShrink:0}}>🔔</div>
      <div style={{flex:1,minWidth:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
          <div style={{fontWeight:800,color:'var(--txt)',fontSize:'1.05rem',fontFamily:'var(--fh)'}}>Rappels vaccins</div>
          <span style={{padding:'2px 9px',borderRadius:10,fontSize:'.7rem',fontWeight:700,background:accent,color:'#fff'}}>{reminders.length}</span>
        </div>
        <div style={{fontSize:'.78rem',color:'var(--txt2)',marginTop:3}}>
          {expiredCount>0&&<span style={{color:'#dc2626',fontWeight:600}}>{expiredCount} expiré{expiredCount>1?'s':''}</span>}
          {expiredCount>0&&soonCount>0&&<span style={{color:'var(--mg)',margin:'0 6px'}}>·</span>}
          {soonCount>0&&<span style={{color:'#e67e22',fontWeight:600}}>{soonCount} à venir (&lt;30 j)</span>}
        </div>
      </div>
      {reminders.length>6&&<button className="btn btn-sm btn-ghost" onClick={()=>setShowAll(s=>!s)}>{showAll?'Réduire':`Voir les ${reminders.length}`}</button>}
    </div>

    {/* Grid of reminder cards */}
    <div style={{padding:14,display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:10}}>
      {visible.map((r,i)=>{
        const expired=r.urgency==='expired';
        const c=expired?'#dc2626':'#e67e22';
        const bg=expired?'rgba(220,38,38,.06)':'rgba(230,126,34,.06)';
        return(<div key={i} style={{padding:'12px 14px',background:bg,border:`1px solid ${c}30`,borderRadius:10,display:'flex',gap:10,alignItems:'center'}}>
          <div className={`apt-av ${r.animal.av}`} style={{width:38,height:38,borderRadius:10,fontSize:'1.05rem',flexShrink:0}}>{Em[r.animal.av]||'🐾'}</div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontSize:'.88rem',fontWeight:700,color:'var(--txt)',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.animal.nm} <span style={{color:'var(--txt2)',fontWeight:400,fontSize:'.74rem'}}>· {r.animal.owner}</span></div>
            <div style={{fontSize:'.74rem',color:'var(--txt2)',marginTop:2,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.vacc.nm} · échéance {r.vacc.dt}</div>
            <span style={{display:'inline-block',marginTop:5,padding:'2px 8px',borderRadius:8,fontSize:'.68rem',fontWeight:700,background:c,color:'#fff'}}>{expired?`Expiré · ${Math.abs(r.days)} j`:`Expire dans ${r.days} j`}</span>
          </div>
          <div style={{display:'flex',flexDirection:'column',gap:4,flexShrink:0}}>
            <button className="btn btn-sm btn-o" style={{padding:'4px 10px',fontSize:'.74rem'}} onClick={()=>nav('animal-detail',r.animal)}>Fiche</button>
            <button className="btn btn-sm" style={{padding:'4px 10px',fontSize:'.74rem',background:c,color:'#fff'}} onClick={()=>toast(`Rappel envoyé à ${r.animal.owner} pour ${r.animal.nm}`,'tl')}>Envoyer</button>
          </div>
        </div>);
      })}
    </div>
  </div>);
}

// ===== CONSULTATION FLOW (5 steps now) =====
function ConsultationFlow(){
  const{nav,toast,setModal,addInvoice}=useContext(Ctx);
  const[step,setStep]=useState(0);
  const[anId,setAnId]=useState(1);
  const[symptoms,setSymptoms]=useState('');
  const[notes,setNotes]=useState('');
  const[diagResult,setDiagResult]=useState(null);
  const finishConsultation=useCallback(()=>{
    const an=ANIMALS.find(a=>a.id===anId)||ANIMALS[0];
    const d=new Date();
    const pad=n=>String(n).padStart(2,'0');
    const isoDate=`${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
    const draftId=`${d.getFullYear()}-${String(Math.floor(Math.random()*900)+100)}`;
    const actes=[{nm:'Consultation générale',qty:1,price:45}];
    if(diagResult&&Array.isArray(diagResult.hypotheses)&&diagResult.hypotheses.length){
      actes.push({nm:'Examen clinique complet',qty:1,price:25});
    }
    const total=actes.reduce((s,a)=>s+(a.qty||1)*a.price,0);
    const draft={
      id:draftId,date:isoDate,animal:an.nm,client:an.owner||'Propriétaire',
      animalId:an.id,status:'pending',actes,total,vet:'Dr. Martin'
    };
    if(addInvoice) addInvoice(draft);
    toast(`Consultation terminée — facture brouillon ${draftId} créée`,'tl');
    nav('dashboard');
  },[anId,diagResult,addInvoice,toast,nav]);
  const dictCons=useDictation();
  const toggleConsMic=()=>{
    if(dictCons.recording){dictCons.stop();return;}
    if(!dictCons.supported){toast("Dictée vocale non supportée — utilisez Chrome, Edge ou Safari récents.",'r');return;}
    dictCons.start({baseText:symptoms,onUpdate:setSymptoms,onError:(msg)=>toast(msg,'r')});
  };
  const steps=['Informations','Examen','Diagnostic IA','Ordonnance','Compte rendu'];
  return(<div>
    <div className="consult-flow af">
      {steps.map((s,i)=><React.Fragment key={i}>
        {i>0&&<div className={`consult-line ${i<=step?'done':''}`}/>}
        <div className={`consult-step ${i===step?'active':i<step?'done':''}`}>
          <div className="consult-num">{i<step?<I.Check/>:i+1}</div><span>{s}</span>
        </div>
      </React.Fragment>)}
    </div>

    {step===0&&<div className="c af1" style={{maxWidth:700}}>
      <div className="c-title" style={{marginBottom:16}}>Informations du patient</div>
      <div className="fg"><label className="fl">Patient</label><select className="fi fi-sel" value={anId} onChange={e=>setAnId(Number(e.target.value))}>{ANIMALS.map(a=><option key={a.id} value={a.id}>{a.nm} — {a.sp} ({a.breed})</option>)}</select></div>
      <div className="g2">
        <div className="fg"><label className="fl">Type de consultation</label><select className="fi fi-sel"><option>Consultation générale</option><option>Suivi</option><option>Urgence</option><option>Chirurgie</option><option>Vaccination</option></select></div>
        <div className="fg"><label className="fl">Poids actuel (kg)</label><input className="fi" type="number" step="0.1" defaultValue="32"/></div>
      </div>
      <div className="fg"><label className="fl">Motif de la visite</label><input className="fi" placeholder="Décrivez le motif..." defaultValue="Contrôle diabète — Suivi glycémie mensuel"/></div>
      <button className="btn btn-t" style={{marginTop:8}} onClick={()=>setStep(1)}>Continuer <I.ChevR/></button>
    </div>}

    {step===1&&<div className="c af1" style={{maxWidth:700}}>
      <div className="c-title" style={{marginBottom:16}}>Examen clinique</div>
      <div className="g3">
        <div className="fg"><label className="fl">Température (°C)</label><input className="fi" type="number" step="0.1" defaultValue="38.7"/></div>
        <div className="fg"><label className="fl">FC (bpm)</label><input className="fi" type="number" defaultValue="90"/></div>
        <div className="fg"><label className="fl">FR (/min)</label><input className="fi" type="number" defaultValue="22"/></div>
      </div>
      <div className="g2">
        <div className="fg"><label className="fl">État des muqueuses</label><select className="fi fi-sel"><option>Roses</option><option>Pâles</option><option>Cyanosées</option><option>Ictériques</option></select></div>
        <div className="fg"><label className="fl">État général</label><select className="fi fi-sel"><option>Bon</option><option>Moyen</option><option>Altéré</option><option>Critique</option></select></div>
      </div>
      <div className="fg"><label className="fl">Symptômes observés</label>
        <div style={{position:'relative'}}><textarea className="fi" rows={4} placeholder="Décrivez les symptômes..." value={symptoms} onChange={e=>setSymptoms(e.target.value)}/>
        <button style={{position:'absolute',bottom:10,right:10,width:38,height:38,borderRadius:'50%',background:dictCons.recording?'#e74c3c':'#0B1D34',color:dictCons.recording?'#fff':'var(--t)',display:'flex',alignItems:'center',justifyContent:'center',transition:'all .2s',animation:dictCons.recording?'pulse 1.5s infinite':'none',cursor:'pointer',border:'none'}}
          onClick={toggleConsMic} title={dictCons.recording?"Arrêter la dictée":"Démarrer la dictée vocale (fr-FR)"} aria-label={dictCons.recording?"Arrêter la dictée":"Démarrer la dictée vocale"}><I.Mic/></button>
        </div>
      </div>
      <div className="fg"><label className="fl">Notes d'examen</label><textarea className="fi" rows={2} placeholder="Notes supplémentaires..." value={notes} onChange={e=>setNotes(e.target.value)}/></div>
      <div style={{display:'flex',gap:8,marginTop:8}}>
        <button className="btn btn-o" onClick={()=>setStep(0)}>Retour</button>
        <button className="btn btn-t" onClick={()=>setStep(2)}>Lancer le diagnostic IA <I.Spark/></button>
      </div>
    </div>}

    {step===2&&<DiagnosticInline animalId={anId} symptoms={symptoms} notes={notes} onResults={setDiagResult} onNext={()=>setStep(3)} onBack={()=>setStep(1)}/>}

    {step===3&&<div className="c af1" style={{maxWidth:700}}>
      <div className="c-title" style={{marginBottom:16}}>Ordonnance</div>

function DiagnosticInline({animalId,symptoms,notes,onResults,onNext,onBack}){
  const{toast}=useContext(Ctx);
  const[loading,setLoading]=useState(true);
  const[error,setError]=useState('');
  const[dr,setDr]=useState(null);
  const[expanded,setExpanded]=useState(0);
  const an=ANIMALS.find(a=>a.id===animalId)||ANIMALS[0];
  useEffect(()=>{
    let cancelled=false;
    setLoading(true);setError('');setDr(null);
    (async()=>{
      try{
        const res=await fetch('/api/diagnostic',{
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body:JSON.stringify({animalId,symptoms:symptoms||'Symptômes non renseignés',notes:notes||''})
        });
        const data=await res.json();
        if(cancelled) return;
        if(!res.ok||!data.ok) throw new Error(data.error||`HTTP ${res.status}`);
        setDr(data.result);
        if(onResults) onResults(data.result);
      }catch(err){
        if(cancelled) return;
        setError(err.message||String(err));
        toast(`Échec de l'analyse IA : ${err.message||err}`,'r');
      }finally{
        if(!cancelled) setLoading(false);
      }
    })();
    return()=>{cancelled=true;};
  },[animalId,symptoms,notes]);
  if(loading) return <div className="c af1" style={{textAlign:'center',padding:50}}><div style={{width:44,height:44,border:'3px solid var(--lg)',borderTopColor:'var(--t)',borderRadius:'50%',margin:'0 auto 14px',animation:'spin .7s linear infinite'}}/><div style={{fontWeight:600,color:'var(--txt)'}}>Analyse IA en cours...</div><p style={{fontSize:'.82rem',color:'var(--txt2)',marginTop:4}}>Corrélation des symptômes avec le dossier de {an.nm}</p><div style={{display:'flex',gap:8,justifyContent:'center',marginTop:16}}>{['Analyse symptômes','Comparaison historique','Calcul probabilités','Vérification allergies'].map((s,i)=><span key={i} className="tag tag-t" style={{animation:`fadeIn .3s ease ${i*.3}s both`}}>{s}</span>)}</div></div>;
  if(error||!dr) return <div className="c af1" style={{padding:30,textAlign:'center'}}><div style={{fontSize:'1.4rem',marginBottom:8}}>⚠️</div><div style={{fontWeight:600,color:'#e74c3c',marginBottom:6}}>Impossible de lancer l'analyse IA</div><p style={{fontSize:'.84rem',color:'var(--txt2)',marginBottom:14}}>{error||'Aucun résultat reçu'}</p><div style={{display:'flex',gap:8,justifyContent:'center'}}><button className="btn btn-o" onClick={onBack}>Retour</button></div></div>;
  return(<div>
    <div className="c af1" style={{padding:0,overflow:'hidden'}}>
      <div style={{padding:'20px 22px 0'}}>
        <div className="diag-result-hdr">
          <span style={{fontSize:'1.2rem'}}>📊</span>
          <h3>Résultats — Suspicion diagnostique</h3>
        </div>
        <div className={`diag-urgency ${dr.urgency}`} style={{marginBottom:18}}>
          <span>🚨</span> Niveau d'urgence estimé : {dr.urgencyLabel}
        </div>
      </div>
      <div style={{padding:'0 22px 22px'}}>
        {dr.hypotheses.map((r,i)=>(
          <div key={i} className="diag-hypo" style={{animation:`fadeIn .4s ease ${i*.12}s both`,cursor:'pointer'}} onClick={()=>setExpanded(expanded===i?-1:i)}>
            <div className="diag-hypo-title">
              <h4>{r.nm}</h4>
              <span className={`diag-hypo-pct ${r.lv}`}>{r.prob}%</span>
            </div>
            <div className="diag-bar"><div className={`diag-fill ${r.lv}`} style={{width:`${r.prob}%`}}/></div>
            <p className="diag-hypo-desc">{r.desc}</p>
            {expanded===i&&<div className="diag-exams" style={{animation:'fadeIn .3s ease'}}>
              <div className="diag-exams-title"><span>✏️</span> Examens conseillés</div>
              <ul>{r.exams.map((e,j)=><li key={j}>{e}</li>)}</ul>
            </div>}
            {expanded!==i&&<div style={{fontSize:'.74rem',color:'var(--t)',fontWeight:600,display:'flex',alignItems:'center',gap:4}}>
              <span>✏️</span> {r.exams.length} examens conseillés — cliquer pour voir
            </div>}
          </div>
        ))}
      </div>
    </div>
    <div style={{display:'flex',gap:8,marginTop:14}}>
      <button className="btn btn-o" onClick={onBack}>Retour</button>
      <button className="btn btn-g" onClick={onNext}><I.Rx/> Prescrire le traitement</button>
    </div>
  </div>);
}

            {evts.filter(e=>e.d===di&&Math.floor(e.h)===hi).map((e,ei)=><div key={ei} className={`cal-evt ${e.c}`}>{e.nm}<br/>{e.t}</div>)}
          </div>)}
        </React.Fragment>)}
      </div>
    </div>}
  </div>);
}

// ===== ANIMALS =====
function Animals(){
  const{nav,setModal,archive,reactivateAnimal,toast}=useContext(Ctx);
  const[tab,setTab]=useState('active'); // 'active' | 'archived'
  const[search,setSearch]=useState('');
  const[sp,setSp]=useState('all');
  const[sortBy,setSortBy]=useState('nm');

  // Split active vs archived once — both lists need the same search/species filter.
  const matchesQuery=(a)=>{
    const ms=a.nm.toLowerCase().includes(search.toLowerCase())||a.owner.toLowerCase().includes(search.toLowerCase())||a.breed.toLowerCase().includes(search.toLowerCase());
    const msp=sp==='all'||a.sp.toLowerCase()===sp;
    return ms&&msp;
  };
  const allActive=ANIMALS.filter(a=>!archive[a.id]);
  const allArchived=ANIMALS.filter(a=>!!archive[a.id]);
  const activeFiltered=allActive.filter(matchesQuery).sort((a,b)=>sortBy==='nm'?a.nm.localeCompare(b.nm):a.owner.localeCompare(b.owner));
  const archivedFiltered=allArchived.filter(matchesQuery).sort((a,b)=>(archive[b.id]?.archiveDate||'').localeCompare(archive[a.id]?.archiveDate||''));

  const handleReactivate=(e,a)=>{
    e.stopPropagation();
    const meta=ARCHIVE_REASON_META[archive[a.id]?.reason];
    if(!meta||!meta.canReactivate) return;
    reactivateAnimal(a.id);
    toast(`${a.nm} réactivé dans la liste des patients`,'tl');
  };

  return(<div>
    {/* Header: tabs + filters + new */}
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:10}}>
      <div className="tabs" style={{marginBottom:0,maxWidth:360}}>
        <button className={`tab ${tab==='active'?'on':''}`} onClick={()=>setTab('active')}>Actifs ({allActive.length})</button>
        <button className={`tab ${tab==='archived'?'on':''}`} onClick={()=>setTab('archived')}>Archives ({allArchived.length})</button>
      </div>
      <button className="btn btn-t btn-sm" onClick={()=>setModal({title:'Nouvel animal',type:'newAnimal'})}><I.Plus/> Nouvel animal</button>
    </div>
    <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap',marginBottom:12}}>
      <div className="hdr-search" style={{width:220}}><I.Search/><input placeholder="Nom, race, propriétaire..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
      <select className="fi fi-sel" style={{width:'auto',padding:'7px 32px 7px 12px',fontSize:'.82rem'}} value={sp} onChange={e=>setSp(e.target.value)}><option value="all">Toutes espèces</option><option value="chien">Chiens</option><option value="chat">Chats</option><option value="perroquet">Perroquets</option><option value="lapin">Lapins</option></select>
      {tab==='active'&&<select className="fi fi-sel" style={{width:'auto',padding:'7px 32px 7px 12px',fontSize:'.82rem'}} value={sortBy} onChange={e=>setSortBy(e.target.value)}><option value="nm">Tri: Nom</option><option value="owner">Tri: Propriétaire</option></select>}
    </div>

    {tab==='active'&&<>
      <div style={{fontSize:'.76rem',color:'var(--txt2)',marginBottom:10}}>{activeFiltered.length} patient{activeFiltered.length>1?'s':''} trouvé{activeFiltered.length>1?'s':''}</div>
      <div className="c af" style={{padding:0,overflow:'auto'}}>
        <table className="tbl"><thead><tr><th>Animal</th><th>Espèce / Race</th><th>Âge</th><th>Sexe</th><th>Poids</th><th>Propriétaire</th><th>Statut</th><th></th></tr></thead>
          <tbody>{activeFiltered.map(a=>(
            <tr key={a.id} style={{cursor:'pointer'}} onClick={()=>nav('animal-detail',a)}>
              <td><div style={{display:'flex',alignItems:'center',gap:9}}><div className={`apt-av ${a.av}`} style={{width:34,height:34,borderRadius:9,fontSize:'.9rem'}}><AnimalAvatar animal={a}/></div><span style={{fontWeight:600}}>{a.nm}</span></div></td>
              <td>{a.sp} · {a.breed}</td><td>{a.age}</td><td>{a.sex==='M'?'♂':'♀'}</td><td>{a.wt}</td><td>{a.owner}</td>
              <td>{a.allergy.length>0&&<span className="tag tag-r" style={{marginRight:4}}>⚠ Allergies</span>}<span className="tag tag-t">À jour</span></td>
              <td style={{color:'var(--mg)'}}><I.ChevR/></td>
            </tr>
          ))}</tbody>
        </table>
      </div>
    </>}

    {tab==='archived'&&<>
      <div style={{fontSize:'.76rem',color:'var(--txt2)',marginBottom:10}}>{archivedFiltered.length} dossier{archivedFiltered.length>1?'s':''} archivé{archivedFiltered.length>1?'s':''}</div>
      {archivedFiltered.length===0
        ? <div className="c af" style={{padding:42,textAlign:'center',color:'var(--txt2)'}}>Aucun dossier archivé.</div>
        : <div className="c af" style={{padding:0,overflow:'auto'}}>
          <table className="tbl"><thead><tr><th>Animal</th><th>Espèce / Race</th><th>Propriétaire</th><th>Raison</th><th>Date d'archivage</th><th></th></tr></thead>
            <tbody>{archivedFiltered.map(a=>{
              const info=archive[a.id]||{};
              const meta=ARCHIVE_REASON_META[info.reason]||ARCHIVE_REASON_META.inactive;
              return(<tr key={a.id} style={{cursor:'pointer',opacity:.92}} onClick={()=>nav('animal-detail',a)}>
                <td><div style={{display:'flex',alignItems:'center',gap:9}}>
                  <div className={`apt-av ${a.av}`} style={{width:34,height:34,borderRadius:9,fontSize:'.9rem',filter:'grayscale(.4)',opacity:.85}}><AnimalAvatar animal={a}/></div>
                  <span style={{fontWeight:600,color:'var(--txt2)'}}>{a.nm}</span>
                </div></td>
                <td style={{color:'var(--txt2)'}}>{a.sp} · {a.breed}</td>
                <td style={{color:'var(--txt2)'}}>{a.owner}</td>
                <td><span style={{padding:'3px 9px',borderRadius:10,fontSize:'.72rem',fontWeight:600,background:meta.bg,color:meta.color}}>{meta.ic} {meta.label}</span>{info.reason==='deceased'&&info.deceasedDate&&<span style={{fontSize:'.72rem',color:'var(--txt2)',marginLeft:8}}>· {formatArchiveDate(info.deceasedDate)}</span>}</td>
                <td style={{color:'var(--txt2)',fontSize:'.82rem'}}>{formatArchiveDate(info.archiveDate)}</td>
                <td style={{textAlign:'right'}}>
                  {meta.canReactivate
                    ? <button className="btn btn-sm btn-o" onClick={(e)=>handleReactivate(e,a)}>Réactiver</button>
                    : <span style={{color:'var(--mg)',fontSize:'.72rem',fontStyle:'italic'}}>—</span>}
                </td>
              </tr>);
            })}</tbody>
          </table>
        </div>}
    </>}
  </div>);
}

// ===== ANIMAL DETAIL =====
function AnimalDetail(){
  const{selAnimal,nav,toast,setModal,modal,animalPhotos,setAnimalPhoto,removeAnimalPhoto,archive,reactivateAnimal,manualActs}=useContext(Ctx);const a=selAnimal||ANIMALS[0];
  const animalManualActs=(manualActs||{})[a.id]||[];
  // Manual vaccinations get merged into the existing static vacc list.
  const manualVaccs=animalManualActs.filter(x=>x.type==='Vaccination'||x.type==='Rappel vaccin').map(x=>({
    nm:x.vaccineName||x.type,dt:x.dateDisplay,st:'ok',_manual:true,nextDate:x.nextDate,
  }));
  const allVaccs=[...manualVaccs,...a.vacc];
  const archiveInfo=archive[a.id];
  const isArchived=!!archiveInfo;
  const archiveMeta=isArchived?(ARCHIVE_REASON_META[archiveInfo.reason]||ARCHIVE_REASON_META.inactive):null;
  const[tab,setTab]=useState('overview');
  const chartRef=useRef(null);const chartInst=useRef(null);
  const photoInputRef=useRef(null);
  const hasPhoto=!!animalPhotos[a.id];
  const onPhotoPick=async(e)=>{
    const f=e.target.files&&e.target.files[0];
    e.target.value='';
    if(!f) return;
    if(!f.type.startsWith('image/')){toast('Sélectionnez une image (JPEG ou PNG)','r');return;}
    if(f.size>10*1024*1024){toast('Image trop volumineuse (max 10 MB avant redimensionnement)','r');return;}
    try{
      const dataUrl=await resizeImageFile(f,400,0.85);
      setAnimalPhoto(a.id,dataUrl);
      toast(`Photo de ${a.nm} mise à jour`,'tl');
    }catch(err){toast(`Erreur : ${err.message||err}`,'r');}
  };
  const onPhotoRemove=()=>{removeAnimalPhoto(a.id);toast(`Photo de ${a.nm} supprimée`,'tl');};
  // Generate a remote photo-upload link the vet can share with the owner.
  const[reqLinkBusy,setReqLinkBusy]=useState(false);
  const requestPhotoLink=async()=>{
    if(reqLinkBusy) return;
    setReqLinkBusy(true);
    try{
      const r=await fetch(`/api/animals/${a.id}/photo-link`,{method:'POST'});
      const d=await r.json();
      if(!r.ok||!d.ok) throw new Error(d&&d.error||'échec génération lien');
      const url=d.url||`${window.location.origin}${d.path}`;
      setModal({type:'photoLink',title:'Demande de photo',animalNm:a.nm,animalId:a.id,url});
    }catch(err){toast(`Erreur : ${err.message||err}`,'r');}
    finally{setReqLinkBusy(false);}
  };
  // One-shot sync on mount/animal change: pick up a photo the owner may have
  // uploaded between sessions. Only writes if local has no photo, so a vet
  // upload always wins over a stale backend snapshot.
  useEffect(()=>{
    let cancelled=false;
    fetch(`/api/animals/${a.id}/photo`).then(r=>r.json()).then(d=>{
      if(cancelled) return;
      if(d&&d.ok&&d.photo&&d.photo.dataUrl&&!animalPhotos[a.id]){
        setAnimalPhoto(a.id,d.photo.dataUrl);
      }
    }).catch(()=>{});
    return()=>{cancelled=true;};
  // eslint-disable-next-line
  },[a.id]);
  // Poll for the uploaded photo while the photo-link modal is open for THIS
  // animal. Stops on modal close, unmount, or animal change. Closes the modal
  // and notifies as soon as the owner submits.
  useEffect(()=>{
    if(!modal||modal.type!=='photoLink'||modal.animalId!==a.id) return;
    let cancelled=false;
    const tick=async()=>{
      try{
        const r=await fetch(`/api/animals/${a.id}/photo`);
        const d=await r.json();
        if(cancelled) return;
        if(d&&d.ok&&d.photo&&d.photo.dataUrl){
          const current=animalPhotos[a.id];
          if(d.photo.dataUrl!==current){
            setAnimalPhoto(a.id,d.photo.dataUrl);
            toast(`Photo de ${a.nm} reçue !`,'tl');
            setModal(null);
          }
        }
      }catch(_){/* ignore transient errors */}
    };
    const iv=setInterval(tick,4000);
    return()=>{cancelled=true;clearInterval(iv);};
  // eslint-disable-next-line
  },[modal,a.id]);
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';

  // 12-month weight series: the 5 known points (Jan-Mai) suffixed onto 7
  // deterministic synthetic points (Juin-Déc of previous year), giving a
  // year-long view. Deterministic ⇒ same chart on every render.
  const weightSeries=useMemo(()=>{
    const months=['Juin','Juil','Août','Sept','Oct','Nov','Déc','Jan','Fév','Mar','Avr','Mai'];
    const base=a.wts.length?a.wts[0].v:1;
    const synth=Array.from({length:7},(_,i)=>{
      const v=base*(1+Math.sin((i+a.id*1.7)*0.8)*0.04+Math.cos((i+a.id)*0.5)*0.025);
      return{m:months[i],v:Number(v.toFixed(2))};
    });
    return[...synth,...a.wts.map((w,i)=>({m:months[7+i]||w.m,v:w.v}))];
  },[a.id,a.wts]);

  // Normal weight band = current weight ± 15%. Pragmatic: race/âge-aware
  // ranges would require a lookup table; per-individual is a sensible default
  // for the prototype.
  const currentWeight=weightSeries[weightSeries.length-1].v;
  const prevMonthWeight=weightSeries[weightSeries.length-2]?.v;
  const normalMin=Number((currentWeight*0.85).toFixed(2));
  const normalMax=Number((currentWeight*1.15).toFixed(2));

  // Month-over-month weight delta → alert
  let weightAlert=null;
  if(prevMonthWeight){
    const delta=((currentWeight-prevMonthWeight)/prevMonthWeight)*100;
    if(delta>10) weightAlert={kind:'gain',pct:delta,color:'#e67e22',bg:'rgba(230,126,34,.1)',label:`Prise de poids importante : +${delta.toFixed(1)}% en 1 mois`};
    else if(delta<-15) weightAlert={kind:'loss',pct:delta,color:'#dc2626',bg:'rgba(220,38,38,.1)',label:`Perte de poids importante : ${delta.toFixed(1)}% en 1 mois`};
  }

  useEffect(()=>{
    if(tab==='overview'&&chartRef.current){
      chartInst.current?.destroy();
      const labels=weightSeries.map(w=>w.m);
      chartInst.current=new Chart(chartRef.current,{type:'line',
        data:{labels,datasets:[
          // Normal zone (drawn first, two flat datasets with fill between)
          {label:'Zone normale (max)',data:labels.map(()=>normalMax),borderColor:'transparent',backgroundColor:'rgba(22,163,74,.1)',pointRadius:0,fill:'+1',tension:0,borderWidth:0},
          {label:'Zone normale (min)',data:labels.map(()=>normalMin),borderColor:'transparent',pointRadius:0,fill:false,tension:0,borderWidth:0},
          {label:'Poids (kg)',data:weightSeries.map(w=>w.v),borderColor:'#2BA08F',backgroundColor:'rgba(43,160,143,.06)',fill:false,tension:.4,pointBackgroundColor:'#2BA08F',pointBorderColor:isDark?'#161B22':'#fff',pointBorderWidth:2,pointRadius:5,pointHoverRadius:7,borderWidth:2.5},
        ]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>{if(c.datasetIndex===2)return `Poids : ${c.parsed.y} kg`;if(c.datasetIndex===0)return `Plafond : ${c.parsed.y} kg`;if(c.datasetIndex===1)return `Plancher : ${c.parsed.y} kg`;return '';}}}},scales:{y:{grid:{color:isDark?'rgba(255,255,255,.04)':'rgba(0,0,0,.03)'},ticks:{color:isDark?'#6B7B8D':'#8C98A6',callback:v=>v+' kg'}},x:{grid:{display:false},ticks:{color:isDark?'#6B7B8D':'#8C98A6',maxRotation:0,autoSkip:true}}}}
      });
    }
    return()=>{chartInst.current?.destroy();};
  },[tab,a,isDark,weightSeries,normalMin,normalMax]);
  return(<div>
    <button className="btn btn-sm btn-o" style={{marginBottom:16}} onClick={()=>nav('animals')}>← Retour aux patients</button>
    {isArchived&&<div style={{padding:'12px 16px',background:archiveMeta.bg,border:`1px solid ${archiveMeta.color}33`,borderRadius:12,marginBottom:16,display:'flex',gap:12,alignItems:'center'}}>
      <span style={{fontSize:'1.4rem'}}>{archiveMeta.ic}</span>
      <div style={{flex:1}}>
        <div style={{fontWeight:700,color:archiveMeta.color,fontSize:'.92rem'}}>Dossier archivé · {archiveMeta.label}</div>
        <div style={{fontSize:'.78rem',color:'var(--txt2)',marginTop:2}}>
          {archiveInfo.reason==='deceased'&&archiveInfo.deceasedDate?`Décès le ${formatArchiveDate(archiveInfo.deceasedDate)} · `:''}
          Archivé le {formatArchiveDate(archiveInfo.archiveDate)} · Consultation en lecture seule
        </div>
      </div>
    </div>}
    {!isArchived&&(()=>{
      const due=(a.vacc||[]).map(v=>({v,u:vaccUrgency(v),d:vaccDaysLeft(v)})).filter(x=>x.u==='soon'||x.u==='expired');
      if(!due.length) return null;
      const hasExpired=due.some(x=>x.u==='expired');
      const color=hasExpired?'#dc2626':'#e67e22';
      const bg=hasExpired?'rgba(220,38,38,.08)':'rgba(230,126,34,.08)';
      return(<div style={{padding:'12px 16px',background:bg,border:`1px solid ${color}40`,borderRadius:12,marginBottom:16,display:'flex',gap:12,alignItems:'flex-start'}}>
        <span style={{fontSize:'1.4rem'}}>💉</span>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:700,color,fontSize:'.92rem'}}>{hasExpired?'Vaccin(s) expiré(s)':'Vaccin(s) à renouveler bientôt'}</div>
          <div style={{fontSize:'.8rem',color:'var(--txt2)',marginTop:3,lineHeight:1.4}}>{due.map(x=>`${x.v.nm} (${describeVaccDays(x.v)})`).join(' · ')}</div>
        </div>
        <button className="btn btn-o btn-sm" onClick={()=>setTab('vaccinations')}>Voir</button>
      </div>);
    })()}
    <div className="c af" style={{marginBottom:18}}>
      <div style={{display:'flex',gap:22,alignItems:'flex-start',flexWrap:'wrap'}}>
        <div style={{position:'relative',flexShrink:0}}>
          <div role="button" tabIndex={0} aria-label="Modifier la photo"
            onClick={()=>photoInputRef.current&&photoInputRef.current.click()}
            onKeyDown={(e)=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();photoInputRef.current&&photoInputRef.current.click();}}}
            style={{width:90,height:90,borderRadius:'var(--rl)',background:hasPhoto?'transparent':'linear-gradient(135deg,var(--t),var(--g))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'2.5rem',cursor:'pointer',overflow:'hidden',transition:'transform .15s,box-shadow .15s'}}
            onMouseEnter={(e)=>e.currentTarget.style.boxShadow='0 0 0 3px rgba(43,160,143,.25)'}
            onMouseLeave={(e)=>e.currentTarget.style.boxShadow='none'}>
            <AnimalAvatar animal={a}/>
          </div>
          {/* Small camera badge over the avatar */}
          <div aria-hidden="true" style={{position:'absolute',bottom:-4,right:-4,width:26,height:26,borderRadius:'50%',background:'var(--t)',color:'#fff',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'.8rem',boxShadow:'0 2px 6px rgba(0,0,0,.18)',border:'2px solid var(--card)',pointerEvents:'none'}}>📷</div>
          <input ref={photoInputRef} type="file" accept="image/*" capture="environment" style={{display:'none'}} onChange={onPhotoPick}/>

        </div>
        <div style={{flex:1,minWidth:200}}>
          <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:3,flexWrap:'wrap'}}>
            <h2 style={{fontFamily:'var(--fh)',fontSize:'1.5rem',color:'var(--txt)'}}>{a.nm}</h2>
            <span className="tag tag-b">{a.sex==='M'?'♂ Mâle':'♀ Femelle'}</span>

          </div>
          <div style={{fontSize:'.88rem',color:'var(--txt2)',marginBottom:7}}>{a.sp} · {a.breed}</div>
          <div style={{display:'flex',gap:16,flexWrap:'wrap'}}>

            <button className="btn btn-sm btn-ghost" onClick={()=>toast(`Appel ${a.phone}...`,'info')}><I.Phone/> {a.phone}</button>

// ===== ORDONNANCE CARD =====
// Sits below the diagnostic results, generates an editable prescription via
// /api/ordonnance/generate and exports it as a PDF.
function OrdonnanceCard({animal,results,symptoms}){
  const{toast}=useContext(Ctx);
  const[loading,setLoading]=useState(false);
  const[ord,setOrd]=useState(null); // { clinique:[], pharmacie:[], alerteAllergies:[] }
  const[exporting,setExporting]=useState(false);

  const topHypo=results&&results.hypotheses&&results.hypotheses[0]&&results.hypotheses[0].nm;

  const generate=async()=>{
    if(!animal){toast('Patient introuvable','r');return;}
    setLoading(true);
    try{
      const res=await fetch('/api/ordonnance/generate',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({animalId:animal.id,diagnostic:topHypo||'',symptoms:symptoms||''})
      });
      const data=await res.json();
      if(!res.ok||!data.ok) throw new Error(data.error||`HTTP ${res.status}`);
      setOrd({clinique:data.result.clinique||[],pharmacie:data.result.pharmacie||[],alerteAllergies:data.result.alerteAllergies||[]});
    }catch(err){
      toast(`Génération ordonnance échouée : ${err.message||err}`,'r');
    }finally{
      setLoading(false);
    }
  };

  const update=(section,idx,field,value)=>{
    setOrd(prev=>({...prev,[section]:prev[section].map((m,i)=>i===idx?{...m,[field]:value}:m)}));
  };
  const remove=(section,idx)=>{
    setOrd(prev=>({...prev,[section]:prev[section].filter((_,i)=>i!==idx)}));
  };
  const add=(section)=>{
    setOrd(prev=>({...prev,[section]:[...prev[section],{nm:'',dci:'',forme:'',dose_par_kg:'',dose_calculee:'',voie:'',frequence:'',duree:'',remarques:''}]}));
  };

  const exportPdf=async()=>{
    if(!ord||(ord.clinique.length===0&&ord.pharmacie.length===0)){toast('Aucun médicament à exporter','r');return;}
    setExporting(true);
    try{
      await downloadPdf({
        url:'/api/ordonnance/export-pdf',
        body:{
          patient:{nm:animal.nm,sp:animal.sp,breed:animal.breed,age:animal.age,sex:animal.sex,wt:animal.wt,owner:animal.owner,phone:animal.phone,chip:animal.chip},
          diagnostic:topHypo||'',
          clinique:ord.clinique,pharmacie:ord.pharmacie,alerteAllergies:ord.alerteAllergies,
          vet:'Dr. Jean Martin'
        },
        filename:`Ordonnance_${safeFilename(animal.nm)}_${todayISO()}.pdf`
      });
      toast('Ordonnance exportée en PDF','tl');
    }catch(err){toast(`Export PDF échoué : ${err.message||err}`,'r');}
    finally{setExporting(false);}
  };

  if(!ord) return (
    <div className="c af" style={{marginTop:14,textAlign:'center',padding:'24px 22px'}}>
      <div style={{fontSize:'.86rem',color:'var(--txt2)',marginBottom:14}}>Une fois le diagnostic validé, génère une ordonnance adaptée au patient.</div>
      <button className="btn btn-g" onClick={generate} disabled={loading}>
        {loading?<><div style={{width:14,height:14,border:'2px solid rgba(255,255,255,.3)',borderTopColor:'#fff',borderRadius:'50%',animation:'spin .6s linear infinite'}}/> Génération IA en cours...</>:<><I.Rx/> Générer l'ordonnance</>}
      </button>
    </div>
  );

  return (
    <div className="c af" style={{marginTop:14,padding:'20px 22px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
        <div>
          <div className="c-title" style={{display:'flex',alignItems:'center',gap:8}}><I.Rx/> Ordonnance</div>
          <div style={{fontSize:'.74rem',color:'var(--txt2)',marginTop:2}}>Suggérée par l'IA — éditable avant export</div>
        </div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-o btn-sm" onClick={generate} disabled={loading} title="Régénérer">↻</button>
          <button className="btn btn-g btn-sm" onClick={exportPdf} disabled={exporting||(ord.clinique.length===0&&ord.pharmacie.length===0)}>
            {exporting?'Export...':<><I.Down/> Exporter PDF</>}
          </button>
        </div>
      </div>

      {ord.alerteAllergies.length>0&&<div className="ord-alert">
        <div className="ord-alert-title">⚠ Alertes allergies / contre-indications</div>
        <ul>{ord.alerteAllergies.map((a,i)=><li key={i}>{a}</li>)}</ul>
      </div>}

      {['clinique','pharmacie'].map(section=>(
        <div key={section}>
          <div className={`ord-section-hdr ${section==='clinique'?'clinic':'pharma'}`}>
            {section==='clinique'?'🏥 Délivré par la clinique':'💊 À acheter en pharmacie'}
            <span style={{marginLeft:'auto',opacity:.8,fontSize:'.72rem'}}>{ord[section].length} médicament{ord[section].length>1?'s':''}</span>
          </div>
          {ord[section].map((m,i)=>(
            <div key={i} className="ord-med">
              <div className="ord-med-row">
                <div><div className="ord-med-label">Nom commercial</div><input className="nm" value={m.nm||''} onChange={e=>update(section,i,'nm',e.target.value)} placeholder="Ex: Cerenia"/></div>
                <div><div className="ord-med-label">DCI</div><input value={m.dci||''} onChange={e=>update(section,i,'dci',e.target.value)} placeholder="Ex: Maropitant"/></div>
              </div>
              <div className="ord-med-row-full"><div className="ord-med-label">Forme galénique</div><input value={m.forme||''} onChange={e=>update(section,i,'forme',e.target.value)} placeholder="Ex: solution injectable 10 mg/mL"/></div>
              <div className="ord-med-row">
                <div><div className="ord-med-label">Posologie /kg</div><input value={m.dose_par_kg||''} onChange={e=>update(section,i,'dose_par_kg',e.target.value)} placeholder="Ex: 1 mg/kg"/></div>
                <div><div className="ord-med-label">Dose calculée</div><input value={m.dose_calculee||''} onChange={e=>update(section,i,'dose_calculee',e.target.value)} placeholder="Ex: 32 mg (3,2 mL)"/></div>
              </div>
              <div className="ord-med-row" style={{gridTemplateColumns:'1fr 1fr 1fr'}}>
                <div><div className="ord-med-label">Voie</div><input value={m.voie||''} onChange={e=>update(section,i,'voie',e.target.value)} placeholder="SC/PO/IM..."/></div>
                <div><div className="ord-med-label">Fréquence</div><input value={m.frequence||''} onChange={e=>update(section,i,'frequence',e.target.value)} placeholder="1x/jour"/></div>
                <div><div className="ord-med-label">Durée</div><input value={m.duree||''} onChange={e=>update(section,i,'duree',e.target.value)} placeholder="3 jours"/></div>
              </div>
              <div className="ord-med-row-full"><div className="ord-med-label">Remarques</div><input value={m.remarques||''} onChange={e=>update(section,i,'remarques',e.target.value)} placeholder="Conseils d'administration ou de surveillance"/></div>
              <div className="ord-med-actions">
                <span style={{fontSize:'.72rem',color:'var(--txt2)'}}>{m.contre_indications?`CI : ${m.contre_indications}`:''}</span>
                <button className="btn btn-sm btn-ghost" style={{color:'#e74c3c'}} onClick={()=>remove(section,i)}>× Supprimer</button>
              </div>
            </div>
          ))}
          <button className="ord-add" onClick={()=>add(section)}>+ Ajouter un médicament</button>
        </div>
      ))}

      <div className="ord-disclaimer">
        <strong>⚠ Avertissement :</strong> Le vétérinaire reste seul responsable de la prescription. Cette suggestion est un outil d'aide à la décision ; vérifie chaque posologie et contre-indication avant validation.
      </div>
    </div>
  );
}

// ===== DIAGNOSTIC =====
function Diagnostic(){
  const{toast}=useContext(Ctx);
  const[symptoms,setSymptoms]=useState('');const[anId,setAnId]=useState(1);
  const[analyzing,setAnalyzing]=useState(false);const[results,setResults]=useState(null);
  const dict=useDictation();
  const an=ANIMALS.find(a=>a.id===anId)||ANIMALS[0];
  const[expanded2,setExpanded2]=useState(0);
  // Image analysis state
  const[images,setImages]=useState([]);
  const[imgCat,setImgCat]=useState('Photo clinique');
  const[imgAnalyzing,setImgAnalyzing]=useState(false);
  const[imgResults,setImgResults]=useState(null);
  const[dragOver,setDragOver]=useState(false);
  const[diagTab,setDiagTab]=useState('symptoms');
  const fileRef=useRef(null);

  const analyze=async()=>{
    if(!symptoms.trim())return;
    setAnalyzing(true);setResults(null);
    try{
      const res=await fetch('/api/diagnostic',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({animalId:anId,symptoms,notes:''})
      });
      const data=await res.json();
      if(!res.ok||!data.ok) throw new Error(data.error||`HTTP ${res.status}`);
      setResults(data.result);
      toast(`Analyse terminée — ${data.result.hypotheses.length} hypothèses identifiées`,'tl');
    }catch(err){
      toast(`Échec de l'analyse IA : ${err.message||err}`,'r');
    }finally{
      setAnalyzing(false);
    }
  };
  const toggleMic=()=>{
    if(dict.recording){dict.stop();return;}
    if(!dict.supported){toast("Dictée vocale non supportée — utilisez Chrome, Edge ou Safari récents.",'r');return;}
    dict.start({baseText:symptoms,onUpdate:setSymptoms,onError:(msg)=>toast(msg,'r')});
  };

  // Image handlers
  const addImages=(files)=>{
    const validFiles=Array.from(files).filter(f=>f.type.startsWith('image/'));
    if(validFiles.length===0){toast('Veuillez sélectionner des images (JPEG, PNG)','r');return;}
    const newImgs=validFiles.map(f=>({id:Date.now()+Math.random(),file:f,url:URL.createObjectURL(f),name:f.name,cat:imgCat}));
    setImages(prev=>[...prev,...newImgs]);
    toast(`${validFiles.length} image${validFiles.length>1?'s':''} ajoutée${validFiles.length>1?'s':''}`,'tl');
  };
  const removeImage=(id)=>{setImages(prev=>{const img=prev.find(i=>i.id===id);if(img)URL.revokeObjectURL(img.url);return prev.filter(i=>i.id!==id);});};
  const handleDrop=(e)=>{e.preventDefault();setDragOver(false);addImages(e.dataTransfer.files);};
  const analyzeImages=async()=>{
    if(images.length===0){toast('Ajoutez au moins une image à analyser','r');return;}
    const first=images[0];
    if(first.file.size>5*1024*1024){toast(`Image trop volumineuse (${Math.round(first.file.size/1024/1024*10)/10} MB) — limite 5 MB`,'r');return;}
    setImgAnalyzing(true);setImgResults(null);
    try{
      // FileReader → data URL → strip prefix → base64 payload for the API.
      const dataUrl=await new Promise((resolve,reject)=>{
        const r=new FileReader();r.onload=()=>resolve(r.result);r.onerror=()=>reject(new Error('lecture du fichier impossible'));r.readAsDataURL(first.file);
      });
      const base64=dataUrl.split(',')[1];
      const cat=first.cat||imgCat;
      const res=await fetch('/api/diagnostic/image',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({imageBase64:base64,mediaType:first.file.type,category:cat,animalId:anId})
      });
      const data=await res.json();
      if(!res.ok||!data.ok) throw new Error(data.error||`HTTP ${res.status}`);
      setImgResults({...data.result,category:cat,imageCount:images.length});
      toast(`Analyse d'image terminée — ${(data.result.observations||[]).length} observations`,'tl');
    }catch(err){
      toast(`Échec de l'analyse d'image : ${err.message||err}`,'r');
    }finally{
      setImgAnalyzing(false);
    }
  };
  const addObsToDiag=()=>{
    if(!imgResults)return;
    const obsText=imgResults.observations.join('. ')+'.';
    const hypoText=imgResults.hypotheses.map(h=>`${h.nm} (${h.prob}%)`).join(', ');
    const addition=`\n\n[Analyse d'image — ${imgResults.category}] ${obsText}\nHypothèses imagerie : ${hypoText}`;
    setSymptoms(prev=>prev+addition);
    setDiagTab('symptoms');
    toast('Observations ajoutées aux symptômes','tl');
  };

  return(<div>
    <div className="gm">
      <div>
        {/* Tabs: Symptômes / Analyse d'images */}
        <div className="tabs af" style={{maxWidth:450,marginBottom:18}}>
          <button className={`tab ${diagTab==='symptoms'?'on':''}`} onClick={()=>setDiagTab('symptoms')}>🩺 Analyse des symptômes</button>
          <button className={`tab ${diagTab==='images'?'on':''}`} onClick={()=>setDiagTab('images')}>📷 Analyse d'images</button>
        </div>

        {/* === TAB SYMPTÔMES === */}
        {diagTab==='symptoms'&&<>
        <div className="c af" style={{marginBottom:18}}>

            </div>

          <div className="img-result-body">
            {/* Urgency */}

              <span>🚨</span> Niveau d'urgence estimé : {imgResults.urgencyLabel}
            </div>

            {/* Observations */}
            <div style={{marginBottom:18}}>
              <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:10}}>
                <span style={{fontSize:'.9rem'}}>👁️</span>
                <div style={{fontSize:'.8rem',fontWeight:700,textTransform:'uppercase',letterSpacing:'.06em',color:'var(--t)'}}>Observations visibles</div>
              </div>
              {imgResults.observations.map((obs,i)=>(
                <div key={i} className="img-obs" style={{background:i%2===0?'rgba(43,160,143,.04)':'var(--bg)',color:'var(--txt)',display:'flex',gap:8,alignItems:'flex-start'}}>

              </div>
              {imgResults.hypotheses.map((h,i)=>(
                <div key={i} className="diag-hypo" style={{animation:`fadeIn .4s ease ${i*.1}s both`}}>
                  <div className="diag-hypo-title">

              <ul>{imgResults.exams.map((e,j)=><li key={j}>{e}</li>)}</ul>
            </div>

            {/* Disclaimer */}
            <div style={{background:'rgba(200,164,92,.08)',borderRadius:10,padding:'12px 16px',border:'1px solid rgba(200,164,92,.15)',marginBottom:14}}>

                <span style={{fontSize:'.9rem'}}>⚠️</span>
                <span style={{fontSize:'.78rem',fontWeight:700,color:'var(--g)'}}>Analyse indicative — à valider par le vétérinaire</span>
              </div>
              <p style={{fontSize:'.76rem',color:'var(--txt2)',marginTop:4,lineHeight:1.5}}>Cette analyse est générée par IA à titre indicatif. Elle ne remplace en aucun cas l'examen clinique et le jugement professionnel du vétérinaire.</p>
            </div>

            {/* Action buttons */}
            <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
              <button className="btn btn-t" onClick={addObsToDiag}><I.Plus/> Ajouter ces observations au diagnostic</button>
              <button className="btn btn-g btn-sm"><I.Down/> Exporter PDF</button>

      {/* Sidebar */}
      <div style={{display:'flex',flexDirection:'column',gap:16}}>

          <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14}}>
            <div style={{width:44,height:44,borderRadius:12,background:'rgba(43,160,143,.12)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.3rem',overflow:'hidden'}}><AnimalAvatar animal={an}/></div>

          {an.allergy.length>0&&<div style={{background:'rgba(231,76,60,.12)',borderRadius:10,padding:'8px 12px',marginBottom:10}}><div style={{fontSize:'.74rem',fontWeight:700,color:'#e74c3c'}}>⚠ Allergies</div><div style={{fontSize:'.82rem',marginTop:2}}>{an.allergy.join(', ')}</div></div>}

// ===== REPORTS =====
function Reports(){
  const{toast}=useContext(Ctx);
  const[tab,setTab]=useState('pending');
  const[preview,setPreview]=useState(null);
  const[previewTab,setPreviewTab]=useState('vet');
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState('');
  // Cache generated SOAPs per patient name so re-opening a preview doesn't
  // re-hit Claude (and burn ~30s + tokens) each time.
  const[cache,setCache]=useState({});
  const pending=[{nm:'Luna',em:'🐈',dt:"Aujourd'hui",type:'Bilan thyroïdien',vet:'Dr. Martin',owner:'M. Garcia',breed:'Siamois',age:'7 ans',wt:'3.8 kg'},{nm:'Coco',em:'🐦',dt:'Hier',type:'Contrôle respiratoire',vet:'Dr. Martin',owner:'M. Lefevre',breed:'Ara bleu',age:'12 ans',wt:'1.1 kg'},{nm:'Nuage',em:'🐰',dt:'09/05/2026',type:'Vérification dentaire',vet:'Dr. Durand',owner:'Mme Moreau',breed:'Bélier nain',age:'2 ans',wt:'1.8 kg'}];
  const archived=[{nm:'Rex',em:'🐕',dt:'05/05/2026',type:'Gastro-entérite',vet:'Dr. Martin',st:'Validé',owner:'M. Dupont'},{nm:'Bella',em:'🐕',dt:'01/05/2026',type:'Contrôle arthrose',vet:'Dr. Durand',st:'Envoyé',owner:'M. Petit'},{nm:'Simba',em:'🐈',dt:'28/04/2026',type:'Suivi cystite',vet:'Dr. Martin',st:'Validé',owner:'Mme Dubois'}];

  const openPreview=async(r)=>{
    setPreview(r);setPreviewTab('vet');setError('');
    if(cache[r.nm]) return; // already generated for this patient
    setLoading(true);
    try{
      const animal=ANIMALS.find(a=>a.nm===r.nm);
      const res=await fetch('/api/soap/generate',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({animalId:animal?animal.id:null,motif:r.type,examen:'',hypothese:'',traitement:''})
      });
      const data=await res.json();
      if(!res.ok||!data.ok) throw new Error(data.error||`HTTP ${res.status}`);
      setCache(prev=>({...prev,[r.nm]:{soap:data.soap,ownerSummary:data.ownerSummary||''}}));
    }catch(err){
      setError(err.message||String(err));
      toast(`Génération IA échouée : ${err.message||err}`,'r');
    }finally{
      setLoading(false);
    }
  };
  const retryPreview=()=>{ if(preview){ setCache(prev=>{const c={...prev};delete c[preview.nm];return c;}); openPreview(preview);} };
  const cached=preview?cache[preview.nm]:null;
  const exportPreviewPdf=async()=>{
    if(!cached||!preview){toast('Génère d\'abord le compte rendu','r');return;}
    try{
      const an=ANIMALS.find(a=>a.nm===preview.nm);
      const patient=an
        ?{nm:an.nm,sp:an.sp,breed:an.breed,age:an.age,sex:an.sex,wt:an.wt,owner:an.owner,phone:an.phone}
        :{nm:preview.nm,sp:'',owner:preview.owner};
      await downloadPdf({
        url:'/api/soap/export-pdf',
        body:{patient,soap:cached.soap,ownerSummary:cached.ownerSummary,date:preview.dt,vet:preview.vet},
        filename:`CR_${safeFilename(preview.nm)}_${todayISO()}.pdf`
      });
      toast('PDF généré','tl');
    }catch(err){toast(`Export PDF échoué : ${err.message||err}`,'r');}
  };
  return(<div>
    <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18,flexWrap:'wrap',gap:10}}>
      <div className="tabs" style={{marginBottom:0,maxWidth:350}}>
        <button className={`tab ${tab==='pending'?'on':''}`} onClick={()=>{setTab('pending');setPreview(null);}}>À valider (3)</button>
        <button className={`tab ${tab==='archive'?'on':''}`} onClick={()=>{setTab('archive');setPreview(null);}}>Archives</button>
      </div>
      {preview&&<button className="btn btn-o btn-sm" onClick={()=>setPreview(null)}><I.X/> Fermer l'aperçu</button>}
    </div>

    {!preview&&tab==='pending'&&<div className="af1" style={{display:'flex',flexDirection:'column',gap:10}}>{pending.map((r,i)=>(
      <div key={i} className="c" style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        <div style={{width:42,height:42,borderRadius:11,background:'rgba(200,164,92,.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem'}}>{r.em}</div>
        <div style={{flex:1,minWidth:150}}><div style={{fontWeight:600,color:'var(--txt)'}}>{r.nm} — {r.type}</div><div style={{fontSize:'.76rem',color:'var(--txt2)'}}>{r.dt} · {r.vet} · {r.owner}</div></div>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-o btn-sm" onClick={()=>openPreview(r)}><I.Eye/> Générer</button>
          <button className="btn btn-t btn-sm" onClick={()=>toast(`CR de ${r.nm} validé`,'tl')}><I.Check/> Valider</button>
          <button className="btn btn-sm btn-ghost"><I.Print/></button>
        </div>
      </div>
    ))}</div>}

    {!preview&&tab==='archive'&&<div className="af1" style={{display:'flex',flexDirection:'column',gap:8}}>{archived.map((r,i)=>(
      <div key={i} className="c" style={{display:'flex',alignItems:'center',gap:14,flexWrap:'wrap'}}>
        <div style={{width:42,height:42,borderRadius:11,background:'rgba(43,160,143,.08)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.1rem'}}>{r.em}</div>
        <div style={{flex:1,minWidth:150}}><div style={{fontWeight:600,color:'var(--txt)'}}>{r.nm} — {r.type}</div><div style={{fontSize:'.76rem',color:'var(--txt2)'}}>{r.dt} · {r.vet} · {r.owner}</div></div>
        <span className="tag tag-t">{r.st}</span>
        <div style={{display:'flex',gap:6}}>
          <button className="btn btn-sm btn-o" onClick={()=>openPreview(r)}><I.Eye/></button>
          <button className="btn btn-sm btn-ghost"><I.Down/></button>
          <button className="btn btn-sm btn-ghost"><I.Print/></button>
        </div>
      </div>
    ))}</div>}

// ===== BILLING =====
function Billing(){
  const{toast,invoices,invoicesLoading,updateInvoiceStatus}=useContext(Ctx);
  const[periodFilter,setPeriodFilter]=useState('all'); // today | week | month | all
  const[statusFilter,setStatusFilter]=useState('all'); // all | paid | pending | overdue
  const[query,setQuery]=useState('');
  const chartRef=useRef(null);
  const chartInst=useRef(null);
  const isDark=document.documentElement.getAttribute('data-theme')==='dark';

  // --- Time helpers ----------------------------------------------------------
  const today=new Date(); today.setHours(0,0,0,0);
  const dayOf=(iso)=>{
    if(!iso) return null;
    const m=/^(\d{4})-(\d{2})-(\d{2})/.exec(iso);
    if(m) return new Date(Number(m[1]),Number(m[2])-1,Number(m[3]));
    // Try DD/MM/YYYY too (legacy fallback)
    const m2=/^(\d{2})\/(\d{2})\/(\d{4})$/.exec(iso);
    if(m2) return new Date(Number(m2[3]),Number(m2[2])-1,Number(m2[1]));
    return null;
  };
  const inPeriod=(d,period)=>{
    if(!d) return false;
    if(period==='all') return true;
    const dt=new Date(d.getFullYear(),d.getMonth(),d.getDate());
    if(period==='today') return dt.getTime()===today.getTime();
    if(period==='week'){
      const start=new Date(today); start.setDate(today.getDate()-6);
      return dt>=start&&dt<=today;
    }
    if(period==='month'){
      return dt.getFullYear()===today.getFullYear()&&dt.getMonth()===today.getMonth();
    }
    return true;
  };
  const fmtDate=(iso)=>{
    const d=dayOf(iso);
    if(!d) return iso||'';
    return d.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',year:'numeric'});
  };

  // --- Derived data ----------------------------------------------------------
  const enriched=(invoices||[]).map(i=>({...i,_date:dayOf(i.date)}));
  const caToday=enriched.filter(i=>inPeriod(i._date,'today')).reduce((s,i)=>s+(i.total||0),0);
  const caWeek =enriched.filter(i=>inPeriod(i._date,'week')) .reduce((s,i)=>s+(i.total||0),0);
  const caMonth=enriched.filter(i=>inPeriod(i._date,'month')).reduce((s,i)=>s+(i.total||0),0);
  const nbPending=enriched.filter(i=>i.status==='pending'||i.status==='overdue').length;

  // --- Filtering -------------------------------------------------------------
  const q=query.trim().toLowerCase();
  const filtered=enriched.filter(i=>{
    if(!inPeriod(i._date,periodFilter)) return false;
    if(statusFilter!=='all'&&i.status!==statusFilter) return false;
    if(q&&!(`${i.animal||''} ${i.client||''} ${i.id||''}`.toLowerCase().includes(q))) return false;
    return true;
  }).sort((a,b)=>(b._date?b._date.getTime():0)-(a._date?a._date.getTime():0));

  // --- Weekly CA chart -------------------------------------------------------
  useEffect(()=>{
    if(!chartRef.current||invoicesLoading) return;
    const monthInv=enriched.filter(i=>inPeriod(i._date,'month'));
    const buckets=[0,0,0,0,0]; // 5 buckets (some months span 5 weeks of the calendar)
    monthInv.forEach(i=>{
      if(!i._date) return;
      const day=i._date.getDate();
      const idx=Math.min(4,Math.floor((day-1)/7));
      buckets[idx]+=i.total||0;
    });
    // Drop the 5th bucket if empty
    const data=buckets[4]===0?buckets.slice(0,4):buckets;
    const labels=data.map((_,i)=>`Semaine ${i+1}`);
    chartInst.current?.destroy();
    const txtC=isDark?'#6B7B8D':'#8C98A6';
    const gridC=isDark?'rgba(255,255,255,.04)':'rgba(0,0,0,.04)';
    chartInst.current=new Chart(chartRef.current,{
      type:'bar',
      data:{labels,datasets:[{label:'CA (€)',data,backgroundColor:'rgba(43,160,143,.7)',borderRadius:8,maxBarThickness:48}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.parsed.y.toFixed(2)} €`}}},scales:{y:{grid:{color:gridC},beginAtZero:true,ticks:{color:txtC,callback:v=>v+' €'}},x:{grid:{display:false},ticks:{color:txtC}}}}
    });
    return()=>{chartInst.current?.destroy();chartInst.current=null;};
  // eslint-disable-next-line
  },[invoices,invoicesLoading,isDark]);

  // --- PDF export ------------------------------------------------------------
  const exportInvoice=async(inv)=>{
    try{
      await downloadPdf({
        url:`/api/invoices/${encodeURIComponent(inv.id)}/export-pdf`,
        body:{},
        filename:`Facture_${safeFilename(inv.id)}_${safeFilename(inv.animal||'patient')}.pdf`
      });
      toast(`Facture ${inv.id} téléchargée`,'tl');
    }catch(err){toast(`Export PDF échoué : ${err.message||err}`,'r');}
  };
  const togglePaid=(inv)=>{
    const next=inv.status==='paid'?'pending':'paid';
    updateInvoiceStatus(inv.id,next);
    toast(`Facture ${inv.id} → ${next==='paid'?'Payée':'En attente'}`,'tl');
  };

  // --- UI bits ---------------------------------------------------------------
  const StatusBadge=({status})=>{
    const map={
      paid:{bg:'rgba(39,174,96,.12)',c:'#16a34a',l:'Payé'},
      pending:{bg:'rgba(230,126,34,.12)',c:'#e67e22',l:'En attente'},
      overdue:{bg:'rgba(231,76,60,.12)',c:'#dc2626',l:'En retard'},
    };
    const s=map[status]||map.pending;
    return <span style={{background:s.bg,color:s.c,padding:'3px 10px',borderRadius:11,fontSize:'.72rem',fontWeight:700,whiteSpace:'nowrap'}}>{s.l}</span>;
  };
  const PeriodPill=({value,label})=>(
    <button className={`tab ${periodFilter===value?'on':''}`} style={{padding:'7px 14px',fontSize:'.78rem'}} onClick={()=>setPeriodFilter(value)}>{label}</button>
  );
  const StatusPill=({value,label,color})=>(
    <button onClick={()=>setStatusFilter(value)} style={{padding:'6px 12px',borderRadius:18,border:`1px solid ${statusFilter===value?color:'var(--lg)'}`,background:statusFilter===value?color:'transparent',color:statusFilter===value?'#fff':color,fontSize:'.76rem',fontWeight:600,cursor:'pointer',transition:'all .15s'}}>{label}</button>
  );
  const actesPreview=(actes)=>{
    if(!actes||!actes.length) return '—';
    const first=actes[0].nm||'Acte';
    const rest=actes.length-1;
    return rest>0?`${first} +${rest}`:first;
  };

  return(<div>
    {/* STAT CARDS */}
    <div className="stats af" style={{gridTemplateColumns:'repeat(4,1fr)',marginBottom:16}}>
      <div className="c stat"><div style={{display:'flex',alignItems:'center',gap:12,width:'100%'}}>
        <div style={{width:42,height:42,borderRadius:11,background:'rgba(43,160,143,.12)',color:'var(--t)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'1.3rem'}}>📅</div>
        <div><div className="stat-v" style={{color:'var(--t)'}}>{caToday.toFixed(0)} €</div><div className="stat-l">CA du jour</div></div>
      </div></div>
      <div className="c stat"><div style={{display:'flex',alignItems:'center',gap:12,width:'100%'}}>
        <div style={{width:42,height:42,borderRadius:11,background:'rgba(200,164,92,.12)',color:'var(--g)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'1.3rem'}}>📊</div>
        <div><div className="stat-v" style={{color:'var(--g)'}}>{caWeek.toFixed(0)} €</div><div className="stat-l">CA semaine</div></div>
      </div></div>
      <div className="c stat"><div style={{display:'flex',alignItems:'center',gap:12,width:'100%'}}>
        <div style={{width:42,height:42,borderRadius:11,background:'rgba(11,29,52,.08)',color:'var(--txt)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'1.3rem'}}>💼</div>
        <div><div className="stat-v" style={{color:'var(--txt)'}}>{caMonth.toFixed(0)} €</div><div className="stat-l">CA du mois</div></div>
      </div></div>
      <div className="c stat"><div style={{display:'flex',alignItems:'center',gap:12,width:'100%'}}>
        <div style={{width:42,height:42,borderRadius:11,background:'rgba(231,76,60,.12)',color:'#e74c3c',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:'1.3rem'}}>⏳</div>
        <div><div className="stat-v" style={{color:'#e74c3c'}}>{nbPending}</div><div className="stat-l">{nbPending>1?'factures en attente':'facture en attente'}</div></div>
      </div></div>
    </div>

    {/* CHART */}
    <div className="c af" style={{marginBottom:16}}>
      <div className="c-title" style={{marginBottom:10}}>Chiffre d'affaires hebdomadaire — {today.toLocaleDateString('fr-FR',{month:'long',year:'numeric'})}</div>
      <div style={{position:'relative',height:200}}><canvas ref={chartRef}/></div>
    </div>

    {/* FILTERS */}
    <div className="c af" style={{marginBottom:14,padding:'14px 18px'}}>
      <div style={{display:'flex',gap:18,alignItems:'center',flexWrap:'wrap'}}>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:'.7rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.06em',marginRight:4}}>Période</span>
          <div className="tabs" style={{marginBottom:0,display:'inline-flex'}}>
            <PeriodPill value="today" label="Aujourd'hui"/>
            <PeriodPill value="week"  label="Semaine"/>
            <PeriodPill value="month" label="Mois"/>
            <PeriodPill value="all"   label="Tout"/>
          </div>
        </div>
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <span style={{fontSize:'.7rem',fontWeight:700,color:'var(--mg)',textTransform:'uppercase',letterSpacing:'.06em',marginRight:4}}>Statut</span>
          <StatusPill value="all"     label="Tous"       color="var(--t)"/>
          <StatusPill value="paid"    label="Payé"       color="#16a34a"/>
          <StatusPill value="pending" label="En attente" color="#e67e22"/>
          <StatusPill value="overdue" label="En retard"  color="#dc2626"/>
        </div>
        <div style={{flex:1,minWidth:200}}>
          <input className="fi" type="text" value={query} onChange={e=>setQuery(e.target.value)} placeholder="Rechercher animal ou propriétaire..." style={{height:36,fontSize:'.84rem'}}/>
        </div>
      </div>
    </div>

    {/* TABLE */}
    <div className="c af1" style={{padding:0,overflow:'auto'}}>
      {invoicesLoading?<div style={{padding:50,textAlign:'center',color:'var(--txt2)'}}>Chargement des factures...</div>
      :filtered.length===0?<div style={{padding:50,textAlign:'center',color:'var(--txt2)'}}>Aucune facture ne correspond aux filtres.</div>
      :<table className="tbl">
        <thead><tr>
          <th style={{width:90}}>N° Facture</th>
          <th style={{width:90}}>Date</th>
          <th>Animal</th>
          <th>Propriétaire</th>
          <th>Actes</th>
          <th style={{width:90,textAlign:'right'}}>Montant</th>
          <th style={{width:110}}>Statut</th>
          <th style={{width:130}}>Actions</th>
        </tr></thead>
        <tbody>{filtered.map(inv=>(
          <tr key={inv.id}>
            <td><span style={{fontWeight:700,fontFamily:'var(--fh)',fontSize:'.82rem',color:'var(--txt)'}}>{inv.id}</span></td>
            <td style={{fontSize:'.82rem',color:'var(--txt2)'}}>{fmtDate(inv.date)}</td>
            <td><span style={{fontWeight:600,color:'var(--txt)'}}>{inv.animal||'—'}</span></td>
            <td style={{fontSize:'.84rem'}}>{inv.client||'—'}</td>
            <td style={{fontSize:'.78rem',color:'var(--txt2)'}} title={(inv.actes||[]).map(a=>a.nm).join(', ')}>{actesPreview(inv.actes)}</td>
            <td style={{fontWeight:700,textAlign:'right',color:'var(--txt)'}}>{(inv.total||0).toFixed(2)} €</td>
            <td><StatusBadge status={inv.status}/></td>
            <td><div style={{display:'flex',gap:4}}>
              <button className="btn btn-sm btn-ghost" onClick={()=>togglePaid(inv)} title={inv.status==='paid'?'Marquer en attente':'Marquer payée'}>{inv.status==='paid'?<I.X/>:<I.Check/>}</button>
              <button className="btn btn-sm btn-ghost" onClick={()=>exportInvoice(inv)} title="Télécharger PDF"><I.Down/></button>
            </div></td>
          </tr>
        ))}</tbody>
      </table>}
    </div>
    {!invoicesLoading&&filtered.length>0&&<div style={{padding:'10px 4px',fontSize:'.74rem',color:'var(--txt2)',textAlign:'right'}}>{filtered.length} facture{filtered.length>1?'s':''} affichée{filtered.length>1?'s':''}</div>}
  </div>);
}

// Allergy → drug-family matcher. `matches` are substrings of the med name
// (lowercased) that should trigger a red contraindication banner.
const ALLERGY_CONTRA={
  'pénicilline':{matches:['amoxicilline','pénicilline','amox/clav'],alt:'Marbofloxacine 2 mg/kg PO ou doxycycline 5 mg/kg PO'},
  'amoxicilline':{matches:['amoxicilline','amox/clav','pénicilline'],alt:'Marbofloxacine ou doxycycline'},
  'aspirine':{matches:['aspirine','salicyl'],alt:'Méloxicam 0.1 mg/kg (chien) ou buprénorphine'},
  'sulfamide':{matches:['sulfa','trimétho'],alt:'Marbofloxacine ou doxycycline'},
  'anti-inflammatoire':{matches:['carprofène','méloxicam','aspirine','ains'],alt:'Opioïde (méthadone, tramadol)'},
};
// Species-specific contraindications. Match substrings of the med name.
const SPECIES_CONTRA={
  Chat:[
    {match:'paracétamol',label:'TOXIQUE pour le chat (méthémoglobinémie fatale)',alt:'Méloxicam 0.05 mg/kg PO ou buprénorphine 0.02 mg/kg'},
    {match:'aspirine',   label:'Métabolisme très lent — toxicité élevée',         alt:'Méloxicam dose chat ou opioïde'},
    {match:'perméthrine',label:'TOXIQUE neurologique chez le chat',                alt:'Fipronil uniquement'},
  ],
  Lapin:[
    {match:'amoxicilline',label:'Dysbiose intestinale fatale chez le lapin', alt:'Enrofloxacine 5 mg/kg PO ou triméthoprime-sulfa'},
    {match:'amox/clav',   label:'Dysbiose intestinale fatale chez le lapin', alt:'Enrofloxacine ou triméthoprime-sulfa'},
    {match:'clindamycine',label:'Toxique pour le lapin',                     alt:'Enrofloxacine ou triméthoprime-sulfa'},
  ],
  Perroquet:[
    {match:'doxycycline',label:'Prudence — risque hépatique chez certains oiseaux, dose adaptée',alt:'Enrofloxacine 15 mg/kg PO'},
  ],
};
function parseWeight(s){if(!s)return null;const m=String(s).match(/[\d,.]+/);if(!m)return null;return Number(m[0].replace(',','.'))||null;}
function medContraindications(medName,animal){
  if(!animal) return [];
  const warns=[];
  const lc=String(medName||'').toLowerCase();
  (animal.allergy||[]).forEach(allergy=>{
    const key=allergy.toLowerCase();
    const def=ALLERGY_CONTRA[key];
    if(!def) return;
    if(def.matches.some(m=>lc.includes(m))){
      warns.push({kind:'allergy',severity:'critical',label:`Allergie ${allergy}`,detail:`${animal.nm} est allergique à la ${allergy} — NE PAS ADMINISTRER`,alt:def.alt});
    }
  });
  (SPECIES_CONTRA[animal.sp]||[]).forEach(rule=>{
    if(lc.includes(rule.match)){
      warns.push({kind:'species',severity:'high',label:`Interdit chez ${animal.sp.toLowerCase()}`,detail:rule.label,alt:rule.alt});
    }
  });
  return warns;
}
